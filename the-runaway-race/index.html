<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Runaway Race</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
canvas {
  display: block;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
}
#mobile-controls {
  display: none;
  gap: 10px;
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  justify-content: center;
}
#mobile-controls button {
  width: 68px;
  height: 68px;
  font-size: 1.8rem;
  border: none;
  border-radius: 16px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#mobile-controls button:active { background: rgba(255,255,255,0.35); }
@media (pointer: coarse) { #mobile-controls { display: flex; } }
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="mobile-controls">
  <button id="btn-left">&#9664;</button>
  <button id="btn-duck">&#9660;</button>
  <button id="btn-jump">&#9650;</button>
  <button id="btn-right">&#9654;</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
let renderScale = 1;
let renderDpr = 1;

function resizeCanvas() {
  // Keep the logical coordinate system (W x H), but render to a higher
  // resolution backing store so everything looks sharp.
  const dpr = window.devicePixelRatio || 1;
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  renderScale = scale;
  renderDpr = dpr;

  const displayW = Math.max(1, Math.round(W * scale));
  const displayH = Math.max(1, Math.round(H * scale));
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';

  canvas.width = Math.max(1, Math.round(displayW * dpr));
  canvas.height = Math.max(1, Math.round(displayH * dpr));

  ctx.imageSmoothingEnabled = false; // prefer crisp edges
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
}

window.addEventListener('resize', resizeCanvas, { passive: true });
resizeCanvas();

// ==================== ASSETS ====================
const faceImg = new Image();
faceImg.src = 'face.png';
let faceLoaded = false;
faceImg.onload = () => { faceLoaded = true; };
const gabbyImg = new Image();
gabbyImg.src = 'gabby.png';
let gabbyLoaded = false;
gabbyImg.onload = () => { gabbyLoaded = true; };

// ==================== CONSTANTS ====================
const GROUND_Y = 420;
const GRAVITY = 0.55;
const JUMP_VEL = -12;
const MOVE_SPEED = 4.5;
// Movement feel: use acceleration + friction instead of snapping vx.
// Values are tuned for the fixed-timestep (STEP=1000/60) update loop.
const MOVE_ACCEL_GROUND = 0.35;
const MOVE_FRICTION_GROUND = 0.45;
const MOVE_ACCEL_AIR = 0.18;
const MOVE_FRICTION_AIR = 0.06;
const MOVE_EPSILON = 0.05;
const MAX_FALL = 12;
const PW = 30, PH = 42, DUCK_PH = 18;
const STEP = 1000 / 60;

// ==================== CHARACTERS ====================
const CHARS = [
  { name: 'Bunny' },
  { name: 'Lizzie', useFace: true },
  { name: 'Fox' },
  { name: 'Robot' },
  { name: 'Gabby', useFace: true }
];
const NUM_CHARS = CHARS.length;

// ==================== COINS & STORE UPGRADES ====================
const COIN_KEY = 'runaway_race_coins';
const UPGRADES_KEY = 'runaway_race_upgrades';
const MATH_DIFFICULTY_KEY = 'runaway_race_math_difficulty';
const MATH_DIFFICULTIES = [
  'Kindergarten',
  'Grade 1',
  'Grade 2',
  'Grade 3',
  'Grade 4',
  'Grade 5',
  'Grade 6'
];
const DEFAULT_IMMUNITY_TICKS = 600;
const DEFAULT_SUPER_JUMP_TICKS = 600;
const DEFAULT_SUPER_RUN_TICKS = 450;
const MAX_IMMUNITY_TICKS = 1200;
const MAX_SUPER_JUMP_TICKS = 1200;
const MAX_SUPER_RUN_TICKS = 900;
const UPGRADE_STEP = 200;
const FLYING_SIDEKICK_MAX_TIER = 3;
// Price for tier 1 unlock, then tier 2, then tier 3 (same flying friend, stronger carrots)
const FLYING_SIDEKICK_PRICES = [150, 210, 270];

function loadCoins() {
  try {
    const v = parseInt(localStorage.getItem(COIN_KEY), 10);
    return isNaN(v) ? 0 : Math.max(0, v);
  } catch (_) { return 0; }
}
function saveCoins() { try { localStorage.setItem(COIN_KEY, String(totalCoins)); } catch (_) {} }

function loadUpgrades() {
  try {
    const raw = localStorage.getItem(UPGRADES_KEY);
    if (!raw) return getDefaultUpgrades();
    const o = JSON.parse(raw);
    let fst = o.flyingSidekickTier | 0;
    if (fst < 1 && o.flyingSidekickUnlocked) fst = 1;
    fst = Math.max(0, Math.min(FLYING_SIDEKICK_MAX_TIER, fst));
    return {
      immunityTicks: Math.min(MAX_IMMUNITY_TICKS, Math.max(DEFAULT_IMMUNITY_TICKS, o.immunityTicks|0 || DEFAULT_IMMUNITY_TICKS)),
      superJumpTicks: Math.min(MAX_SUPER_JUMP_TICKS, Math.max(DEFAULT_SUPER_JUMP_TICKS, o.superJumpTicks|0 || DEFAULT_SUPER_JUMP_TICKS)),
      superRunUnlocked: !!o.superRunUnlocked,
      superRunTicks: Math.min(MAX_SUPER_RUN_TICKS, Math.max(DEFAULT_SUPER_RUN_TICKS, o.superRunTicks|0 || DEFAULT_SUPER_RUN_TICKS)),
      sidekickUnlocked: !!o.sidekickUnlocked,
      flyingSidekickTier: fst
    };
  } catch (_) { return getDefaultUpgrades(); }
}

function loadMathDifficultyIdx() {
  try {
    const raw = localStorage.getItem(MATH_DIFFICULTY_KEY);
    const n = raw === null ? 0 : parseInt(raw, 10);
    if (isNaN(n)) return 0;
    return Math.max(0, Math.min(MATH_DIFFICULTIES.length - 1, n));
  } catch (_) {
    return 0;
  }
}

function persistMathDifficultyIdx(idx) {
  try { localStorage.setItem(MATH_DIFFICULTY_KEY, String(idx)); } catch (_) {}
}
function getDefaultUpgrades() {
  return {
    immunityTicks: DEFAULT_IMMUNITY_TICKS,
    superJumpTicks: DEFAULT_SUPER_JUMP_TICKS,
    superRunUnlocked: false,
    superRunTicks: DEFAULT_SUPER_RUN_TICKS,
    sidekickUnlocked: false,
    flyingSidekickTier: 0
  };
}
function saveUpgrades() { try { localStorage.setItem(UPGRADES_KEY, JSON.stringify(upgrades)); } catch (_) {} }

/** Tier 1..3: faster cadence, speed, range, hit radius; tier 3 fires twin carrots. */
function getFlyingSidekickCarrotStats(tier) {
  if (tier <= 1) return { interval: 70, speed: 7, aimRange: 320, birdR: 22, sharkR: 35, shots: 1, spread: 0 };
  if (tier === 2) return { interval: 50, speed: 8.8, aimRange: 420, birdR: 27, sharkR: 44, shots: 1, spread: 0 };
  return { interval: 34, speed: 10.5, aimRange: 520, birdR: 34, sharkR: 54, shots: 2, spread: 0.15 };
}

// ==================== LEVEL THEMES ====================
const THEMES = [
  { name: 'Green Meadows', sky1: '#87CEEB', sky2: '#e0f0ff', ground: '#4a8c3f', groundDark: '#3a6c2f', grass: '#5aad4f', hillFar: '#7ab86a', hillNear: '#5a9c4a', plat: '#8B7355', platTop: '#6B5335' },
  { name: 'Sandy Dunes', sky1: '#f0c27f', sky2: '#ffecd2', ground: '#deb887', groundDark: '#c4a06a', grass: '#d2b48c', hillFar: '#e8c88a', hillNear: '#d4a76a', plat: '#c4976a', platTop: '#a47a50' },
  { name: 'Dark Forest', sky1: '#2d4a3e', sky2: '#4a6e5c', ground: '#3a5a3a', groundDark: '#2a3a2a', grass: '#4a6a4a', hillFar: '#3a5a4a', hillNear: '#2a4a3a', plat: '#5a3a2a', platTop: '#4a2a1a' },
  { name: 'Snowy Peaks', sky1: '#b0c4de', sky2: '#e8f0f8', ground: '#ddd', groundDark: '#bbb', grass: '#eee', hillFar: '#c8d0d8', hillNear: '#b0b8c0', plat: '#8888a0', platTop: '#686880' },
  { name: 'City Streets', sky1: '#ff7f50', sky2: '#2c2c54', ground: '#808080', groundDark: '#606060', grass: '#909090', hillFar: '#4a4a6a', hillNear: '#3a3a5a', plat: '#707070', platTop: '#505050' },
  { name: 'Volcano Run', sky1: '#1a0800', sky2: '#8b2500', ground: '#4a3a2a', groundDark: '#3a2a1a', grass: '#5a3a1a', hillFar: '#3a1a0a', hillNear: '#5a2a0a', plat: '#6a4a3a', platTop: '#4a3a2a' }
];

// ==================== LEVEL GENERATOR ====================
// Generates a level from a difficulty value (1 = easiest, 10 = hardest).
// levelIndex controls the theme and seeded layout variety.

function seededRng(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return function() {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b) >>> 0;
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b) >>> 0;
    s = (s ^ (s >>> 16)) >>> 0;
    return s / 0x100000000;
  };
}

function generateLevel(levelIndex, difficulty, extraSeed) {
  const d = Math.max(1, Math.min(10, difficulty));
  const t = (d - 1) / 9; // 0..1 normalised difficulty
  const rng = seededRng(levelIndex * 7919 + Math.round(d * 997) + (extraSeed || 0));
  const ri = (lo, hi) => Math.floor(lo + rng() * (hi - lo + 1));
  const rf = (lo, hi) => lo + rng() * (hi - lo);
  const theme = levelIndex % THEMES.length;

  // --- Difficulty-scaled parameters ---
  const numLavaPits   = Math.floor(t * 4.5);                           // 0..4
  const numHighCells  = 1 + Math.floor(t * 2);                         // 1..3 (vert elevator + high platform)
  const numGapCells   = ri(6 + Math.floor(t * 4), 8 + Math.floor(t * 5)); // 6..13
  const numEnemies    = ri(3 + Math.floor(t * 3), 5 + Math.floor(t * 4)); // 3..9
  const numTurrets    = Math.floor(t * 2) + ri(0, Math.ceil(t * 5));   // 0..7
  const wolfProb      = t * 0.85;
  const fireProb      = t * 0.65;
  const turretIntBase = Math.round(130 - t * 52);                       // 130..78 (lower = faster fire rate)
  const vElevSpeed    = rf(0.68, 0.70 + t * 0.35);
  const hElevSpeed    = rf(0.82, 0.85 + t * 0.28);
  const gapMin        = 65;
  const gapMax        = ri(80, 90 + Math.round(t * 55));
  const segMin        = ri(120, 160);
  const segMax        = ri(165, 225);
  // High platforms require the vertical elevator to reach (> max jump height of ~130px above ground)
  const highPlatY     = ri(Math.round(240 - t * 22), Math.round(258 - t * 22));
  const midPlatY      = ri(325, 336); // reachable by normal jump
  const startLen      = ri(180, 260);
  const endLen        = ri(220, 380);

  const ground    = [];
  const platforms = [];
  const elevators = [];
  const lava      = [];
  const flags     = [];
  const enemies   = [];
  const turrets   = [];
  const presents  = [];
  const flowers   = [];
  const coins     = [];
  let cx = 0;

  // Start zone — guaranteed solid ground
  ground.push({ x: cx, w: startLen });
  cx += startLen;

  const numTowers  = 1 + Math.floor(t * 1);    // 1..2 staircase climbing challenges
  const numHills   = 1 + Math.floor(t * 2);    // 1..3 multi-step hill terrain
  const numRavines = ri(0, 1 + Math.floor(t * 1));   // 0..2 ravine stepping-stone zones
  const numZigzags = ri(0, 1 + Math.floor(t * 1));   // 0..2 zigzag ledge runs
  const numFloating = ri(0, Math.floor(t * 1.5));     // 0..1 floating platform chains over void

  // Plan the cell sequence
  const totalCells = numGapCells + numHighCells + numLavaPits + numTowers + numHills + numRavines + numZigzags + numFloating;
  const cellTypes  = new Array(totalCells).fill('gap');

  // High cells: first one in the first 30%, rest in the first 60%
  const highSet = new Set();
  highSet.add(ri(0, Math.max(0, Math.floor(totalCells * 0.3) - 1)));
  for (let i = 1; i < numHighCells; i++) {
    let pos, tries = 0;
    do { pos = ri(0, Math.max(0, Math.floor(totalCells * 0.6) - 1)); tries++; }
    while (highSet.has(pos) && tries < 20);
    highSet.add(pos);
  }

  // Lava cells: placed in the 40%–90% range
  const lavaSet = new Set();
  for (let i = 0; i < numLavaPits; i++) {
    const lo = Math.max(Math.floor(totalCells * 0.4), 1);
    const hi = Math.max(lo, Math.floor(totalCells * 0.9) - 1);
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while ((highSet.has(pos) || lavaSet.has(pos)) && tries < 30);
    lavaSet.add(pos);
  }

  // Tower cells: staircase challenges, scattered through first 70%
  const towerSet = new Set();
  for (let i = 0; i < numTowers; i++) {
    const lo = 1;
    const hi = Math.max(lo, Math.floor(totalCells * 0.7) - 1);
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while ((highSet.has(pos) || lavaSet.has(pos) || towerSet.has(pos)) && tries < 30);
    towerSet.add(pos);
  }

  // Hill cells: multi-step ascending/descending terrain, distributed through 30%–100%
  const hillSet = new Set();
  for (let i = 0; i < numHills; i++) {
    const lo = Math.max(Math.floor(totalCells * 0.3), 1);
    const hi = Math.max(lo, totalCells - 2);
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while ((highSet.has(pos) || lavaSet.has(pos) || towerSet.has(pos) || hillSet.has(pos)) && tries < 30);
    hillSet.add(pos);
  }

  const takenSet = new Set([...highSet, ...lavaSet, ...towerSet, ...hillSet]);

  const ravineSet = new Set();
  for (let i = 0; i < numRavines; i++) {
    const lo = Math.max(2, Math.floor(totalCells * 0.2));
    const hi = Math.max(lo, Math.floor(totalCells * 0.8));
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while (takenSet.has(pos) && tries < 30);
    ravineSet.add(pos);
    takenSet.add(pos);
  }

  const zigzagSet = new Set();
  for (let i = 0; i < numZigzags; i++) {
    const lo = Math.max(1, Math.floor(totalCells * 0.15));
    const hi = Math.max(lo, Math.floor(totalCells * 0.85));
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while (takenSet.has(pos) && tries < 30);
    zigzagSet.add(pos);
    takenSet.add(pos);
  }

  const floatingSet = new Set();
  for (let i = 0; i < numFloating; i++) {
    const lo = Math.max(2, Math.floor(totalCells * 0.3));
    const hi = Math.max(lo, Math.floor(totalCells * 0.7));
    let pos, tries = 0;
    do { pos = ri(lo, hi); tries++; }
    while (takenSet.has(pos) && tries < 30);
    floatingSet.add(pos);
    takenSet.add(pos);
  }

  for (let i = 0; i < totalCells; i++) {
    if (highSet.has(i))          cellTypes[i] = 'high';
    else if (lavaSet.has(i))     cellTypes[i] = 'lava';
    else if (towerSet.has(i))    cellTypes[i] = 'tower';
    else if (hillSet.has(i))     cellTypes[i] = 'hill';
    else if (ravineSet.has(i))   cellTypes[i] = 'ravine';
    else if (zigzagSet.has(i))   cellTypes[i] = 'zigzag';
    else if (floatingSet.has(i)) cellTypes[i] = 'floating';
  }

  // Flag positions: at ~33%, ~66%, and (for longer levels) ~83% of the cells
  const flagCells = new Set([
    Math.floor(totalCells * 0.33),
    Math.floor(totalCells * 0.66),
    ...(totalCells >= 12 ? [Math.floor(totalCells * 0.83)] : [])
  ]);

  // Helper: push a ground segment, optionally raised (hill), and fill it with step blocks
  function pushSeg(x, w, raiseH) {
    const segY = raiseH > 0 ? GROUND_Y - raiseH : undefined;
    const seg  = { x, w, ...(segY !== undefined ? { y: segY } : {}) };
    ground.push(seg);
    return seg;
  }

  // Process each cell
  for (let ci = 0; ci < totalCells; ci++) {
    const type = cellTypes[ci];

    if (type === 'gap') {
      // ---- Standard gap cell ----
      const gW   = ri(gapMin, gapMax);
      const gapX = cx;
      cx += gW;
      // Mid-height platform over wider gaps (player can jump to these)
      if (gW > 100) {
        const pw = ri(190, 225);
        platforms.push({ x: gapX + Math.floor((gW - pw) / 2), y: midPlatY + ri(-4, 4), w: pw });
      }
      const segW  = ri(segMin, segMax);
      // 40% chance of a raised terrain hill on non-start cells
      const hillH = (ci > 0 && rng() < 0.4) ? ri(28, 52) : 0;
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, hillH);

      // Platform chain on flat segments
      if (hillH === 0 && segW >= 185 && rng() < 0.6) {
        const chainH = ri(75, 108);
        const pl1W   = ri(52, 68);
        const pl1X   = cx + ri(20, 45);
        const pl1Y   = GROUND_Y - chainH;
        const plGap  = ri(54, 72);
        const pl2W   = ri(52, 68);
        const pl2X   = pl1X + pl1W + plGap;
        const pl2Y   = pl1Y - ri(0, 22);
        if (pl2X + pl2W < cx + segW - 12) {
          platforms.push({ x: pl1X, y: pl1Y, w: pl1W });
          platforms.push({ x: pl2X, y: pl2Y, w: pl2W });
          // Occasional third platform for longer chains
          if (rng() < 0.35) {
            const pl3X = pl2X + pl2W + ri(50, 68);
            const pl3W = ri(48, 65);
            const pl3Y = pl2Y - ri(-10, 18);
            if (pl3X + pl3W < cx + segW - 10) {
              platforms.push({ x: pl3X, y: pl3Y, w: pl3W });
              coins.push({ x: pl3X + Math.floor(pl3W / 2), y: pl3Y - 22 });
            }
          }
        }
      }

      // Coin arc over gap — reward for well-timed jumps
      if (gW >= 75 && rng() < 0.4) {
        const arcCx = gapX + gW / 2;
        const arcNum = ri(3, 5);
        for (let ci2 = 0; ci2 < arcNum; ci2++) {
          const frac = (ci2 + 0.5) / arcNum;
          const cax = gapX + frac * gW;
          const cay = GROUND_Y - 60 - Math.sin(frac * Math.PI) * ri(40, 80);
          coins.push({ x: Math.round(cax), y: Math.round(cay) });
        }
      }

      cx += segW;

    } else if (type === 'high') {
      // ---- Vertical elevator + high platform cell ----
      const elevW   = 80;
      const elevX   = cx - elevW - ri(5, 20);
      const platY   = highPlatY + ri(-8, 8);
      elevators.push({
        x: elevX, y: GROUND_Y - 12, w: elevW, type: 'vertical',
        minY: platY - 5, maxY: GROUND_Y - 12,
        minX: elevX, maxX: elevX,
        speed: vElevSpeed + rf(-0.04, 0.04)
      });
      const gW    = ri(120, 180);
      cx += gW;
      const platW = ri(220, 260);
      const platX = cx - ri(15, 25);
      platforms.push({ x: platX, y: platY, w: platW });
      presents.push({ x: platX + Math.floor(platW / 2), y: platY });
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);    // keep flat — elevator is already the height feature
      cx += segW;

    } else if (type === 'lava') {
      // ---- Lava pit cell (horizontal elevator) ----
      const lw     = ri(380 + Math.round(t * 50), 440 + Math.round(t * 60));
      const lavaX  = cx;
      const elW    = 75;
      const elMinX = lavaX - 5;
      const elMaxX = lavaX + lw - elW + 5;
      lava.push({ x: lavaX + 8, w: lw - 16 });
      elevators.push({
        x: elMinX, y: GROUND_Y - 8, w: elW, type: 'horizontal',
        minY: GROUND_Y - 8, maxY: GROUND_Y - 8,
        minX: elMinX, maxX: elMaxX,
        speed: hElevSpeed + rf(0, 0.12)
      });
      cx += lw;
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);    // keep flat after lava — elevation would confuse the crossing
      cx += segW;

    } else if (type === 'tower') {
      // ---- Staircase climbing challenge ----
      const stepBase = midPlatY + ri(22, 32);
      const stepRise = ri(50, 58);
      const stepW    = ri(82, 100);
      const stepOffX = ri(76, 90);
      const numSteps = 3;
      for (let s = 0; s < numSteps; s++) {
        platforms.push({ x: cx + 15 + stepOffX * s, y: stepBase - stepRise * s, w: stepW });
      }
      const topX = cx + 15 + stepOffX * (numSteps - 1);
      const topY = stepBase - stepRise * (numSteps - 1);
      presents.push({ x: topX + Math.floor(stepW / 2), y: topY });
      cx += 15 + stepOffX * numSteps + ri(40, 70);
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);
      cx += segW;

    } else if (type === 'hill') {
      // ---- Dramatic mountain: each step = character height, must jump to ascend ----
      // Physics: from ground level, jumping gives ~180px horizontal reach at 50px height,
      // so gaps of 60–90px reliably land on 100–120px wide steps.
      const hillSteps  = ri(2, 3);           // steps on each side of peak
      const hillRise   = 50;                 // step height = PH(42)+margin, cannot step-up, must jump
      const hillStepW  = ri(100, 120);       // wide enough to land on and jump from
      const hillGapAsc = ri(62, 90);         // gap before each ascending step
      const hillPeakW  = ri(120, 155);       // peak width
      const hillPeakH  = hillRise * (hillSteps + 1);

      // Ascending: gaps force a jump; each step is a raised ground segment
      for (let s = 0; s < hillSteps; s++) {
        cx += hillGapAsc;                     // gap — player must jump across
        ground.push({ x: cx, w: hillStepW, y: GROUND_Y - hillRise * (s + 1) });
        cx += hillStepW;
      }
      // Peak
      cx += hillGapAsc;
      ground.push({ x: cx, w: hillPeakW, y: GROUND_Y - hillPeakH });
      presents.push({ x: cx + Math.floor(hillPeakW / 2), y: GROUND_Y - hillPeakH });
      cx += hillPeakW;

      // Descending: 0-gap so player falls naturally from step to step
      for (let s = hillSteps - 1; s >= 0; s--) {
        ground.push({ x: cx, w: hillStepW, y: GROUND_Y - hillRise * (s + 1) });
        cx += hillStepW;
      }
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      // Landing pad at ground level (0-gap from last descent step)
      const hillPadW = ri(segMin, segMax);
      ground.push({ x: cx, w: hillPadW });
      cx += hillPadW;

    } else if (type === 'ravine') {
      // ---- Ravine: wide gap spanned by small stepping-stone platforms ----
      const ravineW = ri(280, 380 + Math.round(t * 60));
      const numStones = ri(3, 4);
      const stoneSpacing = Math.floor(ravineW / (numStones + 1));
      for (let s = 0; s < numStones; s++) {
        const sx = cx + stoneSpacing * (s + 1) - ri(8, 12);
        const sw = ri(48, 65);
        const sy = GROUND_Y - ri(10, 50);
        platforms.push({ x: sx, y: sy, w: sw });
        if (s === Math.floor(numStones / 2)) {
          coins.push({ x: sx + Math.floor(sw / 2), y: sy - 25 });
        }
      }
      cx += ravineW;
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);
      cx += segW;

    } else if (type === 'zigzag') {
      // ---- Zigzag: alternating left-right elevated ledges ----
      const numLedges = ri(3, 5);
      const ledgeW = ri(80, 110);
      const ledgeRise = ri(38, 55);
      const ledgeShiftX = ri(60, 90);
      let zx = cx + 20;
      let zy = GROUND_Y;
      let side = rng() < 0.5 ? -1 : 1;
      for (let l = 0; l < numLedges; l++) {
        zy -= ledgeRise;
        zx += ledgeShiftX * side;
        platforms.push({ x: zx, y: zy, w: ledgeW });
        if (l === numLedges - 1) {
          presents.push({ x: zx + Math.floor(ledgeW / 2), y: zy });
        }
        side *= -1;
      }
      cx = zx + ledgeW + ri(40, 80);
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);
      cx += segW;

    } else if (type === 'floating') {
      // ---- Floating: chain of platforms over a void (no ground) ----
      const voidW = ri(350, 480 + Math.round(t * 50));
      const numPlats = ri(4, 6);
      const platSpacing = Math.floor(voidW / numPlats);
      for (let p = 0; p < numPlats; p++) {
        const px = cx + platSpacing * p + ri(10, 25);
        const pw = ri(55, 80);
        const py = GROUND_Y - ri(60, 130);
        platforms.push({ x: px, y: py, w: pw });
        if (rng() < 0.45) coins.push({ x: px + Math.floor(pw / 2), y: py - 22 });
      }
      cx += voidW;
      const segW = ri(segMin, segMax);
      if (flagCells.has(ci)) flags.push({ x: cx + ri(50, 90) });
      pushSeg(cx, segW, 0);
      cx += segW;
    }
  }

  // End zone — long solid ground leading to finish
  ground.push({ x: cx, w: endLen });
  const levelWidth = cx + endLen;
  const finishX    = levelWidth - 100;

  // --- Enemies: flat ground segments only (avoid hills — enemies don't transition heights) ---
  const flatSegs  = ground.filter((s, i) => i > 0 && i < ground.length - 1 && s.w >= 120 && !s.y);
  const enemyPool = flatSegs.length > 0 ? flatSegs : ground.slice(1, -1);
  const featureMinGap = Math.floor(80 + t * 60); // horizontal spacing between "important" spawns
  const enemyMinGap = featureMinGap; // math animals (dogs/wolves) stay farther apart
  let enemyXs = [];
  for (let i = 0; i < numEnemies; i++) {
    let ex = 0, type = 'dog', range = 0;
    let accepted = false;
    for (let attempt = 0; attempt < 40 && !accepted; attempt++) {
      const seg = enemyPool[Math.floor(rng() * enemyPool.length)];
      ex   = seg.x + ri(40, Math.max(41, seg.w - 40));
      type = rng() < wolfProb ? 'wolf' : 'dog';
      const maxRange = Math.max(20, Math.floor(seg.w / 2) - 25);
      range = Math.min(ri(80, 80 + Math.round(t * 70)), maxRange);
      accepted = enemyXs.every(px => Math.abs(px - ex) >= enemyMinGap);
    }
    enemies.push({ x: ex, type, range });
    enemyXs.push(ex);
  }

  // --- Turrets: snapped to actual ground segments (any height) ---
  const turretSegs = ground.filter((s, i) => i > 0 && i < ground.length - 1 && s.w >= 80);
  if (numTurrets > 0 && turretSegs.length > 0) {
    const turretEnemyMinGap = Math.floor(featureMinGap * 0.8);
    const turretMinGap = Math.floor(featureMinGap * 0.7);
    const turretXs = [];
    for (let i = 0; i < numTurrets; i++) {
      let tx = 0, dir = 1, interval = turretIntBase, type = 'cannon';
      let accepted = false;
      for (let attempt = 0; attempt < 25 && !accepted; attempt++) {
        const seg = turretSegs[Math.floor(rng() * turretSegs.length)];
        tx = seg.x + ri(20, Math.max(21, seg.w - 20));
        dir = rng() < 0.5 ? 1 : -1;
        interval = ri(turretIntBase - 10, turretIntBase + 10);
        type = rng() < fireProb ? 'fire' : 'cannon';
        const okVsEnemies = enemyXs.every(ex => Math.abs(ex - tx) >= turretEnemyMinGap);
        const okVsTurrets = turretXs.every(px => Math.abs(px - tx) >= turretMinGap);
        accepted = okVsEnemies && okVsTurrets;
      }
      turrets.push({ x: tx, dir, interval, type });
      turretXs.push(tx);
    }
  }

  // --- Presents: on mid-height platforms (no guaranteed start/end — filtered below) ---
  for (const plat of platforms) {
    if (plat.y > 300 && rng() < 0.65) { // mid platforms only (high platforms already have presents)
      presents.push({ x: plat.x + Math.floor(plat.w / 2), y: plat.y });
    }
  }
  // Drop presents too close to level start or before the finish line zone
  const presentMinX = Math.max(240, Math.floor(levelWidth * 0.08));
  const presentMaxX = finishX - 260;
  for (let pi = presents.length - 1; pi >= 0; pi--) {
    const px = presents[pi].x;
    if (px < presentMinX || px > presentMaxX) presents.splice(pi, 1);
  }

  // --- Flowers: multiple per level, scaling with difficulty; mix of sublevel types ---
  const numFlowers = 2 + ri(0, 1) + Math.floor(t * 3);   // 2..6
  if (flatSegs.length > 0) {
    const usedSegIndices = new Set();
    let flowerXs = [];
    for (let fi = 0; fi < numFlowers && usedSegIndices.size < flatSegs.length; fi++) {
      let idx, tries = 0;
      do { idx = Math.floor(rng() * flatSegs.length); tries++; }
      while (usedSegIndices.has(idx) && tries < 20);
      usedSegIndices.add(idx);
      const seg = flatSegs[idx];
      const fType = (fi % 4 === 0) ? 'star'
                   : (fi % 4 === 1) ? 'driving'
                   : (fi % 4 === 2) ? 'banana'
                   : 'tower';
      const fx = seg.x + ri(60, Math.max(61, seg.w - 60));
      const flowerEnemyMinGap = Math.floor(featureMinGap * 0.7);
      const flowerTurretMinGap = Math.floor(featureMinGap * 0.7);
      const flowerMinGap = Math.floor(featureMinGap * 0.6);
      const turretXs = turrets.map(tur => tur.x);
      const ok = enemyXs.every(ex => Math.abs(ex - fx) >= flowerEnemyMinGap) &&
                 turretXs.every(tx => Math.abs(tx - fx) >= flowerTurretMinGap) &&
                 flowerXs.every(px => Math.abs(px - fx) >= flowerMinGap);
      if (ok) {
        flowers.push({ x: fx, type: fType });
        flowerXs.push(fx);
      } else {
        // If this flower location is too cramped, skip it rather than creating overlap.
      }
    }

    // Fallback: if too many were skipped, relax spacing a bit to ensure variety.
    const desired = Math.min(numFlowers, flatSegs.length);
    if (flowerXs.length < desired) {
      const relaxEnemy = Math.floor(featureMinGap * 0.45);
      const relaxTurret = Math.floor(featureMinGap * 0.45);
      const relaxFlower = Math.floor(featureMinGap * 0.35);
      const turretXs2 = turrets.map(tu => tu.x);
      let safety = 0;
      while (flowerXs.length < desired && safety < 80) {
        safety++;
        const seg = flatSegs[Math.floor(rng() * flatSegs.length)];
        const fx = seg.x + ri(60, Math.max(61, seg.w - 60));
        const fType = (flowers.length % 4 === 0) ? 'star'
                     : (flowers.length % 4 === 1) ? 'driving'
                     : (flowers.length % 4 === 2) ? 'banana'
                     : 'tower';
        const ok = enemyXs.every(ex => Math.abs(ex - fx) >= relaxEnemy) &&
                   turretXs2.every(tx => Math.abs(tx - fx) >= relaxTurret) &&
                   flowerXs.every(px => Math.abs(px - fx) >= relaxFlower);
        if (ok) {
          flowers.push({ x: fx, type: fType });
          flowerXs.push(fx);
        }
      }
    }
  }

  // --- Floating coins: in air, on platforms, in lines along ground, on elevated terrain ---
  const numCoins = ri(14, 26 + Math.floor(t * 6));
  for (let i = 0; i < numCoins; i++) {
    const seg = ground[ri(0, ground.length - 1)];
    const gx = seg.x + ri(20, Math.max(21, seg.w - 20));
    const gy = (seg.y !== undefined ? seg.y : GROUND_Y) - ri(40, 120);
    if (gx > 80 && gx < cx + endLen - 80) coins.push({ x: gx, y: gy });
  }
  for (const plat of platforms) {
    if (rng() < 0.5) coins.push({ x: plat.x + Math.floor(plat.w / 2), y: plat.y - 20 });
  }
  // Coin lines along wider ground segments
  for (const seg of ground) {
    if (seg.w >= 200 && rng() < 0.35) {
      const gy = (seg.y !== undefined ? seg.y : GROUND_Y) - ri(28, 55);
      const lineLen = ri(3, 6);
      const startX = seg.x + ri(30, Math.max(31, Math.floor(seg.w / 4)));
      const spacing = ri(28, 42);
      for (let c = 0; c < lineLen; c++) {
        const coinX = startX + c * spacing;
        if (coinX < seg.x + seg.w - 20) coins.push({ x: coinX, y: gy });
      }
    }
  }

  return { width: levelWidth, theme, ground, platforms, flags, enemies, elevators, lava, turrets, presents, flowers, coins, finishX };
}

// Small fade out/in when switching between sublevels and math.
let fadeTransition = {
  active: false,
  phase: 'out', // 'out' -> 'in'
  timerFrames: 0,
  outFrames: 10,
  inFrames: 10,
  afterOut: null
};

function beginFadeTransition(afterOutFn, outFrames, inFrames) {
  if (fadeTransition.active) return;
  fadeTransition.active = true;
  fadeTransition.phase = 'out';
  fadeTransition.timerFrames = 0;
  fadeTransition.outFrames = outFrames ?? 10;
  fadeTransition.inFrames = inFrames ?? 10;
  fadeTransition.afterOut = afterOutFn;
}

function updateFadeTransition() {
  fadeTransition.timerFrames++;
  if (fadeTransition.phase === 'out') {
    if (fadeTransition.timerFrames >= fadeTransition.outFrames) {
      fadeTransition.phase = 'in';
      fadeTransition.timerFrames = 0;
      const fn = fadeTransition.afterOut;
      fadeTransition.afterOut = null;
      if (fn) fn();
    }
  } else {
    if (fadeTransition.timerFrames >= fadeTransition.inFrames) {
      fadeTransition.active = false;
      fadeTransition.phase = 'out';
      fadeTransition.timerFrames = 0;
    }
  }
}

function getFadeAlpha() {
  if (!fadeTransition.active) return 0;
  if (fadeTransition.phase === 'out') {
    return Math.min(1, fadeTransition.timerFrames / fadeTransition.outFrames);
  }
  return Math.max(0, 1 - fadeTransition.timerFrames / fadeTransition.inFrames);
}

let audioCtx = null;

const MUSIC_VOL = 0.045;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = MUSIC_VOL;
    musicGain.connect(audioCtx.destination);
  }
}

function tone(freq, dur, type, vol) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = vol || 0.08;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

/** Low growl / roar for the boss (Web Audio). */
function bossScarySound() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.001, t0);
  master.gain.exponentialRampToValueAtTime(0.16, t0 + 0.04);
  master.gain.exponentialRampToValueAtTime(0.001, t0 + 0.55);
  master.connect(audioCtx.destination);

  const o1 = audioCtx.createOscillator();
  o1.type = 'sawtooth';
  o1.frequency.setValueAtTime(72, t0);
  o1.frequency.exponentialRampToValueAtTime(32, t0 + 0.42);
  o1.connect(master);

  const o2 = audioCtx.createOscillator();
  o2.type = 'square';
  o2.frequency.setValueAtTime(68, t0);
  o2.frequency.linearRampToValueAtTime(38, t0 + 0.38);
  o2.connect(master);

  const o3 = audioCtx.createOscillator();
  o3.type = 'triangle';
  o3.frequency.setValueAtTime(140, t0);
  o3.frequency.exponentialRampToValueAtTime(55, t0 + 0.35);
  const g3 = audioCtx.createGain();
  g3.gain.value = 0.35;
  o3.connect(g3);
  g3.connect(master);

  o1.start(t0);
  o2.start(t0);
  o3.start(t0);
  o1.stop(t0 + 0.52);
  o2.stop(t0 + 0.52);
  o3.stop(t0 + 0.52);
}

function scheduleNote(freq, start, dur, type, vol, dest) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur * 0.95);
  o.connect(g); g.connect(dest || musicGain);
  o.start(start); o.stop(start + dur);
  musicNodes.push(o);
  return o;
}

function scheduleMelody() {
  if (!musicPlaying || !audioCtx) return;
  musicNodes = musicNodes.slice(-200);
  const now = audioCtx.currentTime + 0.05;
  let t = now;
  const bps = 2.8;
  for (let rep = 0; rep < 2; rep++) {
    for (const [freq, beats] of MELODY_NOTES) {
      const dur = beats / bps;
      scheduleNote(freq, t, dur, 'sine', 0.08, musicGain);
      t += dur;
    }
  }
  const loopLen = t - now;
  if (musicPlaying) setTimeout(() => scheduleMelody(), (loopLen - 1) * 1000);
}

function scheduleBass() {
  if (!musicPlaying || !audioCtx) return;
  const now = audioCtx.currentTime + 0.05;
  let t = now;
  const bps = 2.8;
  for (let rep = 0; rep < 4; rep++) {
    for (const [freq, beats] of BASS_NOTES) {
      const dur = beats / bps;
      scheduleNote(freq, t, dur, 'triangle', 0.06, musicGain);
      t += dur;
    }
  }
  const loopLen = t - now;
  if (musicPlaying) setTimeout(() => scheduleBass(), (loopLen - 1) * 1000);
}

function scheduleDrums() {
  if (!musicPlaying || !audioCtx) return;
  const now = audioCtx.currentTime + 0.05;
  const bps = 2.8;
  const beatLen = 1 / bps;
  const totalBeats = MELODY_NOTES.reduce((s,[,b])=>s+b,0) * 2;
  for (let b = 0; b < totalBeats; b++) {
    const t = now + b * beatLen;
    if (b % 4 === 0) {
      scheduleNote(55, t, 0.08, 'sine', 0.1, musicGain);
    }
    if (b % 4 === 2) {
      const n = audioCtx.createBufferSource();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
      n.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.04, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      n.connect(g); g.connect(musicGain);
      n.start(t); n.stop(t + 0.05);
      musicNodes.push(n);
    }
    if (b % 2 === 0) {
      scheduleNote(80, t, 0.04, 'square', 0.02, musicGain);
    }
  }
  const loopLen = totalBeats * beatLen;
  if (musicPlaying) setTimeout(() => scheduleDrums(), (loopLen - 1) * 1000);
}

function setMusicMood(state) {
  if (!musicGain) return;
  const t = audioCtx.currentTime;
  if (state === 'menu' || state === 'worldmap') {
    musicGain.gain.linearRampToValueAtTime(MUSIC_VOL * 0.7, t + 0.3);
  } else if (state === 'math_challenge') {
    musicGain.gain.linearRampToValueAtTime(MUSIC_VOL * 0.3, t + 0.2);
  } else {
    musicGain.gain.linearRampToValueAtTime(MUSIC_VOL, t + 0.3);
  }
}

// ==================== VOICE RECOGNITION ====================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceSupported = !!SpeechRecognition;
let micStream = null;
let micPermissionGranted = false;

function requestMicPermission() {
  if (micPermissionGranted) return Promise.resolve();
  return navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    micStream = stream;
    micPermissionGranted = true;
  }).catch(() => {});
}

function releaseMicPermission() {
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  micPermissionGranted = false;
}

function toggleVoiceMode() {
  voiceMode = !voiceMode;
  if (voiceMode) {
    requestMicPermission();
  } else {
    stopVoiceListening();
    releaseMicPermission();
  }
}

function startVoiceListening() {
  if (!voiceMode || !voiceSupported || voiceListening) return;
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.continuous = false;  // one-shot: short answers finalize faster
  voiceRecognition.interimResults = true;
  voiceRecognition.lang = 'en-US';
  voiceRecognition.maxAlternatives = 1;
  voiceTranscript = '';
  voiceListening = true;

  voiceRecognition.onresult = (ev) => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const text = ev.results[i][0].transcript.trim();
      if (ev.results[i].isFinal) {
        const num = parseSpokenNumber(text);
        if (num !== null) {
          mathTyped = String(num);
          voiceTranscript = String(num);
          submitMath();
        } else {
          voiceTranscript = '';
        }
      } else {
        interim = text;
      }
    }
    if (interim) voiceTranscript = interim;
  };

  voiceRecognition.onerror = (ev) => {
    if (ev.error === 'not-allowed' || ev.error === 'service-not-available') {
      voiceListening = false;
      return;
    }
  };
  voiceRecognition.onend = () => {
    voiceListening = false;
    if (gameState === 'math_challenge' && !mathResult && voiceMode) {
      setTimeout(() => startVoiceListening(), 100);
    }
  };
  try { voiceRecognition.start(); } catch(e) { voiceListening = false; }
}

function stopVoiceListening() {
  if (voiceRecognition) {
    try { voiceRecognition.abort(); } catch(e){}
    voiceRecognition = null;
  }
  voiceListening = false;
  voiceTranscript = '';
}

function parseSpokenNumber(text) {
  const cleaned = text.toLowerCase().replace(/[^0-9a-z\- ]/g, '');
  const direct = parseInt(cleaned);
  if (!isNaN(direct)) return direct;
  const words = {
    'zero':0,'oh':0,'one':1,'two':2,'to':2,'too':2,'three':3,'tree':3,
    'four':4,'for':4,'fore':4,'five':5,'six':6,'seven':7,'eight':8,'ate':8,
    'nine':9,'ten':10,'eleven':11,'twelve':12,'thirteen':13,'fourteen':14,
    'fifteen':15,'sixteen':16,'seventeen':17,'eighteen':18,'nineteen':19,
    'twenty':20,'thirty':30,'forty':40,'fifty':50,'sixty':60,'seventy':70,
    'eighty':80,'ninety':90
  };
  const parts = cleaned.split(/[\s-]+/);
  let total = 0, found = false;
  for (const p of parts) {
    if (words[p] !== undefined) { total += words[p]; found = true; }
  }
  if (found) return total;
  if (cleaned.includes('negative') || cleaned.includes('minus')) {
    const rest = cleaned.replace(/negative|minus/g, '').trim();
    const n = parseSpokenNumber(rest);
    if (n !== null) return -n;
  }
  return null;
}

// ==================== UTILITY ====================
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  initAudio();

  // Don't allow Enter to cancel the "Well done" overlays.
  if (e.code === 'Enter' || e.code === 'NumpadEnter') {
    const mathWellDone = (gameState === 'math_challenge' && mathResult === 'correct' && mathResultTimer > 0);
    const subWellDone = (gameState === 'flower_sublevel' || gameState === 'driving_sublevel' || gameState === 'banana_sublevel' || gameState === 'boss_sublevel' || gameState === 'tower_sublevel') && subWellDoneTimerFrames > 0;
    if (mathWellDone || subWellDone) {
      e.preventDefault();
      return;
    }
  }

  if (gameState === 'menu') {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { selectedChar = (selectedChar+NUM_CHARS-1)%NUM_CHARS; sndSelect(); }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { selectedChar = (selectedChar+1)%NUM_CHARS; sndSelect(); }
    if (e.code === 'KeyV' && voiceSupported) { toggleVoiceMode(); sndSelect(); }
    if (e.code === 'Enter' || e.code === 'Space') { startMusic(); gameState = 'worldmap'; sndSelect(); }
    if (e.code === 'KeyS') openStore();
  } else if (gameState === 'store') {
    if (e.code === 'Escape' || e.code === 'KeyB') { gameState = 'menu'; sndSelect(); }
    if (e.code === 'ArrowDown' || e.code === 'PageDown') {
      const m = getStoreMaxScroll();
      storeScrollY = Math.min(m, storeScrollY + STORE_ROW_H);
    }
    if (e.code === 'ArrowUp' || e.code === 'PageUp') {
      storeScrollY = Math.max(0, storeScrollY - STORE_ROW_H);
    }
  } else if (gameState === 'worldmap') {
    if (e.code >= 'Digit1' && e.code <= 'Digit6') {
      const li = parseInt(e.code[5])-1;
      if (isUnlocked(li)) { startLevel(li); sndSelect(); }
    }
  } else if (gameState === 'math_challenge' && !mathResult && !voiceMode) {
    if (e.code >= 'Digit0' && e.code <= 'Digit9') mathTyped += e.code[5];
    else if (e.code >= 'Numpad0' && e.code <= 'Numpad9') mathTyped += e.code[6];
    else if (e.code === 'Backspace') mathTyped = mathTyped.slice(0,-1);
    else if (e.code === 'Enter' || e.code === 'NumpadEnter') submitMath();
    else if ((e.code === 'Minus' || e.code === 'NumpadSubtract') && mathTyped.length === 0) mathTyped = '-';
  }
  if (gameState === 'level_complete' && (e.code === 'Enter' || e.code === 'Space')) returnToMap();
  if (gameState === 'game_over' && (e.code === 'Enter' || e.code === 'Space')) { playerLives = 3; levelsCompleted = [false,false,false,false,false,false]; returnToMap(); }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*W/r.width, y:(e.clientY-r.top)*H/r.height };
}

  const p = canvasPos(e);
  if (gameState === 'menu') menuClick(p);

  else if (gameState === 'math_challenge') mathClick(p);
  else if (gameState === 'level_complete') returnToMap();
  else if (gameState === 'game_over') { playerLives = 3; levelsCompleted = [false,false,false,false,false,false]; returnToMap(); }
});
canvas.addEventListener('wheel', e => {
  if (gameState !== 'store') return;
  e.preventDefault();
  clampStoreScroll();
  const maxS = getStoreMaxScroll();
  if (maxS <= 0) return;
  storeScrollY = Math.max(0, Math.min(maxS, storeScrollY + e.deltaY));
}, { passive: false });
canvas.addEventListener('mousemove', e => {
  const p = canvasPos(e);

    menuHoverChar = -1; menuHoverStart = false; menuHoverVoice = false; menuHoverStore = false;

    if (p.x > 320 && p.x < 480 && p.y > 400 && p.y < 450) menuHoverStart = true;
    if (p.x > 500 && p.x < 640 && p.y > 400 && p.y < 448) menuHoverStore = true;

    // Math difficulty selector

    if (p.x > mathSelX + 14 && p.x < mathSelX + 14 + 40 && p.y > mathSelY + 6 && p.y < mathSelY + mathSelH - 6) menuHoverMathLeft = true;
    if (p.x > mathSelX + mathSelW - 58 && p.x < mathSelX + mathSelW - 18 && p.y > mathSelY + 6 && p.y < mathSelY + mathSelH - 6) menuHoverMathRight = true;
  } else if (gameState === 'store') {
    storeMouseMove(p);
  } else if (gameState === 'worldmap') {
    hoveredLevel = -1;
    const storeBtnX = 24, storeBtnY = H - 52, storeBtnW = 100, storeBtnH = 36;
    mapHoverStore = (p.x >= storeBtnX && p.x <= storeBtnX + storeBtnW && p.y >= storeBtnY && p.y <= storeBtnY + storeBtnH);
    for (let i = 0; i < 6; i++) {

      const dx = p.x-n.x, dy = p.y-n.y;
      if (dx*dx+dy*dy < 35*35) hoveredLevel = i;
    }
  }
});

      selectedChar = i; sndSelect();

    toggleVoiceMode(); sndSelect();
  }
  // Math difficulty selector
  const mathSelX = 165, mathSelY = 318, mathSelW = 470, mathSelH = 30;
  const leftIn = (p.x > mathSelX + 14 && p.x < mathSelX + 14 + 40 && p.y > mathSelY + 6 && p.y < mathSelY + mathSelH - 6);
  const rightIn = (p.x > mathSelX + mathSelW - 58 && p.x < mathSelX + mathSelW - 18 && p.y > mathSelY + 6 && p.y < mathSelY + mathSelH - 6);
  if (leftIn || rightIn) {
    const delta = leftIn ? -1 : 1;
    mathDifficultyIdx = (mathDifficultyIdx + delta + MATH_DIFFICULTIES.length) % MATH_DIFFICULTIES.length;
    persistMathDifficultyIdx(mathDifficultyIdx);
    sndSelect();
    return;
  }
  if (p.x > 320 && p.x < 480 && p.y > 400 && p.y < 450) {
    startMusic(); gameState = 'worldmap'; sndSelect();
  }
  if (p.x > 500 && p.x < 640 && p.y > 400 && p.y < 448) {
    openStore();
  }
}
