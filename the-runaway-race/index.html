// ==================== PLAYER PHYSICS ====================
function updatePlayer() {
  if (playerOnElevator >= 0 && playerOnElevator < levelElevators.length) {
    const el = levelElevators[playerOnElevator];
    player.x += el.dx;
    player.y += el.dy;
  }

  const leftHeld = !!(keys.ArrowLeft || keys.KeyA);
  const rightHeld = !!(keys.ArrowRight || keys.KeyD);
  const moveInput = (leftHeld ? -1 : 0) + (rightHeld ? 1 : 0);

  const wasDucking = player.ducking;
  player.ducking = (keys.ArrowDown || keys.KeyS) && player.onGround;
  if (player.ducking && !wasDucking) {
    sndDuck();
  }

  const accel = player.onGround ? MOVE_ACCEL_GROUND : MOVE_ACCEL_AIR;
  const friction = player.onGround ? MOVE_FRICTION_GROUND : MOVE_FRICTION_AIR;
  const duckMax = MOVE_SPEED * 0.35; // ducking limits top speed (vx decelerates naturally)

  if (player.ducking) {
    // When ducking, we don't apply directional accel; vx will slow down via friction.
    player.wf = 0;
  }

  if (moveInput !== 0 && !player.ducking) {
    player.vx += moveInput * accel;
    // Clamp to max speed (snappier cap, but inertia comes from accel/friction).
    const max = MOVE_SPEED;
    if (player.vx > max) player.vx = max;
    if (player.vx < -max) player.vx = -max;
    player.facing = moveInput;
  } else {
    // Apply friction toward 0.
    if (player.vx > 0) {
      player.vx -= friction * (player.ducking ? 1.6 : 1);
      if (player.vx < 0) player.vx = 0;
    } else if (player.vx < 0) {
      player.vx += friction * (player.ducking ? 1.6 : 1);
      if (player.vx > 0) player.vx = 0;
    }
    if (Math.abs(player.vx) < MOVE_EPSILON) player.vx = 0;
  }

  const jumpKey = keys.ArrowUp || keys.KeyW;
  const jumpJustPressed = jumpKey && !jumpKeyWasDown;
  jumpKeyWasDown = jumpKey;
  if (jumpJustPressed && !player.ducking) {
    if (player.onGround) {
      player.vy = JUMP_VEL; player.onGround = false; sndJump();
    } else if (superJumpTimer > 0 && airJumpsLeft > 0) {
      player.vy = JUMP_VEL; airJumpsLeft = 0; sndAirJump();
    }
  }

  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  const oldBottom = player.y + PH;
  player.x += player.vx;
  player.y += player.vy;

  const lvl = LEVELS[currentLevel];
  if (player.x < 0) player.x = 0;
  if (player.x + PW > lvl.width) player.x = lvl.width - PW;

  player.onGround = false;
  playerOnElevator = -1;
  const newBottom = player.y + PH;

  for (const seg of lvl.ground) {
    const gy = seg.y !== undefined ? seg.y : GROUND_Y;
    const pc = player.x + PW / 2;
    if (pc >= seg.x && pc <= seg.x + seg.w) {
      if (oldBottom <= gy + 2 && newBottom >= gy && player.vy >= 0) {
        player.y = gy - PH; player.vy = 0; player.onGround = true; break;
      }
    }
  }

  // Stop at vertical terrain: don't walk into a step-up (no gap fall)
  if (player.onGround && currentLevel >= 0) {
    const curSeg = groundSegAt(player.x + PW / 2);
    if (curSeg) {
      const segL = curSeg.x, segR = curSeg.x + curSeg.w;
      const curY = curSeg.y !== undefined ? curSeg.y : GROUND_Y;
      if (player.vx > 0) {
        let nextSeg = null;
        for (const seg of lvl.ground) {
          if (seg.x >= segR && (!nextSeg || seg.x < nextSeg.x)) nextSeg = seg;
        }
        if (nextSeg && nextSeg.x <= segR + 8) {
          const nextY = nextSeg.y !== undefined ? nextSeg.y : GROUND_Y;
          if (nextY < curY) {
            if (player.x + PW > segR) player.x = segR - PW;
          }
        }
      } else if (player.vx < 0) {
        let prevSeg = null;
        for (const seg of lvl.ground) {
          if (seg.x + seg.w <= segL && (!prevSeg || seg.x + seg.w > prevSeg.x + prevSeg.w)) prevSeg = seg;
        }
        if (prevSeg && prevSeg.x + prevSeg.w >= segL - 8) {
          const prevY = prevSeg.y !== undefined ? prevSeg.y : GROUND_Y;
          if (prevY < curY) {
            if (player.x < segL) player.x = segL;
          }
        }
      }
    }
  }

  // Auto step-up: walk onto adjacent ground that is slightly higher (hill terrain)
  if (player.onGround && player.vx !== 0) {
    const aheadX = player.vx > 0 ? player.x + PW + 5 : player.x - 5;
    const aheadSeg = groundSegAt(aheadX);
    if (aheadSeg) {
      const aheadY = aheadSeg.y !== undefined ? aheadSeg.y : GROUND_Y;
      const stepH = (player.y + PH) - aheadY;
      if (stepH > 2 && stepH <= 34) {
        player.y = aheadY - PH;
      }
    }
  }

  if (!player.onGround && player.vy >= 0) {
    for (const pl of lvl.platforms) {
      if (player.x + PW > pl.x && player.x < pl.x + pl.w) {
        if (oldBottom <= pl.y + 2 && newBottom >= pl.y) {
          player.y = pl.y - PH; player.vy = 0; player.onGround = true; break;
        }
      }
    }
  }

  if (!player.onGround && player.vy >= 0) {
    for (let i = 0; i < levelElevators.length; i++) {
      const el = levelElevators[i];
      if (player.x + PW > el.x && player.x < el.x + el.w) {
        if (oldBottom <= el.y + 5 && newBottom >= el.y) {
          player.y = el.y - PH; player.vy = 0; player.onGround = true;
          playerOnElevator = i; break;
        }
      }
    }
  }

  // Super Run: run over pits and lava without falling (only when not jumping up)
  if (!player.onGround && superRunTimer > 0 && isOverPitOrLava(player.x) && player.vy >= 0) {
    player.onGround = true;
    player.vy = 0;
    player.y = GROUND_Y - PH;
  }

  if (player.onGround && superJumpTimer > 0) airJumpsLeft = 1;

  for (const lz of levelLava) {
    if (superRunTimer > 0) break;
    if (player.x + PW > lz.x && player.x < lz.x + lz.w && player.y + PH > GROUND_Y + 5) {
      if (immunityTimer > 0) break;
      sndLava();
      playerLives--;
      if (playerLives <= 0) { gameState = 'game_over'; return; }
      respawn(); return;
    }
  }

  checkProjectiles();

  if (player.y > H + 80) {
    playerLives--;
    if (playerLives <= 0) { gameState = 'game_over'; return; }
    respawn();
    return;
  }

  if (player.onGround && !player.ducking && Math.abs(player.vx) > MOVE_EPSILON) {
    player.wt++; if (player.wt > 7) { player.wt = 0; player.wf = (player.wf+1)%4; }
  } else if (player.onGround) {
    player.wf = 0; player.wt = 0;
  }

  const targetCam = player.x - 260;
  const maxCam = Math.max(0, lvl.width - W);
  const clampedTarget = Math.max(0, Math.min(targetCam, maxCam));
  cameraX += (clampedTarget - cameraX) * 0.1;

  checkFlags();
  checkFlowers();
  if (fadeTransition.active) return;
  checkEnemies();
  if (fadeTransition.active) return;
  checkFloatingCoins();
  if (player.x + PW >= lvl.finishX) startBossSublevel();

  if (upgrades.sidekickUnlocked) {
    sidekickReplay.push({ x: player.x, y: player.y, facing: player.facing, wf: player.wf, ducking: player.ducking, jumping: !player.onGround });
    if (sidekickReplay.length > SIDEKICK_DELAY_FRAMES + 5) sidekickReplay.shift();
  }
}

function respawn() {
  player.x = lastCheckpointX; player.y = groundYAt(lastCheckpointX) - PH - 20;
  player.vx = 0; player.vy = 0; player.onGround = false;
  player.ducking = false;
  mathFlashTimer = 30;
  playerOnElevator = -1;
  fallingSharksList = [];
  flyingBirdsList = [];
  flyingTurtlesList = [];
  waterDropsList = [];
  superJumpTimer = 0; airJumpsLeft = 0;
  immunityTimer = 0;
  superRunTimer = 0;
  sidekickReplay = [];
  sidekickCarrots = [];
  sidekickCarrotTimer = 0;
  sidekickState = null;
  sidekickFlyX = player.x; sidekickFlyY = player.y - SIDEKICK_FLY_OFFSET;
  sidekickOrbit.timer = 0;
  sidekickOrbit.targetDx = ((Math.random() * 2 - 1) * SIDEKICK_ORBIT_MAX_DX) - 18 * player.facing;
  sidekickOrbit.targetDy = (Math.random() * 2 - 1) * SIDEKICK_ORBIT_MAX_DY;
  flyingSidekickX = player.x; flyingSidekickY = player.y - SIDEKICK_FLY_OFFSET;
  flyingSidekickOrbit.timer = 0;
  flyingSidekickOrbit.targetDx = ((Math.random() * 2 - 1) * SIDEKICK_ORBIT_MAX_DX) + 18 * player.facing;
  flyingSidekickOrbit.targetDy = (Math.random() * 2 - 1) * SIDEKICK_ORBIT_MAX_DY;
  thrownBones = [];
  landedBones = [];
  sndRespawn();
  for (const e of levelEnemies) {
    if (e.alive) { e.triggered = false; e.stunTimer = 0; }
  }
}

// ==================== FLAGS ====================
function checkFlags() {
  for (let i = 0; i < levelFlags.length; i++) {
    const f = levelFlags[i];
    if (f.hung) continue;
    const dx = Math.abs((player.x + PW/2) - f.x);
    const fgy = groundYAt(f.x);
    if (dx < 22 && player.y + PH >= fgy - 4 && player.y + PH <= fgy + 4) {
      flagClimbIdx = i; flagClimbProg = 0;
      gameState = 'flag_climb'; sndFlag(); break;
    }
  }
}

function updateFlagClimb() {
  flagClimbProg += 0.015;
  if (flagClimbProg >= 1) {
    levelFlags[flagClimbIdx].hung = true;
    lastCheckpointX = levelFlags[flagClimbIdx].x - PW/2;
    player.x = lastCheckpointX;
    player.y = groundYAt(lastCheckpointX) - PH; player.vy = 0; player.onGround = true;
    flagClimbIdx = -1; sndCheckpoint();
    gameState = 'playing';
  }
}

// ==================== TERRAIN HELPERS ====================
// Returns the ground segment object under worldX, or null.
function groundSegAt(worldX) {
  if (currentLevel < 0) return null;
  for (const seg of LEVELS[currentLevel].ground) {
    if (worldX >= seg.x && worldX < seg.x + seg.w) return seg;
  }
  return null;
}

// Returns the surface y of the ground at worldX (defaults to GROUND_Y).
function groundYAt(worldX) {
  const seg = groundSegAt(worldX);
  return seg ? (seg.y !== undefined ? seg.y : GROUND_Y) : GROUND_Y;
}

// For backward compat (pit detection).
function groundAt(worldX) { return groundSegAt(worldX) !== null; }

function isOverPitOrLava(worldX) {
  if (groundSegAt(worldX) !== null) return false;
  for (const lz of levelLava) {
    if (worldX + PW > lz.x && worldX < lz.x + lz.w) return true;
  }
  return true; // no ground = pit
}

// ==================== ENEMIES ====================
function updateEnemies() {
  for (const e of levelEnemies) {
    if (!e.alive) continue;
    if (e.stunTimer > 0) { e.stunTimer--; continue; }
    const spd = e.type === 'wolf' ? 1.4 : 0.9;
    const ew  = e.type === 'wolf' ? 50 : 40;
    const curSeg  = groundSegAt(e.x);
    const curY    = curSeg ? (curSeg.y !== undefined ? curSeg.y : GROUND_Y) : GROUND_Y;
    const leadX   = e.dir > 0 ? e.x + ew + spd : e.x - spd;
    const leadSeg = groundSegAt(leadX);
    const leadY   = leadSeg ? (leadSeg.y !== undefined ? leadSeg.y : GROUND_Y) : GROUND_Y;
    if (!leadSeg || leadY !== curY) e.dir *= -1;
    e.x += e.dir * spd;
    if (e.x > e.baseX + e.range) e.dir = -1;
    if (e.x < e.baseX - e.range) e.dir = 1;
    e.wt++; if (e.wt > 10) { e.wt = 0; e.wf = (e.wf+1)%4; }
  }
}

function checkEnemies() {
  if (immunityTimer > 0) return;
  for (let i = 0; i < levelEnemies.length; i++) {
    const e = levelEnemies[i];
    if (!e.alive || e.triggered || e.stunTimer > 0) continue;
    const ew = e.type === 'wolf' ? 50 : 40;
    const ecx = e.x + ew/2;
    const pcx = player.x + PW/2;
    if (Math.abs(pcx - ecx) < 75 && player.y + PH > GROUND_Y - 50) {
      triggerMath(i); break;
    }
  }
}

// ==================== ELEVATORS ====================
function updateElevators() {
  for (const el of levelElevators) {
    if (el.type === 'vertical') {
      const prevY = el.y;
      el.y += el.dir * el.speed;
      if (el.y <= el.minY) { el.y = el.minY; el.dir = 1; }
      if (el.y >= el.maxY) { el.y = el.maxY; el.dir = -1; }
      el.dy = el.y - prevY;
      el.dx = 0;
    } else {
      const prevX = el.x;
      el.x += el.dir * el.speed;
      if (el.x <= el.minX) { el.x = el.minX; el.dir = 1; }
      if (el.x >= el.maxX) { el.x = el.maxX; el.dir = -1; }
      el.dx = el.x - prevX;
      el.dy = 0;
    }
  }
}

// ==================== TURRETS & PROJECTILES ====================
function updateTurrets() {
  for (const t of levelTurrets) {
    t.timer++;
    if (t.timer >= t.interval) {
      t.timer = 0;
      const spd = t.type === 'fire' ? 3.5 : 4.5;
      levelProjectiles.push({
        x: t.x + t.dir * 18, y: groundYAt(t.x) - 28,
        vx: spd * t.dir, vy: 0,
        type: t.type, age: 0, startX: t.x
      });
      const dx = t.x - cameraX;
      if (dx > -100 && dx < W + 100) sndShoot();
    }
  }
  for (let i = levelProjectiles.length - 1; i >= 0; i--) {
    const p = levelProjectiles[i];
    p.x += p.vx;
    if (p.type === 'fire') p.y += Math.sin(p.age * 0.08) * 0.6;
    p.age++;
    if (Math.abs(p.x - p.startX) > 500 || p.x < cameraX - 60 || p.x > cameraX + W + 60) {
      levelProjectiles.splice(i, 1);
    }
  }
}

function checkProjectiles() {
  if (mathFlashTimer > 0) return;
  if (immunityTimer > 0) return;
  const ph = player.ducking ? DUCK_PH : PH;
  const py = player.ducking ? (player.y + PH - DUCK_PH) : player.y;
  const pcx = player.x + PW / 2, pcy = py + ph / 2;
  for (let i = levelProjectiles.length - 1; i >= 0; i--) {
    const p = levelProjectiles[i];
    const r = p.type === 'fire' ? 8 : 6;
    if (Math.abs(p.x - pcx) < PW / 2 + r && Math.abs(p.y - pcy) < ph / 2 + r) {
      sndHit(); levelProjectiles.splice(i, 1);
      playerLives--;
      if (playerLives <= 0) { gameState = 'game_over'; return; }
      respawn(); return;
    }
  }
}

// ==================== PRESENTS ====================
function checkPresents() {
  const pcx = player.x + PW / 2;
  const pcy = player.y + PH / 2;
  for (const p of levelPresents) {
    if (p.collected) continue;
    const dx = Math.abs(pcx - p.x);
    const dy = Math.abs(pcy - (p.y - 16));
    if (dx < 24 && dy < 28) {
      p.collected = true;
      sndPresent();
      addCoins(3);
      triggerPresentReward(p.x);
    }
  }
}

function addCoins(n) {
  totalCoins += n;
  saveCoins();
}

function checkFloatingCoins() {
  const pcx = player.x + PW / 2;
  const pcy = player.y + PH / 2;
  for (const c of levelFloatingCoins) {
    if (c.collected) continue;
    const dx = Math.abs(pcx - c.x);
    const dy = Math.abs(pcy - c.y);
    if (dx < 22 && dy < 26) {
      c.collected = true;
      addCoins(1);
      if (audioCtx) tone(988, 0.06, 'sine', 0.08);
    }
  }
}

function checkFlowers() {
  for (let i = 0; i < levelFlowers.length; i++) {
    const f = levelFlowers[i];
    if (f.collected) continue;
    const fgy = groundYAt(f.x);
    const dx = Math.abs((player.x + PW / 2) - f.x);
    const dy = Math.abs((player.y + PH) - fgy);
    if (dx < 28 && dy < 40 && player.y + PH >= fgy - 20) {
      if (f.type === 'driving') startDrivingSublevel(i);
      else if (f.type === 'banana') startBananaSublevel(i);
      else if (f.type === 'tower') startTowerSublevel(i);
      else startFlowerSublevel(i);
      return;
    }
  }
}

function doStartFlowerSublevel(flowerIndex) {
  flowerSublevelFlowerIndex = flowerIndex;
  subStartCountdownFrames = SUB_START_COUNTDOWN_FRAMES;
  subWellDoneTimerFrames = 0;
  subWellDonePending = null;
  savedPlayerX = player.x;
  savedPlayerY = player.y;
  subLives = 5;
  subAirJumpsLeft = 1;
  subStars = [];
  const starRadius = 14;
  for (let si = 0; si < SUB_FLOWER_STAR_COUNT; si++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.8 + Math.random() * 0.9;
    subStars.push({
      x: starRadius + 40 + Math.random() * (SUB_ARENA_W - 2 * starRadius - 80),
      y: 70 + Math.random() * (SUB_GROUND_Y - 120 - 70),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: starRadius
    });
  }
  subMonsters = [
    { x: 120, y: SUB_GROUND_Y - 28, vx: 1.2, w: 40, h: 28, alive: true },
    { x: SUB_ARENA_W - 180, y: SUB_GROUND_Y - 28, vx: -1.0, w: 40, h: 28, alive: true },
    { x: SUB_ARENA_W / 2 - 80, y: SUB_GROUND_Y - 28, vx: 0.9, w: 40, h: 28, alive: true }
  ];
  subSquirrels = [
    { x: 45, y: SUB_GROUND_Y - 38, dir: 1, timer: 0 },
    { x: SUB_ARENA_W - 45, y: SUB_GROUND_Y - 38, dir: -1, timer: SUB_SQUIRREL_THROW_INTERVAL / 2 }
  ];
  subNuts = [];
  subHurtTimer = 0;
  player.x = SUB_ARENA_W / 2 - PW / 2;
  player.y = SUB_GROUND_Y - PH - 10;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.facing = 1;
  gameState = 'flower_sublevel';
  if (audioCtx) tone(523, 0.15, 'sine', 0.12);
}

function startFlowerSublevel(flowerIndex) {
  beginFadeTransition(() => doStartFlowerSublevel(flowerIndex), 10, 10);
}

function doExitFlowerSublevel() {
  if (flowerSublevelFlowerIndex >= 0 && flowerSublevelFlowerIndex < levelFlowers.length) {
    levelFlowers[flowerSublevelFlowerIndex].collected = true;
  }
  boneAmmo += 3;
  presentMsgText = '🦴 +3 bones!';
  presentMsgTimer = 120;
  player.x = savedPlayerX;
  player.y = savedPlayerY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  flowerSublevelFlowerIndex = -1;
  gameState = 'playing';
  if (audioCtx) tone(784, 0.2, 'sine', 0.1);
}

function exitFlowerSublevel() {
  if (subWellDoneTimerFrames > 0) return;
  subWellDonePending = 'flower_success';
  subWellDoneTimerFrames = WELL_DONE_FRAMES;
}

function doExitFlowerSublevelFailed() {
  player.x = savedPlayerX;
  player.y = savedPlayerY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  flowerSublevelFlowerIndex = -1;
  playerLives--;
  if (playerLives <= 0) gameState = 'game_over';
  else gameState = 'playing';
  if (audioCtx) tone(180, 0.2, 'square', 0.12);
}

function exitFlowerSublevelFailed() {
  beginFadeTransition(() => doExitFlowerSublevelFailed(), 10, 10);
}

function updateFlowerSublevel() {
  if (subHurtTimer > 0) subHurtTimer--;

  if (subStartCountdownFrames > 0) {
    subStartCountdownFrames--;
    return;
  }

  if (subWellDoneTimerFrames > 0) {
    subWellDoneTimerFrames--;
    if (subWellDoneTimerFrames <= 0 && subWellDonePending === 'flower_success') {
      subWellDonePending = null;
      beginFadeTransition(() => doExitFlowerSublevel(), 10, 10);
    }
    return;
  }

  // Player physics: super jump (can jump again in air, one extra)
  player.vx = 0;
  if (keys.ArrowLeft || keys.KeyA) { player.vx = -MOVE_SPEED; player.facing = -1; }
  if (keys.ArrowRight || keys.KeyD) { player.vx = MOVE_SPEED; player.facing = 1; }
  const jumpKey = keys.ArrowUp || keys.KeyW;
  const jumpJustPressed = jumpKey && !jumpKeyWasDown;
  jumpKeyWasDown = jumpKey;
  if (jumpJustPressed) {
    if (player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      subAirJumpsLeft = 1;
      if (audioCtx) tone(330, 0.08, 'square', 0.06);
    } else if (subAirJumpsLeft > 0) {
      player.vy = JUMP_VEL;
      subAirJumpsLeft--;
      if (audioCtx) tone(392, 0.07, 'square', 0.06);
    }
  }
  if (player.onGround) subAirJumpsLeft = 1;
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.x += player.vx;
  player.y += player.vy;
  if (player.x < 0) player.x = 0;
  if (player.x + PW > SUB_ARENA_W) player.x = SUB_ARENA_W - PW;
  player.onGround = false;
  if (player.y + PH >= SUB_GROUND_Y && player.vy >= 0) {
    player.y = SUB_GROUND_Y - PH;
    player.vy = 0;
    player.onGround = true;
  }
  player.wf = (player.wf + (player.vx !== 0 ? 0.2 : 0)) % 4;

  // Stars: bounce around screen
  for (const st of subStars) {
    st.x += st.vx;
    st.y += st.vy;
    if (st.x - st.radius < 0) { st.x = st.radius; st.vx = Math.abs(st.vx); }
    if (st.x + st.radius > SUB_ARENA_W) { st.x = SUB_ARENA_W - st.radius; st.vx = -Math.abs(st.vx); }
    if (st.y - st.radius < 50) { st.y = 50 + st.radius; st.vy = Math.abs(st.vy); }
    if (st.y + st.radius > SUB_GROUND_Y - 30) { st.y = SUB_GROUND_Y - 30 - st.radius; st.vy = -Math.abs(st.vy); }
  }

  // Squirrels: throw nuts horizontally
  for (const sq of subSquirrels) {
    sq.timer++;
    if (sq.timer >= SUB_SQUIRREL_THROW_INTERVAL) {
      sq.timer = 0;
      subNuts.push({
        x: sq.x + sq.dir * 22,
        y: sq.y - 8,
        vx: sq.dir * SUB_NUT_SPEED,
        r: 6
      });
    }
  }
  for (let i = subNuts.length - 1; i >= 0; i--) {
    const nut = subNuts[i];
    nut.x += nut.vx;
    if (nut.x < -30 || nut.x > SUB_ARENA_W + 30) subNuts.splice(i, 1);
  }

  // Monsters: patrol left-right
  for (const m of subMonsters) {
    if (!m.alive) continue;
    m.x += m.vx;
    if (m.x <= 20) { m.x = 20; m.vx = Math.abs(m.vx); }
    if (m.x + m.w >= SUB_ARENA_W - 20) { m.x = SUB_ARENA_W - 20 - m.w; m.vx = -Math.abs(m.vx); }
  }

  // Stomp: player falling onto monster from above
  for (const m of subMonsters) {
    if (!m.alive) continue;
    const mx = m.x + m.w / 2;
    const pcx = player.x + PW / 2;
    if (player.vy > 0 && Math.abs(pcx - mx) < (PW / 2 + m.w / 2) &&
        player.y + PH >= m.y - 4 && player.y + PH <= m.y + m.h + 4) {
      m.alive = false;
      player.vy = JUMP_VEL * 0.5;
      addCoins(5);
      if (audioCtx) tone(440, 0.1, 'square', 0.08);
    }
  }

  // Monster or nut hit (only when not invincible)
  if (subHurtTimer <= 0) {
    for (const m of subMonsters) {
      if (!m.alive) continue;
      const pcx = player.x + PW / 2;
      const pcy = player.y + PH / 2;
      const mcx = m.x + m.w / 2;
      const mcy = m.y + m.h / 2;
      if (Math.abs(pcx - mcx) < (PW / 2 + m.w / 2) && Math.abs(pcy - mcy) < (PH / 2 + m.h / 2)) {
        if (player.vy <= 0 || player.y + PH > m.y + m.h - 2) {
          subLives--;
          subHurtTimer = 50;
          if (subLives <= 0) { exitFlowerSublevelFailed(); return; }
          player.x = SUB_ARENA_W / 2 - PW / 2;
          player.y = SUB_GROUND_Y - PH - 10;
          player.vx = 0;
          player.vy = 0;
          player.onGround = true;
          if (audioCtx) tone(200, 0.15, 'square', 0.1);
        }
      }
    }
    for (let i = subNuts.length - 1; i >= 0; i--) {
      const nut = subNuts[i];
      const pcx = player.x + PW / 2;
      const pcy = player.y + PH / 2;
      if (Math.abs(pcx - nut.x) < PW / 2 + nut.r && Math.abs(pcy - nut.y) < PH / 2 + nut.r) {
        subNuts.splice(i, 1);
        subLives--;
        subHurtTimer = 50;
        if (subLives <= 0) { exitFlowerSublevelFailed(); return; }
        player.x = SUB_ARENA_W / 2 - PW / 2;
        player.y = SUB_GROUND_Y - PH - 10;
        player.vx = 0;
        player.vy = 0;
        player.onGround = true;
        if (audioCtx) tone(200, 0.15, 'square', 0.1);
      }
    }
  }

  // Catch stars (need all)
  const pcx = player.x + PW / 2;
  const pcy = player.y + PH / 2;
  for (let i = subStars.length - 1; i >= 0; i--) {
    const st = subStars[i];
    if (Math.abs(pcx - st.x) < PW / 2 + st.radius && Math.abs(pcy - st.y) < PH / 2 + st.radius) {
      subStars.splice(i, 1);
      if (subStars.length === 0) exitFlowerSublevel();
      else if (audioCtx) tone(659, 0.09, 'sine', 0.1);
      break;
    }
  }
}

function drawFlowerSublevel() {
  const ti = LEVELS[currentLevel].theme;
  const t = THEMES[ti];
  const grad = ctx.createLinearGradient(0, 0, 0, SUB_GROUND_Y);
  grad.addColorStop(0, '#1a2a4a');
  grad.addColorStop(1, '#2a3a5a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
  ctx.fillStyle = t.groundDark || '#3a5a3a';
  ctx.fillRect(0, SUB_GROUND_Y, SUB_ARENA_W, SUB_ARENA_H - SUB_GROUND_Y);
  ctx.fillStyle = t.grass || '#4a7a4a';
  for (let gx = 0; gx < SUB_ARENA_W; gx += 14) {
    ctx.beginPath();
    ctx.moveTo(gx, SUB_GROUND_Y);
    ctx.lineTo(gx + 4, SUB_GROUND_Y - 6);
    ctx.lineTo(gx + 8, SUB_GROUND_Y);
    ctx.fill();
  }
  // Stars (5-pointed star shapes)
  for (let si = 0; si < subStars.length; si++) {
    const subStar = subStars[si];
    ctx.save();
    const starGlow = 0.4 + 0.25 * Math.sin(frameCount * 0.1 + si * 0.7);
    ctx.fillStyle = `rgba(255, 230, 80, ${starGlow})`;
    ctx.beginPath();
    const R = subStar.radius + 4;
    const r = subStar.radius * 0.45;
    for (let i = 0; i < 10; i++) {
      const a = (i * Math.PI / 5) - Math.PI / 2;
      const rad = i % 2 === 0 ? R : r;
      const px = subStar.x + Math.cos(a) * rad;
      const py = subStar.y + Math.sin(a) * rad;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.strokeStyle = '#e6c200';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(subStar.x - 3, subStar.y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Monsters (monster look: horns, teeth, angry eyes)
  for (const m of subMonsters) {
    if (!m.alive) continue;
    const mx = m.x + m.w / 2;
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(m.x, m.y, m.w, m.h);
    ctx.fillStyle = '#4a3a5a';
    ctx.fillRect(m.x + 2, m.y + 2, m.w - 4, m.h - 6);
    ctx.fillStyle = '#1a0a2a';
    ctx.beginPath();
    ctx.moveTo(m.x + 8, m.y + m.h);
    ctx.lineTo(m.x + 14, m.y + m.h + 6);
    ctx.lineTo(m.x + 20, m.y + m.h);
    ctx.moveTo(m.x + m.w - 20, m.y + m.h);
    ctx.lineTo(m.x + m.w - 14, m.y + m.h + 6);
    ctx.lineTo(m.x + m.w - 8, m.y + m.h);
    ctx.fill();
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(mx - 6, m.y + 10, 4, 0, Math.PI * 2);
    ctx.arc(mx + 6, m.y + 10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(mx - 6, m.y + 10, 2, 0, Math.PI * 2);
    ctx.arc(mx + 6, m.y + 10, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(m.x + 6, m.y + m.h - 4);
    ctx.lineTo(m.x + 10, m.y + m.h - 8);
    ctx.lineTo(m.x + 14, m.y + m.h - 4);
    ctx.moveTo(m.x + 22, m.y + m.h - 4);
    ctx.lineTo(m.x + 26, m.y + m.h - 8);
    ctx.lineTo(m.x + 30, m.y + m.h - 4);
    ctx.moveTo(m.x + m.w - 30, m.y + m.h - 4);
    ctx.lineTo(m.x + m.w - 26, m.y + m.h - 8);
    ctx.lineTo(m.x + m.w - 22, m.y + m.h - 4);
    ctx.moveTo(m.x + m.w - 14, m.y + m.h - 4);
    ctx.lineTo(m.x + m.w - 10, m.y + m.h - 8);
    ctx.lineTo(m.x + m.w - 6, m.y + m.h - 4);
    ctx.fill();
    ctx.fillStyle = '#5a2a1a';
    ctx.beginPath();
    ctx.moveTo(m.x + 4, m.y + 4);
    ctx.lineTo(m.x + 4, m.y + 14);
    ctx.lineTo(m.x + 8, m.y + 12);
    ctx.moveTo(m.x + m.w - 4, m.y + 4);
    ctx.lineTo(m.x + m.w - 4, m.y + 14);
    ctx.lineTo(m.x + m.w - 8, m.y + 12);
    ctx.fill();
  }
  // Squirrels
  for (const sq of subSquirrels) {
    ctx.save();
    ctx.translate(sq.x, sq.y);
    if (sq.dir < 0) ctx.scale(-1, 1);
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#a0522d';
    ctx.beginPath();
    ctx.ellipse(12, -4, 10, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#654321';
    ctx.beginPath();
    ctx.ellipse(18, 2, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(14, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Nuts
  for (const nut of subNuts) {
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.ellipse(nut.x, nut.y, nut.r, nut.r * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6B4914';
    ctx.strokeStyle = '#5a4010';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Player (flash when hurt)
  if (subHurtTimer <= 0 || Math.floor(subHurtTimer / 4) % 2 === 0) {
    drawCharSprite(player.x, player.y, player.facing, player.wf, selectedChar, 1, !player.onGround);
  }
  // HUD: lives + hint
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, SUB_ARENA_W, 42);
  ctx.fillStyle = '#ff4757';
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  let livesStr = '';
  for (let i = 0; i < subLives; i++) livesStr += '❤️';
  ctx.fillText(livesStr || '0', 12, 28);
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  const starHud = subStars.length > 0
    ? `${subStars.length} star${subStars.length === 1 ? '' : 's'} left (catch ${SUB_FLOWER_STAR_COUNT}) · `
    : '';
  ctx.fillText(`${starHud}Jump monsters · Dodge nuts`, SUB_ARENA_W / 2, 28);

  // Start countdown / well done overlays (draw on top)
  if (subStartCountdownFrames > 0) {
    const sec = Math.ceil(subStartCountdownFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 72px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(sec), SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 22);
  } else if (subWellDoneTimerFrames > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 62px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Well done!', SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 10);
  }
  ctx.textAlign = 'start';
}

function drawFlowers() {
  const lvl = LEVELS[currentLevel];
  for (let i = 0; i < levelFlowers.length; i++) {
    const f = levelFlowers[i];
    if (f.collected) continue;
    const px = f.x - cameraX;
    if (px < -40 || px > W + 40) continue;
    const fgy = groundYAt(f.x);
    const by = fgy - 32 + Math.sin(frameCount * 0.05 + i) * 3;
    const isDriving = f.type === 'driving';
    const isBanana = f.type === 'banana';
    const isTower = f.type === 'tower';
    ctx.fillStyle = '#2d5a2d';
    ctx.beginPath();
    ctx.moveTo(px, fgy);
    ctx.lineTo(px - 6, by + 18);
    ctx.lineTo(px + 6, by + 18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = isTower ? '#9b59b6' : (isBanana ? '#ffd23f' : (isDriving ? '#69b4ff' : '#ff69b4'));
    ctx.beginPath();
    ctx.ellipse(px, by + 8, 12, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isTower ? '#6c3483' : (isBanana ? '#c49100' : (isDriving ? '#3388dd' : '#ff1493'));
    ctx.beginPath();
    ctx.arc(px - 5, by + 5, 5, 0, Math.PI * 2);
    ctx.arc(px + 5, by + 6, 5, 0, Math.PI * 2);
    ctx.arc(px, by + 12, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isTower ? '#d7bde2' : (isBanana ? '#fff3b0' : (isDriving ? '#ffaa00' : '#ffd700'));
    ctx.beginPath();
    ctx.arc(px, by + 8, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBones() {
  // Thrown bones (in flight)
  for (const b of thrownBones) {
    const bx = b.x - cameraX;
    if (bx < -20 || bx > W + 20) continue;
    ctx.save();
    ctx.translate(bx, b.y);
    ctx.rotate((b.spin || 0) * b.dir * 8);
    ctx.fillStyle = '#f5f5dc';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#eee8d0';
    ctx.beginPath();
    ctx.arc(-8, 0, 4, 0, Math.PI * 2);
    ctx.arc(8, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Landed bones (on ground, collectible)
  for (const lb of landedBones) {
    const bx = lb.x - cameraX;
    if (bx < -20 || bx > W + 20) continue;
    ctx.fillStyle = '#f5f5dc';
    ctx.beginPath();
    ctx.ellipse(bx, lb.y, 9, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#eee8d0';
    ctx.beginPath();
    ctx.arc(bx - 7, lb.y, 3.5, 0, Math.PI * 2);
    ctx.arc(bx + 7, lb.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
  // Stunned enemy indicator
  for (const e of levelEnemies) {
    if (!e.alive || e.stunTimer <= 0) continue;
    const ex = e.x - cameraX;
    if (ex < -60 || ex > W + 60) continue;
    const ew = e.type === 'wolf' ? 50 : 40;
    const ey = groundYAt(e.x) - (e.type === 'wolf' ? 38 : 30);
    ctx.fillStyle = '#f5f5dc';
    ctx.beginPath();
    ctx.ellipse(ex + ew / 2, ey - 5, 8, 3, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#eee8d0';
    ctx.beginPath();
    ctx.arc(ex + ew / 2 - 6, ey - 5, 3, 0, Math.PI * 2);
    ctx.arc(ex + ew / 2 + 6, ey - 5, 3, 0, Math.PI * 2);
    ctx.fill();
    // Munch effect
    ctx.fillStyle = 'rgba(255,255,100,0.7)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    const munch = frameCount % 40 < 20 ? '🦴 nom' : '🦴 yum';
    ctx.fillText(munch, ex + ew / 2, ey - 16);
    ctx.textAlign = 'start';
  }
}

// ==================== DRIVING SUB-LEVEL ====================
function laneCenter(lane) {
  return DRIVING_ROAD_X + DRIVING_LANE_W * lane + DRIVING_LANE_W / 2;
}

function doStartDrivingSublevel(flowerIndex) {
  drivingFlowerIndex = flowerIndex;
  subStartCountdownFrames = SUB_START_COUNTDOWN_FRAMES;
  subWellDoneTimerFrames = 0;
  subWellDonePending = null;
  drivingSavedX = player.x;
  drivingSavedY = player.y;
  drivingLane = 1;
  drivingTargetLane = 1;
  drivingLaneX = laneCenter(1);
  drivingSpeed = 3;
  drivingScroll = 0;
  drivingStarsCollected = 0;
  drivingLives = 3;
  drivingHurtTimer = 0;
  drivingObstacles = [];
  drivingStars = [];
  drivingSpawnTimer = 0;
  drivingStarSpawnTimer = 40;
  drivingLaneKeyWasDown = { left: false, right: false };
  drivingAmmo = 0;
  drivingBullets = [];
  drivingPresents = [];
  drivingPresentSpawnTimer = 0;
  drivingShootKeyWasDown = false;
  gameState = 'driving_sublevel';
  if (audioCtx) tone(440, 0.12, 'sine', 0.1);
}

function startDrivingSublevel(flowerIndex) {
  beginFadeTransition(() => doStartDrivingSublevel(flowerIndex), 10, 10);
}

function doExitDrivingSublevelSuccess() {
  if (drivingFlowerIndex >= 0 && drivingFlowerIndex < levelFlowers.length) {
    levelFlowers[drivingFlowerIndex].collected = true;
  }
  addCoins(DRIVING_COIN_REWARD);
  boneAmmo += 3;
  presentMsgText = '🏎️ +' + DRIVING_COIN_REWARD + ' coins!  🦴 +3 bones!';
  presentMsgTimer = 180;
  player.x = drivingSavedX;
  player.y = drivingSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  drivingFlowerIndex = -1;
  gameState = 'playing';
  if (audioCtx) { tone(523, 0.1, 'sine', 0.1); tone(659, 0.1, 'sine', 0.08); tone(784, 0.15, 'sine', 0.1); }
}

function exitDrivingSublevelSuccess() {
  if (subWellDoneTimerFrames > 0) return;
  subWellDonePending = 'driving_success';
  subWellDoneTimerFrames = WELL_DONE_FRAMES;
}

function doExitDrivingSublevelFailed() {
  player.x = drivingSavedX;
  player.y = drivingSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  drivingFlowerIndex = -1;
  gameState = 'playing';
  if (audioCtx) tone(180, 0.2, 'square', 0.12);
}

function exitDrivingSublevelFailed() {
  beginFadeTransition(() => doExitDrivingSublevelFailed(), 10, 10);
}

function updateDrivingSublevel() {
  if (subStartCountdownFrames > 0) {
    subStartCountdownFrames--;
    return;
  }

  if (subWellDoneTimerFrames > 0) {
    subWellDoneTimerFrames--;
    if (subWellDoneTimerFrames <= 0 && subWellDonePending === 'driving_success') {
      subWellDonePending = null;
      beginFadeTransition(() => doExitDrivingSublevelSuccess(), 10, 10);
    }
    return;
  }

  if (drivingHurtTimer > 0) drivingHurtTimer--;
  drivingScroll += drivingSpeed;

  // Speed control
  if (keys.ArrowUp || keys.KeyW) drivingSpeed = Math.min(DRIVING_MAX_SPEED, drivingSpeed + 0.06);
  if (keys.ArrowDown || keys.KeyS) drivingSpeed = Math.max(DRIVING_MIN_SPEED, drivingSpeed - 0.08);

  // Lane switching (edge-triggered)
  const leftDown = !!(keys.ArrowLeft || keys.KeyA);
  const rightDown = !!(keys.ArrowRight || keys.KeyD);
  if (leftDown && !drivingLaneKeyWasDown.left && drivingTargetLane > 0) {
    drivingTargetLane--;
    if (audioCtx) tone(350, 0.04, 'sine', 0.06);
  }
  if (rightDown && !drivingLaneKeyWasDown.right && drivingTargetLane < 2) {
    drivingTargetLane++;
    if (audioCtx) tone(350, 0.04, 'sine', 0.06);
  }
  drivingLaneKeyWasDown.left = leftDown;
  drivingLaneKeyWasDown.right = rightDown;

  // Shooting (Space to fire)
  const shootDown = !!(keys.Space);
  if (shootDown && !drivingShootKeyWasDown && drivingAmmo > 0) {
    drivingAmmo--;
    drivingBullets.push({ x: drivingLaneX, y: DRIVING_CAR_Y - 6 });
    if (audioCtx) tone(600, 0.06, 'square', 0.08);
  }
  drivingShootKeyWasDown = shootDown;

  // Smooth lane transition
  const targetX = laneCenter(drivingTargetLane);
  drivingLaneX += (targetX - drivingLaneX) * 0.18;

  // Spawn obstacles — guarantee at least one lane is free
  drivingSpawnTimer++;
  const spawnInterval = Math.max(22, 55 - drivingSpeed * 4);
  if (drivingSpawnTimer >= spawnInterval) {
    drivingSpawnTimer = 0;
    // Pick 1 or 2 lanes (never all 3)
    const numObs = Math.random() < 0.3 ? 2 : 1;
    const lanes = [0, 1, 2];
    for (let i = lanes.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [lanes[i], lanes[j]] = [lanes[j], lanes[i]]; }
    const chosenLanes = lanes.slice(0, numObs);
    for (const lane of chosenLanes) {
      // Ensure minimum gap from recent obstacles in the same lane
      const tooClose = drivingObstacles.some(o => o.lane === lane && o.y < DRIVING_MIN_OBSTACLE_GAP);
      if (tooClose) continue;
      const obstType = Math.random() < 0.5 ? 'car' : (Math.random() < 0.5 ? 'rock' : 'barrel');
      drivingObstacles.push({
        x: laneCenter(lane),
        y: -60,
        lane: lane,
        type: obstType,
        w: obstType === 'car' ? 44 : 30,
        h: obstType === 'car' ? 70 : 30
      });
    }
  }

  // Spawn stars — away from obstacles
  drivingStarSpawnTimer++;
  if (drivingStarSpawnTimer >= 120 && drivingStarsCollected + drivingStars.length < DRIVING_STARS_NEEDED) {
    drivingStarSpawnTimer = 0;
    let bestLane = -1;
    let bestDist = 0;
    for (let l = 0; l < 3; l++) {
      let minDist = 999;
      for (const o of drivingObstacles) {
        if (o.lane === l && o.y < 120 && o.y > -120) {
          minDist = Math.min(minDist, Math.abs(o.y + 30));
        }
      }
      if (minDist > bestDist) { bestDist = minDist; bestLane = l; }
    }
    if (bestLane < 0) bestLane = Math.floor(Math.random() * 3);
    drivingStars.push({ x: laneCenter(bestLane), y: -30, lane: bestLane, r: 14 });
  }

  // Spawn presents (ammo pickups)
  drivingPresentSpawnTimer++;
  if (drivingPresentSpawnTimer >= 200) {
    drivingPresentSpawnTimer = 0;
    let pLane = Math.floor(Math.random() * 3);
    const blocked = drivingObstacles.some(o => o.lane === pLane && o.y < 100 && o.y > -100);
    if (blocked) pLane = (pLane + 1) % 3;
    drivingPresents.push({ x: laneCenter(pLane), y: -30, lane: pLane });
  }

  // Move obstacles, stars, bullets, presents
  for (let i = drivingObstacles.length - 1; i >= 0; i--) {
    drivingObstacles[i].y += drivingSpeed;
    if (drivingObstacles[i].y > H + 80) drivingObstacles.splice(i, 1);
  }
  for (let i = drivingStars.length - 1; i >= 0; i--) {
    drivingStars[i].y += drivingSpeed;
    if (drivingStars[i].y > H + 40) drivingStars.splice(i, 1);
  }
  for (let i = drivingBullets.length - 1; i >= 0; i--) {
    drivingBullets[i].y -= 8;
    if (drivingBullets[i].y < -20) drivingBullets.splice(i, 1);
  }
  for (let i = drivingPresents.length - 1; i >= 0; i--) {
    drivingPresents[i].y += drivingSpeed;
    if (drivingPresents[i].y > H + 40) drivingPresents.splice(i, 1);
  }

  // Bullet-obstacle collision
  for (let bi = drivingBullets.length - 1; bi >= 0; bi--) {
    const b = drivingBullets[bi];
    for (let oi = drivingObstacles.length - 1; oi >= 0; oi--) {
      const o = drivingObstacles[oi];
      if (Math.abs(b.x - o.x) < o.w / 2 + 6 && b.y > o.y && b.y < o.y + o.h) {
        drivingBullets.splice(bi, 1);
        drivingObstacles.splice(oi, 1);
        if (audioCtx) tone(520, 0.06, 'sine', 0.08);
        break;
      }
    }
  }

  // Car collision box
  const carLeft = drivingLaneX - DRIVING_CAR_W / 2;
  const carRight = drivingLaneX + DRIVING_CAR_W / 2;
  const carTop = DRIVING_CAR_Y;
  const carBottom = DRIVING_CAR_Y + DRIVING_CAR_H;

  // Collect presents (ammo)
  for (let i = drivingPresents.length - 1; i >= 0; i--) {
    const p = drivingPresents[i];
    if (Math.abs(drivingLaneX - p.x) < DRIVING_CAR_W / 2 + 14 &&
        p.y + 14 > carTop && p.y - 14 < carBottom) {
      drivingPresents.splice(i, 1);
      drivingAmmo += 3;
      if (audioCtx) tone(880, 0.06, 'sine', 0.1);
    }
  }

  // Check obstacle collisions (no star reset)
  if (drivingHurtTimer <= 0) {
    for (let i = drivingObstacles.length - 1; i >= 0; i--) {
      const o = drivingObstacles[i];
      const oLeft = o.x - o.w / 2;
      const oRight = o.x + o.w / 2;
      const oTop = o.y;
      const oBottom = o.y + o.h;
      if (carRight > oLeft && carLeft < oRight && carBottom > oTop && carTop < oBottom) {
        drivingObstacles.splice(i, 1);
        drivingLives--;
        drivingHurtTimer = 45;
        drivingSpeed = Math.max(DRIVING_MIN_SPEED, drivingSpeed * 0.5);
        if (audioCtx) tone(180, 0.12, 'square', 0.1);
        if (drivingLives <= 0) { exitDrivingSublevelFailed(); return; }
      }
    }
  }

  // Check star collection
  for (let i = drivingStars.length - 1; i >= 0; i--) {
    const s = drivingStars[i];
    if (Math.abs(drivingLaneX - s.x) < DRIVING_CAR_W / 2 + s.r &&
        s.y + s.r > carTop && s.y - s.r < carBottom) {
      drivingStars.splice(i, 1);
      drivingStarsCollected++;
      if (audioCtx) tone(660, 0.08, 'sine', 0.1);
      if (drivingStarsCollected >= DRIVING_STARS_NEEDED) {
        exitDrivingSublevelSuccess();
        return;
      }
    }
  }
}

function drawDrivingSublevel() {
  // Background: dark road scene
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Grass shoulders
  ctx.fillStyle = '#2a6a2a';
  ctx.fillRect(0, 0, DRIVING_ROAD_X, H);
  ctx.fillRect(DRIVING_ROAD_X + DRIVING_LANE_W * 3, 0, W - (DRIVING_ROAD_X + DRIVING_LANE_W * 3), H);

  // Grass stripes for motion effect
  ctx.fillStyle = '#226622';
  for (let gy = (-drivingScroll % 40) - 40; gy < H; gy += 40) {
    ctx.fillRect(0, gy, DRIVING_ROAD_X, 18);
    ctx.fillRect(DRIVING_ROAD_X + DRIVING_LANE_W * 3, gy, W - (DRIVING_ROAD_X + DRIVING_LANE_W * 3), 18);
  }

  // Road surface
  ctx.fillStyle = '#333';
  ctx.fillRect(DRIVING_ROAD_X, 0, DRIVING_LANE_W * 3, H);

  // Road edge lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(DRIVING_ROAD_X, 0);
  ctx.lineTo(DRIVING_ROAD_X, H);
  ctx.moveTo(DRIVING_ROAD_X + DRIVING_LANE_W * 3, 0);
  ctx.lineTo(DRIVING_ROAD_X + DRIVING_LANE_W * 3, H);
  ctx.stroke();

  // Lane dividers (dashed, scrolling)
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.setLineDash([28, 22]);
  ctx.lineDashOffset = -drivingScroll % 50;
  for (let l = 1; l < 3; l++) {
    const lx = DRIVING_ROAD_X + DRIVING_LANE_W * l;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Obstacles
  for (const o of drivingObstacles) {
    if (o.y < -80 || o.y > H + 20) continue;
    if (o.type === 'car') {
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(o.x - 22, o.y, 44, 70);
      ctx.fillStyle = '#aa2222';
      ctx.fillRect(o.x - 18, o.y + 8, 36, 20);
      ctx.fillStyle = '#661111';
      ctx.fillRect(o.x - 14, o.y + 12, 28, 12);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(o.x - 16, o.y + 60, 8, 6);
      ctx.fillRect(o.x + 8, o.y + 60, 8, 6);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(o.x - 16, o.y + 2, 8, 5);
      ctx.fillRect(o.x + 8, o.y + 2, 8, 5);
    } else if (o.type === 'rock') {
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.ellipse(o.x, o.y + 15, 16, 14, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.ellipse(o.x - 3, o.y + 12, 8, 6, -0.3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(o.x - 14, o.y, 28, 32);
      ctx.fillStyle = '#a07828';
      ctx.fillRect(o.x - 12, o.y + 2, 24, 28);
      ctx.strokeStyle = '#6a4a10';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(o.x, o.y + 16, 12, 14, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Presents (ammo pickups — green boxes with bullet icon)
  for (const p of drivingPresents) {
    if (p.y < -40 || p.y > H + 20) continue;
    ctx.fillStyle = '#22aa44';
    ctx.fillRect(p.x - 14, p.y - 14, 28, 28);
    ctx.fillStyle = '#33cc55';
    ctx.fillRect(p.x - 12, p.y - 12, 24, 24);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x - 2, p.y - 8, 4, 16);
    ctx.fillRect(p.x - 6, p.y - 2, 12, 4);
  }

  // Bullets
  for (const b of drivingBullets) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(b.x - 3, b.y - 8, 6, 16);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(b.x - 2, b.y - 10, 4, 6);
  }

  // Stars
  for (const s of drivingStars) {
    if (s.y < -40 || s.y > H + 20) continue;
    ctx.save();
    const glow = 0.4 + 0.2 * Math.sin(frameCount * 0.12 + s.y);
    ctx.fillStyle = `rgba(255, 230, 80, ${glow})`;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = (i * Math.PI / 5) - Math.PI / 2;
      const rad = i % 2 === 0 ? s.r + 3 : s.r * 0.42;
      const px = s.x + Math.cos(a) * rad;
      const py = s.y + Math.sin(a) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.fill();
    ctx.restore();
  }

  // Player car (flash when hurt)
  if (drivingHurtTimer <= 0 || Math.floor(drivingHurtTimer / 3) % 2 === 0) {
    const cx = drivingLaneX;
    const cy = DRIVING_CAR_Y;
    // Body
    ctx.fillStyle = '#2266cc';
    ctx.fillRect(cx - 24, cy, 48, 78);
    // Roof
    ctx.fillStyle = '#1a4f99';
    ctx.fillRect(cx - 18, cy + 14, 36, 24);
    // Windshield
    ctx.fillStyle = '#88bbff';
    ctx.fillRect(cx - 14, cy + 16, 28, 14);
    // Rear window
    ctx.fillStyle = '#6699cc';
    ctx.fillRect(cx - 12, cy + 50, 24, 10);
    // Headlights
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(cx - 18, cy + 72, 10, 6);
    ctx.fillRect(cx + 8, cy + 72, 10, 6);
    // Tail lights
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(cx - 20, cy + 2, 8, 5);
    ctx.fillRect(cx + 12, cy + 2, 8, 5);
    // Wheels
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 26, cy + 8, 6, 18);
    ctx.fillRect(cx + 20, cy + 8, 6, 18);
    ctx.fillRect(cx - 26, cy + 56, 6, 18);
    ctx.fillRect(cx + 20, cy + 56, 6, 18);
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 44);
  // Lives
  ctx.fillStyle = '#ff4757';
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  let dLives = '';
  for (let i = 0; i < drivingLives; i++) dLives += '❤️';
  ctx.fillText(dLives || '0', 12, 30);
  // Stars collected
  ctx.fillStyle = '#ffeb3b';
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⭐ ' + drivingStarsCollected + ' / ' + DRIVING_STARS_NEEDED, W / 2, 30);
  // Ammo
  ctx.fillStyle = '#44cc66';
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('🔫 ' + drivingAmmo, W - 100, 30);
  // Speed
  ctx.fillStyle = '#aaa';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(Math.round(drivingSpeed * 20) + ' km/h', W - 14, 30);
  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('← → lanes  |  ↑ ↓ speed  |  Space: shoot', W / 2, H - 10);

  // Start countdown / well done overlays
  if (subStartCountdownFrames > 0) {
    const sec = Math.ceil(subStartCountdownFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 72px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(sec), W / 2, H / 2 + 22);
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  } else if (subWellDoneTimerFrames > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 62px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Well done!', W / 2, H / 2 + 10);
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  }
  ctx.textAlign = 'start';
}

// ==================== BANANA CATCHER SUB-LEVEL ====================
function doStartBananaSublevel(flowerIndex) {
  bananaFlowerIndex = flowerIndex;
  bananaSavedX = player.x;
  bananaSavedY = player.y;
  subStartCountdownFrames = SUB_START_COUNTDOWN_FRAMES;
  subWellDoneTimerFrames = 0;
  subWellDonePending = null;
  bananaMonkeyX = W / 2;
  bananaMonkeyVX = 0;
  bananaMonkeyFacing = 1;
  bananaFalling = [];
  bananaGroundPile = [];
  bananaSpawnTimer = 48;
  bananaCaught = 0;
  bananaMissed = 0;
  gameState = 'banana_sublevel';
  if (audioCtx) tone(392, 0.12, 'sine', 0.1);
}

function startBananaSublevel(flowerIndex) {
  beginFadeTransition(() => doStartBananaSublevel(flowerIndex), 10, 10);
}

function doExitBananaSublevelSuccess() {
  if (bananaFlowerIndex >= 0 && bananaFlowerIndex < levelFlowers.length) {
    levelFlowers[bananaFlowerIndex].collected = true;
  }
  boneAmmo += 3;
  presentMsgText = '🍌 +3 bones!';
  presentMsgTimer = 120;
  player.x = bananaSavedX;
  player.y = bananaSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  bananaFlowerIndex = -1;
  bananaFalling = [];
  bananaGroundPile = [];
  gameState = 'playing';
  if (audioCtx) tone(784, 0.16, 'sine', 0.11);
}

function exitBananaSublevelSuccess() {
  if (subWellDoneTimerFrames > 0) return;
  subWellDonePending = 'banana_success';
  subWellDoneTimerFrames = WELL_DONE_FRAMES;
}

function doExitBananaSublevelFailed() {
  player.x = bananaSavedX;
  player.y = bananaSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  bananaFlowerIndex = -1;
  bananaFalling = [];
  bananaGroundPile = [];
  playerLives--;
  gameState = playerLives <= 0 ? 'game_over' : 'playing';
  if (audioCtx) tone(180, 0.2, 'square', 0.12);
}

function exitBananaSublevelFailed() {
  beginFadeTransition(() => doExitBananaSublevelFailed(), 10, 10);
}

function updateBananaSublevel() {
  if (subStartCountdownFrames > 0) {
    subStartCountdownFrames--;
    return;
  }

  if (subWellDoneTimerFrames > 0) {
    subWellDoneTimerFrames--;
    if (subWellDoneTimerFrames <= 0 && subWellDonePending === 'banana_success') {
      subWellDonePending = null;
      beginFadeTransition(() => doExitBananaSublevelSuccess(), 10, 10);
    }
    return;
  }

  const leftHeld = !!(keys.ArrowLeft || keys.KeyA);
  const rightHeld = !!(keys.ArrowRight || keys.KeyD);
  const move = (leftHeld ? -1 : 0) + (rightHeld ? 1 : 0);
  const accel = 0.92;
  const maxSpeed = 8.6;
  if (move !== 0) {
    bananaMonkeyVX += move * accel;
    bananaMonkeyFacing = move < 0 ? -1 : 1;
  } else {
    bananaMonkeyVX *= 0.83;
  }
  bananaMonkeyVX = Math.max(-maxSpeed, Math.min(maxSpeed, bananaMonkeyVX));
  bananaMonkeyX += bananaMonkeyVX;
  bananaMonkeyX = Math.max(BANANA_MONKEY_W / 2 + 12, Math.min(W - BANANA_MONKEY_W / 2 - 12, bananaMonkeyX));

  bananaSpawnTimer--;
  if (bananaSpawnTimer <= 0) {
    bananaSpawnTimer = 32 + Math.floor(Math.random() * 38);
    bananaFalling.push({
      x: 24 + Math.random() * (W - 48),
      y: -18 - Math.random() * 40,
      vy: BANANA_SPEED_MIN + Math.random() * (BANANA_SPEED_MAX - BANANA_SPEED_MIN),
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.12
    });
  }

  const catchY = BANANA_MONKEY_Y + 12;
  for (let i = bananaFalling.length - 1; i >= 0; i--) {
    const b = bananaFalling[i];
    b.y += b.vy;
    b.vy = Math.min(3.55, b.vy + 0.013);
    b.rot += b.vr;
    const dx = Math.abs(b.x - bananaMonkeyX);
    const inCatchBand = b.y > catchY - 14 && b.y < catchY + 24;
    if (dx < 36 && inCatchBand) {
      bananaFalling.splice(i, 1);
      bananaCaught++;
      if (audioCtx) tone(660, 0.06, 'sine', 0.08);
      if (bananaCaught >= BANANA_TARGET_CATCH) {
        exitBananaSublevelSuccess();
        return;
      }
      continue;
    }
    if (b.y > H + 20) {
      bananaFalling.splice(i, 1);
      bananaMissed++;
      bananaGroundPile.push({
        x: W * 0.36 + (Math.random() - 0.5) * 170,
        y: H - 26 + Math.random() * 12,
        r: (Math.random() - 0.5) * 0.8
      });
      if (audioCtx) tone(220, 0.07, 'triangle', 0.07);
      if (bananaMissed >= BANANA_MISS_LIMIT) {
        exitBananaSublevelFailed();
        return;
      }
    }
  }
}

function drawBananaSublevel() {
  const wallY = H * 0.48;
  // Room background
  ctx.fillStyle = '#f2e4c8';
  ctx.fillRect(0, 0, W, wallY);
  ctx.fillStyle = '#8f6f4c';
  ctx.fillRect(0, wallY, W, H - wallY);

  // TV + cabinet
  ctx.fillStyle = '#55331d';
  ctx.fillRect(56, wallY - 6, 188, 100);
  ctx.fillStyle = '#1c1c1c';
  ctx.fillRect(72, wallY + 10, 156, 72);
  const tvGlow = 0.35 + 0.25 * Math.sin(frameCount * 0.09);
  ctx.fillStyle = `rgba(105, 200, 255, ${tvGlow})`;
  ctx.fillRect(76, wallY + 14, 148, 64);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  for (let sy = wallY + 18; sy < wallY + 74; sy += 12) {
    ctx.beginPath();
    ctx.moveTo(82, sy);
    ctx.lineTo(220, sy + 6);
    ctx.stroke();
  }

  // Couch and Gabby
  ctx.fillStyle = '#a1572f';
  roundRect(W * 0.42, wallY - 8, 230, 90, 16, true, false);
  ctx.fillStyle = '#7b3f22';
  roundRect(W * 0.45, wallY + 30, 190, 56, 12, true, false);
  if (gabbyLoaded) {
    ctx.save();
    ctx.translate(W * 0.56, wallY + 26);
    ctx.scale(1.7, 1.7);
    ctx.drawImage(gabbyImg, -12, -12, 24, 24);
    ctx.restore();
  } else {
    ctx.fillStyle = '#f7d7b5';
    ctx.beginPath();
    ctx.arc(W * 0.56, wallY + 24, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bananas already missed block Gabby's TV view
  for (const p of bananaGroundPile) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r);
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 5, 0.3, Math.PI * 0.05, Math.PI * 1.2);
    ctx.strokeStyle = '#c49100';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // Falling bananas
  for (const b of bananaFalling) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    ctx.fillStyle = '#ffd23f';
    ctx.beginPath();
    ctx.ellipse(0, 0, 13, 6, 0.35, Math.PI * 0.12, Math.PI * 1.15);
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // Winged monkey (horizontal movement only)
  const mx = bananaMonkeyX;
  const my = BANANA_MONKEY_Y;
  const wingFlap = Math.sin(frameCount * 0.35) * 0.22;
  ctx.save();
  ctx.translate(mx - 30, my + 12);
  ctx.rotate((bananaMonkeyFacing < 0 ? -0.52 : 0.52) + wingFlap);
  ctx.fillStyle = '#e6edf7';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(mx + 30, my + 12);
  ctx.rotate((bananaMonkeyFacing < 0 ? 0.52 : -0.52) - wingFlap);
  ctx.fillStyle = '#e6edf7';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#7a4a25';
  roundRect(mx - BANANA_MONKEY_W / 2, my, BANANA_MONKEY_W, BANANA_MONKEY_H, 12, true, false);
  // Tail makes it read clearly as a monkey
  ctx.strokeStyle = '#5d361b';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(mx + (bananaMonkeyFacing < 0 ? 22 : -22), my + 30);
  ctx.quadraticCurveTo(mx + (bananaMonkeyFacing < 0 ? 40 : -40), my + 48, mx + (bananaMonkeyFacing < 0 ? 24 : -24), my + 58);
  ctx.stroke();
  ctx.fillStyle = '#5d361b';
  roundRect(mx - 18, my + 20, 36, 24, 8, true, false);
  ctx.fillStyle = '#e6bb91';
  ctx.beginPath();
  ctx.arc(mx, my + 18, 13, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6a3e20';
  // Ears
  ctx.beginPath();
  ctx.arc(mx - 10, my + 10, 5, 0, Math.PI * 2);
  ctx.arc(mx + 10, my + 10, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(mx - 4, my + 15, 2, 0, Math.PI * 2);
  ctx.arc(mx + 4, my + 15, 2, 0, Math.PI * 2);
  ctx.fill();
  // Smile
  ctx.strokeStyle = '#2a1a10';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.arc(mx, my + 21, 5, 0.2, Math.PI - 0.2);
  ctx.stroke();
  // basket / catch zone visual
  ctx.fillStyle = '#996633';
  roundRect(mx - 22, my + 8, 44, 12, 6, true, false);

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, W, 56);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Keep Gabby\'s TV view clear!', 12, 22);
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Move monkey: ← / →', 12, 44);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffeb3b';
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Caught: ' + bananaCaught + ' / ' + BANANA_TARGET_CATCH, W / 2, 34);
  ctx.textAlign = 'right';
  ctx.fillStyle = bananaMissed >= BANANA_MISS_LIMIT - 1 ? '#ff6b6b' : '#ffd1d1';
  ctx.fillText('Missed: ' + bananaMissed + ' / ' + BANANA_MISS_LIMIT, W - 12, 34);

  if (subStartCountdownFrames > 0) {
    const sec = Math.ceil(subStartCountdownFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 72px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(sec), W / 2, H / 2 + 22);
  } else if (subWellDoneTimerFrames > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 62px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Well done!', W / 2, H / 2 + 10);
  }
  ctx.textAlign = 'start';
}

function triggerPresentReward(px) {
  const roll = Math.random();
  if (roll < 0.18) {
    presentMsgText = '🦈 Shark Attack!';
    presentMsgTimer = 150;
    sndSharkWarn();
    spawnFallingSharks(px);
  } else if (roll < 0.36) {
    playerLives++;
    presentMsgText = '❤️ Extra Life!';
    presentMsgTimer = 150;
    sndExtraLife();
  } else if (roll < 0.54) {
    presentMsgText = '🐦 Bird Flock!';
    presentMsgTimer = 150;
    sndBirdWarn();
    spawnFlyingBirds();
  } else if (roll < 0.70) {
    presentMsgText = '🐢 Flying Turtles!';
    presentMsgTimer = 150;
    sndBirdWarn();
    spawnFlyingTurtles();
  } else if (roll < 0.78) {
    superJumpTimer = upgrades.superJumpTicks;
    airJumpsLeft = 1;
    presentMsgText = '⚡ Super Jump!';
    presentMsgTimer = 150;
    sndSuperJump();
  } else if (roll < 0.90) {
    boneAmmo += 2;
    presentMsgText = '🦴 Bones x2!';
    presentMsgTimer = 150;
    if (audioCtx) tone(440, 0.08, 'sine', 0.08);
  } else {
    immunityTimer = upgrades.immunityTicks;
    presentMsgText = '🛡️ Immunity!';
    presentMsgTimer = 150;
    sndImmunity();
  }
}

function spawnFallingSharks(centerX) {
  // Central cluster — around the present pickup point
  for (let i = 0; i < 8; i++) {
    fallingSharksList.push({
      x: centerX - 250 + Math.random() * 400,
      y: -30 - i * 80 - Math.random() * 50,
      vy: 0.8 + Math.random() * 0.7,
      rot: (Math.random() - 0.5) * 0.5,
      size: 30 + Math.random() * 18,
      active: true
    });
  }
  // Right-side wave — chase the player as they run ahead
  for (let i = 0; i < 10; i++) {
    fallingSharksList.push({
      x: centerX + 80 + Math.random() * 720,
      y: -20 - i * 70 - Math.random() * 60,
      vy: 0.9 + Math.random() * 0.8,
      rot: (Math.random() - 0.5) * 0.4,
      size: 28 + Math.random() * 20,
      active: true
    });
  }
}

function spawnFlyingBirds() {
  // Birds spawn off the right edge and fly LEFT across the full screen height
  const startX = cameraX + W + 80;
  for (let i = 0; i < 14; i++) {
    // Spread across full vertical range: high sky, mid sky, and low (dangerous) zone
    const zone = i % 3;
    const by = zone === 0 ? 55  + Math.random() * 140   // high sky — visual only
             : zone === 1 ? 195 + Math.random() * 140   // mid sky — visual only
             :              335 + Math.random() * 78;   // low/danger zone — player must dodge
    flyingBirdsList.push({
      x: startX + i * 110 + Math.random() * 60,
      y: by,
      vx: -(2.5 + Math.random() * 1.5),   // fly LEFT — slow enough to dodge
      wingPhase: Math.random() * Math.PI * 2,
      size: 14 + Math.random() * 12,
      active: true
    });
  }
}

function spawnFlyingTurtles() {
  const baseX = cameraX; // turtles live in world coordinates
  flyingTurtlesList.push(
    { x: baseX + 80, dir: 1, timer: 0 },
    { x: baseX + W - 80 - TURTLE_W, dir: -1, timer: Math.floor(TURTLE_DROP_INTERVAL / 2) }
  );
  if (W > 400) {
    flyingTurtlesList.push({ x: baseX + W / 2 - TURTLE_W / 2, dir: Math.random() < 0.5 ? 1 : -1, timer: 30 });
  }
}

function updateSidekick() {
  if (!upgrades.sidekickUnlocked && !(upgrades.flyingSidekickTier | 0)) return;
  if (upgrades.sidekickUnlocked && sidekickReplay.length > SIDEKICK_DELAY_FRAMES) {
    sidekickState = sidekickReplay[0];
  }
  // --- Sidekick positioning (they float around you, catch up when you move) ---
  if (upgrades.sidekickUnlocked) {
    // Init on first run
    if (!sidekickOrbit.inited) {
      sidekickOrbit.inited = true;
      sidekickOrbit.phaseX = Math.random() * Math.PI * 2;
      sidekickOrbit.phaseY = Math.random() * Math.PI * 2;
      sidekickOrbit.speedX = 0.008 + Math.random() * 0.012;
      sidekickOrbit.speedY = 0.010 + Math.random() * 0.016;
      sidekickOrbit.ampX = SIDEKICK_ORBIT_MAX_DX * (0.55 + Math.random() * 0.45);
      sidekickOrbit.ampY = SIDEKICK_ORBIT_MAX_DY * (0.55 + Math.random() * 0.45);
    }

    const baseX = player.x + 42 * player.facing;
    const desiredX = baseX
      + sidekickOrbit.ampX * Math.sin(frameCount * sidekickOrbit.speedX + sidekickOrbit.phaseX)
      - 18 * player.facing; // slight left bias when multiple sidekicks are owned
    const desiredY = (player.y - SIDEKICK_ORBIT_BASE_Y)
      + sidekickOrbit.ampY * Math.cos(frameCount * sidekickOrbit.speedY + sidekickOrbit.phaseY);

    const dx = desiredX - sidekickFlyX;
    const dy = desiredY - sidekickFlyY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0;

    // Smooth catch-up: always moves, and only speeds up slightly when far.
    const catchK = 0.08 + Math.min(0.14, (dist / 600) * 0.14);
    sidekickFlyX += dx * catchK;
    sidekickFlyY += dy * catchK;
  }

  let skx = null;
  let sky = null;
  if (upgrades.sidekickUnlocked) {
    skx = sidekickFlyX;
    sky = sidekickFlyY;
  }

  for (let i = sidekickCarrots.length - 1; i >= 0; i--) {
    const c = sidekickCarrots[i];
    c.x += c.vx;
    c.y += c.vy;
    if (c.x < cameraX - 30 || c.x > cameraX + W + 30 || c.y < -20 || c.y > H + 20) {
      sidekickCarrots.splice(i, 1);
      continue;
    }
    let hit = false;
    for (let bi = flyingBirdsList.length - 1; bi >= 0; bi--) {
      const b = flyingBirdsList[bi];
      if (!b.active) continue;
      const dx = c.x - b.x, dy = c.y - b.y;
      const birdRad = c.birdR != null ? c.birdR : 22;
      if (dx * dx + dy * dy < birdRad * birdRad) { flyingBirdsList.splice(bi, 1); hit = true; break; }
    }
    if (!hit) {
      for (let si = fallingSharksList.length - 1; si >= 0; si--) {
        const s = fallingSharksList[si];
        if (!s.active) continue;
        const dx = c.x - s.x, dy = c.y - s.y;
        const sharkRad = c.sharkR != null ? c.sharkR : 35;
        if (dx * dx + dy * dy < sharkRad * sharkRad) { fallingSharksList.splice(si, 1); hit = true; break; }
      }
    }
    if (hit) { sidekickCarrots.splice(i, 1); if (audioCtx) tone(600, 0.05, 'sine', 0.07); }
  }

  if (upgrades.sidekickUnlocked && !(upgrades.flyingSidekickTier | 0)) {
    sidekickCarrotTimer++;
    const canThrow = sidekickCarrotTimer >= 90;
    if (canThrow) {
    let bestDist = 280, target = null, isBird = false;
    for (const b of flyingBirdsList) {
      if (!b.active) continue;
      const dx = b.x - skx, dy = b.y - sky;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < bestDist && b.x > cameraX - 50) { bestDist = d; target = b; isBird = true; }
    }
    for (const s of fallingSharksList) {
      if (!s.active) continue;
      const dx = s.x - skx, dy = s.y - sky;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < bestDist) { bestDist = d; target = s; isBird = false; }
    }
    if (target) {
      sidekickCarrotTimer = 0;
      const dx = (target.x - skx), dy = (target.y - (sky + PH / 2));
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const spd = 7;
      sidekickCarrots.push({
        x: skx, y: sky + PH / 2,
        vx: (dx / dist) * spd, vy: (dy / dist) * spd
      });
      if (audioCtx) tone(520, 0.06, 'sine', 0.06);
    }
  }
  } else {
    sidekickCarrotTimer = 0;
  }

  if ((upgrades.flyingSidekickTier | 0) > 0) {
    const flyTier = upgrades.flyingSidekickTier | 0;
    const carrotStats = getFlyingSidekickCarrotStats(flyTier);
    if (!flyingSidekickOrbit.inited) {
      flyingSidekickOrbit.inited = true;
      flyingSidekickOrbit.phaseX = Math.random() * Math.PI * 2;
      flyingSidekickOrbit.phaseY = Math.random() * Math.PI * 2;
      flyingSidekickOrbit.speedX = 0.008 + Math.random() * 0.012;
      flyingSidekickOrbit.speedY = 0.010 + Math.random() * 0.016;
      flyingSidekickOrbit.ampX = SIDEKICK_ORBIT_MAX_DX * (0.55 + Math.random() * 0.45);
      flyingSidekickOrbit.ampY = SIDEKICK_ORBIT_MAX_DY * (0.55 + Math.random() * 0.45);
    }

    const baseX = player.x + 52 * player.facing;
    const desiredX = baseX
      + flyingSidekickOrbit.ampX * Math.sin(frameCount * flyingSidekickOrbit.speedX + flyingSidekickOrbit.phaseX)
      + 18 * player.facing; // slight right bias when multiple sidekicks are owned
    const desiredY = (player.y - SIDEKICK_ORBIT_BASE_Y)
      + flyingSidekickOrbit.ampY * Math.cos(frameCount * flyingSidekickOrbit.speedY + flyingSidekickOrbit.phaseY);

    const dx = desiredX - flyingSidekickX;
    const dy = desiredY - flyingSidekickY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0;
    const catchK = 0.08 + Math.min(0.14, (dist / 600) * 0.14);
    flyingSidekickX += dx * catchK;
    flyingSidekickY += dy * catchK;

    const flyX = flyingSidekickX;
    const flyY = flyingSidekickY;
    flyingSidekickCarrotTimer++;
    if (flyingSidekickCarrotTimer >= carrotStats.interval) {
      let bestDist = carrotStats.aimRange, target = null;
      for (const b of flyingBirdsList) {
        if (!b.active) continue;
        const dx = b.x - flyX, dy = b.y - flyY;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < bestDist && b.x > cameraX - 50) { bestDist = d; target = b; }
      }
      for (const s of fallingSharksList) {
        if (!s.active) continue;
        const dx = s.x - flyX, dy = s.y - flyY;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < bestDist) { bestDist = d; target = s; }
      }
      if (target) {
        flyingSidekickCarrotTimer = 0;
        const dx = target.x - flyX, dy = target.y - flyY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const baseAngle = Math.atan2(dy, dx);
        const spd = carrotStats.speed;
        const shots = carrotStats.shots;
        const spread = carrotStats.spread;
        for (let si = 0; si < shots; si++) {
          const ang = shots === 1 ? baseAngle : baseAngle + (si - (shots - 1) / 2) * spread;
          sidekickCarrots.push({
            x: flyX, y: flyY,
            vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
            birdR: carrotStats.birdR, sharkR: carrotStats.sharkR
          });
        }
        if (audioCtx) tone(520 + flyTier * 25, 0.05, 'sine', 0.065);
      }
    }
    flyingSidekickX = flyX;
    flyingSidekickY = flyY;
  }
}

function updateBones() {
  // Throw bone with Space (only in playing state, not driving sublevel)
  const spaceDown = !!(keys.Space);
  if (spaceDown && !boneThrowKeyWasDown && boneAmmo > 0 && gameState === 'playing') {
    boneAmmo--;
    const startX = player.x + PW / 2;
    const startY = player.y + PH / 2;
    const dir = player.facing;
    thrownBones.push({
      x: startX, y: startY,
      vx: dir * BONE_VX_PER_FRAME,
      vy: BONE_INITIAL_VY,
      dir: dir,
      spin: 0
    });
    if (audioCtx) tone(350, 0.06, 'triangle', 0.08);
  }
  boneThrowKeyWasDown = spaceDown;

  // Update thrown bones (ballistic — only land on terrain, never despawn in flight)
  for (let i = thrownBones.length - 1; i >= 0; i--) {
    const b = thrownBones[i];
    b.spin += 0.025;
    b.vy += GRAVITY;
    b.x += b.vx;
    b.y += b.vy;
    const landY = groundYAt(b.x);
    if (b.y >= landY - 6) {
      const landX = b.x;
      thrownBones.splice(i, 1);
      // Check if it lands near an enemy — stun them
      let consumed = false;
      for (const e of levelEnemies) {
        if (!e.alive || e.stunTimer > 0) continue;
        const ew = e.type === 'wolf' ? 50 : 40;
        const ecx = e.x + ew / 2;
        if (Math.abs(landX - ecx) < 60) {
          e.stunTimer = BONE_STUN_DURATION;
          consumed = true;
          if (audioCtx) tone(220, 0.1, 'sine', 0.07);
          break;
        }
      }
      if (!consumed) {
        landedBones.push({ x: landX, y: landY - 6 });
      }
    }
  }

  // Pick up landed bones
  for (let i = landedBones.length - 1; i >= 0; i--) {
    const lb = landedBones[i];
    const dx = Math.abs(player.x + PW / 2 - lb.x);
    const dy = Math.abs(player.y + PH - lb.y);
    if (dx < 24 && dy < 30) {
      landedBones.splice(i, 1);
      boneAmmo++;
      if (audioCtx) tone(500, 0.04, 'sine', 0.06);
    }
  }
}

function updateFlyingBirds() {
  for (let i = flyingBirdsList.length - 1; i >= 0; i--) {
    const b = flyingBirdsList[i];
    b.x += b.vx;
    b.wingPhase += 0.22;
    // Remove when flown off the left edge
    if (b.x < cameraX - 200) { flyingBirdsList.splice(i, 1); continue; }
    if (!b.active) continue;
    if (mathFlashTimer > 0) continue;
    if (immunityTimer > 0) continue;
    // Collision — respects ducking (player hitbox shrinks from top when ducking)
    const bx = b.x - cameraX;
    const ph = player.ducking ? DUCK_PH : PH;
    const py = player.ducking ? player.y + (PH - DUCK_PH) : player.y;
    if (bx + b.size * 0.6 > player.x - cameraX &&
        bx - b.size * 0.6 < player.x - cameraX + PW &&
        b.y + b.size * 0.5 > py &&
        b.y - b.size * 0.5 < py + ph) {
      b.active = false;
      sndHit();
      loseLife();
      return; // list was cleared by respawn; exit loop immediately
    }
  }
}

function updateFlyingTurtles() {
  // Keep turtles/drops in world space so camera movement doesn't make drops "follow" the player.
  for (let i = flyingTurtlesList.length - 1; i >= 0; i--) {
    const tr = flyingTurtlesList[i];
    tr.x += tr.dir * TURTLE_SPEED;
    tr.timer++;
    if (tr.timer >= TURTLE_DROP_INTERVAL) {
      tr.timer = 0;
      waterDropsList.push({ sx: tr.x + TURTLE_W / 2, sy: TURTLE_Y + 14, r: 5 });
    }
    // Remove when off-screen.
    if (tr.x < cameraX - 220 || tr.x > cameraX + W + 220) flyingTurtlesList.splice(i, 1);
  }
  for (let i = waterDropsList.length - 1; i >= 0; i--) {
    const w = waterDropsList[i];
    w.sy += WATER_DROP_SPEED;
    if (w.sy > H + 20) { waterDropsList.splice(i, 1); continue; }
    if (mathFlashTimer > 0 || immunityTimer > 0) continue;
    const pcx = player.x + PW / 2;
    const ph = player.ducking ? DUCK_PH : PH;
    const cy = player.ducking ? player.y + (PH - DUCK_PH) / 2 : player.y + PH / 2;
    if (Math.abs(w.sx - pcx) < PW / 2 + w.r && Math.abs(w.sy - cy) < ph / 2 + w.r) {
      waterDropsList.splice(i, 1);
      sndHit();
      loseLife();
      return;
    }
  }
}

function drawFlyingBirds() {
  for (const b of flyingBirdsList) {
    const bx = b.x - cameraX;
    if (bx < -120 || bx > W + 120) continue;
    ctx.save();
    ctx.translate(bx, b.y);

    const sz = b.size;
    // flap: -1=wings high, +1=wings low — drives the iconic arc shape
    const flap = Math.sin(b.wingPhase);
    const tipY = flap * sz * 0.75;           // wingtip vertical position
    const ctrlY = tipY - sz * 0.55;          // bezier control point pulls the arc inward

    // Silhouette color — darker for low birds, lighter for sky birds
    const col = b.y < 200 ? '#6688aa' : b.y < 330 ? '#445566' : '#222233';

    // === Wings: two quadratic bezier arcs forming the classic M/gull shape ===
    ctx.strokeStyle = col;
    ctx.lineWidth = Math.max(1.5, sz * 0.17);
    ctx.lineCap = 'round';

    // Left wing (tip points away from body center)
    ctx.beginPath();
    ctx.moveTo(-sz * 0.08, sz * 0.04);
    ctx.quadraticCurveTo(-sz * 0.6, ctrlY, -sz * 1.15, tipY);
    ctx.stroke();

    // Right wing
    ctx.beginPath();
    ctx.moveTo(sz * 0.08, sz * 0.04);
    ctx.quadraticCurveTo(sz * 0.6, ctrlY, sz * 1.15, tipY);
    ctx.stroke();

    // === Body: small compact oval ===
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.ellipse(0, sz * 0.06, sz * 0.19, sz * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();

    // === Head: small circle at the front (left — bird flies left) ===
    ctx.beginPath();
    ctx.arc(-sz * 0.27, sz * 0.01, sz * 0.12, 0, Math.PI * 2);
    ctx.fill();

    // === Beak: tiny wedge pointing left ===
    ctx.beginPath();
    ctx.moveTo(-sz * 0.39, -sz * 0.04);
    ctx.lineTo(-sz * 0.58, sz * 0.01);
    ctx.lineTo(-sz * 0.39, sz * 0.07);
    ctx.closePath();
    ctx.fill();

    // === Tail fan: at the right end ===
    ctx.beginPath();
    ctx.moveTo(sz * 0.17, sz * 0.04);
    ctx.lineTo(sz * 0.42, -sz * 0.08);
    ctx.lineTo(sz * 0.38, sz * 0.04);
    ctx.lineTo(sz * 0.42, sz * 0.16);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

function drawFlyingTurtles() {
  for (const tr of flyingTurtlesList) {
    ctx.save();
    const tx = tr.x - cameraX;
    if (tx < -120 || tx > W + 120) { ctx.restore(); continue; }
    ctx.translate(tx, TURTLE_Y);
    if (tr.dir < 0) ctx.scale(-1, 1);
    ctx.fillStyle = '#2d6a3a';
    ctx.beginPath();
    ctx.ellipse(18, 10, 16, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a7a4a';
    ctx.beginPath();
    ctx.ellipse(18, 10, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a4a2a';
    ctx.beginPath();
    ctx.moveTo(32, 10);
    ctx.lineTo(42, 8);
    ctx.lineTo(40, 12);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(38, 9, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2d6a3a';
    ctx.beginPath();
    ctx.moveTo(4, 6);
    ctx.lineTo(0, 14);
    ctx.lineTo(8, 12);
    ctx.moveTo(4, 16);
    ctx.lineTo(0, 20);
    ctx.lineTo(8, 18);
    ctx.fill();
    ctx.restore();
  }
}

function drawWaterDrops() {
  for (const w of waterDropsList) {
    const wx = w.sx - cameraX;
    if (wx < -50 || wx > W + 50) continue;
    ctx.fillStyle = 'rgba(100,180,255,0.9)';
    ctx.beginPath();
    ctx.arc(wx, w.sy, w.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(150,210,255,0.6)';
    ctx.beginPath();
    ctx.arc(wx - 1, w.sy - 1, w.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateFallingSharks() {
  for (let i = fallingSharksList.length - 1; i >= 0; i--) {
    const s = fallingSharksList[i];
    s.y += s.vy;
    s.vy += 0.03;
    if (s.y > H + 60) { fallingSharksList.splice(i, 1); continue; }
    if (!s.active) continue;
    if (mathFlashTimer > 0) continue;
    if (immunityTimer > 0) continue;
    const sx = s.x - cameraX;
    const pcx = player.x - cameraX + PW / 2, pcy = player.y + PH / 2;
    if (Math.abs(sx - pcx) < s.size * 0.5 && Math.abs(s.y - pcy) < s.size * 0.5) {
      s.active = false;
      sndHit();
      loseLife();
      return; // list was cleared by respawn; exit loop immediately
    }
  }
}

// ==================== MATH CHALLENGE ====================
function getMathConfig() {
  // Difficulty index: 0 = Kindergarten ... 6 = Grade 6
  const d = Math.max(0, Math.min(MATH_DIFFICULTIES.length - 1, mathDifficultyIdx|0));
  const simpleMaxArr = [6, 12, 20, 35, 55, 80, 110];
  const allowSubArr  = [false, true, true, true, true, true, true];
  const subChanceArr = [0, 0.45, 0.50, 0.50, 0.55, 0.60, 0.65];
  const mulChanceArr = [0, 0, 0.18, 0.26, 0.34, 0.42, 0.48];
  const mulTopArr = [0, 0, 3, 5, 7, 10, 12]; // multiplier upper bound
  const seriesChanceArr = [0.12, 0.22, 0.28, 0.34, 0.40, 0.46, 0.52];
  const seriesStartMaxArr = [6, 15, 25, 35, 55, 80, 110];
  const seriesStepMaxArr = [2, 4, 6, 10, 15, 20, 25];
  return {
    d,
    simpleMax: simpleMaxArr[d],
    allowSub: allowSubArr[d],
    subChance: subChanceArr[d],
    mulChance: mulChanceArr[d],
    mulTop: mulTopArr[d],
    seriesChance: seriesChanceArr[d],
    seriesStartMax: seriesStartMaxArr[d],
    seriesStepMax: seriesStepMaxArr[d]
  };
}

function doTriggerMath(idx) {
  mathEnemyIdx = idx;
  levelEnemies[idx].triggered = true;
  const cfg = getMathConfig();
  const isSeries = Math.random() < cfg.seriesChance;
  if (isSeries) {
    const start = Math.floor(Math.random() * cfg.seriesStartMax) + 1;
    const step = Math.floor(Math.random() * cfg.seriesStepMax) + 1;
    const hole = (cfg.d <= 1) ? (Math.floor(Math.random() * 3) + 1) : Math.floor(Math.random() * 5);
    const seq = [start, start + step, start + step * 2, start + step * 3, start + step * 4];
    const answer = seq[hole];
    const parts = seq.map((v, i) => (i === hole ? '?' : String(v)));
    mathProblem = { text: parts.join(', '), answer };
  } else {
    const a0 = Math.floor(Math.random() * (cfg.simpleMax + 1));
    const b0 = Math.floor(Math.random() * (cfg.simpleMax + 1));

    if (cfg.mulChance > 0 && cfg.mulTop > 1 && Math.random() < cfg.mulChance) {
      const m = Math.floor(Math.random() * (cfg.mulTop - 1)) + 2; // 2..mulTop
      const answer = a0 * m;
      mathProblem = { text: `${a0} × ${m} = ?`, answer };
    } else {
      let a = a0, b = b0, op, answer;
      const doSub = cfg.allowSub && Math.random() < cfg.subChance;
      if (doSub) {
        if (a < b) [a, b] = [b, a];
        op = '−';
        answer = a - b;
      } else {
        op = '+';
        answer = a + b;
      }
      mathProblem = { text: `${a} ${op} ${b} = ?`, answer };
    }
  }
  mathTyped = ''; mathTimeLeft = 20; mathResult = null; mathResultTimer = 0;
  gameState = 'math_challenge'; sndAlert();
  setMusicMood('math_challenge');
  if (voiceMode) startVoiceListening();
}

function triggerMath(idx) {
  beginFadeTransition(() => doTriggerMath(idx), 10, 10);
}

function submitMath() {
  if (mathResult) return;
  const trimmed = mathTyped.trim();
  if (trimmed === '' || trimmed === '-') return;
  const val = parseInt(trimmed);
  if (isNaN(val)) {
    mathTyped = '';
    return;
  }
  stopVoiceListening();
  if (val === mathProblem.answer) {
    mathResult = 'correct'; levelEnemies[mathEnemyIdx].alive = false; addCoins(10); sndCorrect();
  } else {
    mathResult = 'wrong'; sndWrong();
  }
  mathResultTimer = mathResult === 'correct' ? WELL_DONE_FRAMES : 60;
}

function updateMath() {
  voicePulse += 0.06;
  if (mathResult) {
    mathResultTimer--;
    if (mathResultTimer <= 0) {
      const result = mathResult;
      stopVoiceListening();
      beginFadeTransition(() => {
        if (result !== 'correct') respawn();
        gameState = 'playing'; mathProblem = null;
        setMusicMood('playing');
      }, 10, 10);
    }
    return;
  }
  mathTimeLeft -= STEP / 1000;
  if (mathTimeLeft <= 0) {
    mathResult = 'timeout'; mathResultTimer = 60; sndWrong();
    stopVoiceListening();
  }
}

function mathClick(p) {
  if (mathResult || voiceMode) return;
  const padX = 560, padY = 160, bs = 52, gap = 6;
  const labels = ['1','2','3','4','5','6','7','8','9','0','⌫','✓'];
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 3; c++) {
      const bx = padX + c*(bs+gap), by = padY + r*(bs+gap);
      if (p.x > bx && p.x < bx+bs && p.y > by && p.y < by+bs) {
        const idx = r*3+c;
        if (idx < 9) mathTyped += labels[idx];
        else if (idx === 9) mathTyped += '0';
        else if (idx === 10) mathTyped = mathTyped.slice(0,-1);
        else submitMath();
        sndSelect();
      }
    }
  }
}

}

  bossSavedY = player.y;
  bossSavedCameraX = cameraX;
  thrownBones = [];
  landedBones = [];
  bossFireballs = [];

  bowserBoss = {

function exitBossVictory() {

}

function doExitBossFailed() {

  thrownBones = [];
  landedBones = [];

  player.y = bossSavedY;

  player.vy = 0;

function exitBossFailed() {
