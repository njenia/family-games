}

function updateBonesForBossFight() {
  const spaceDown = !!(keys.Space);
  if (spaceDown && !boneThrowKeyWasDown && gameState === 'boss_sublevel') {
    const startX = player.x + PW / 2;
    const startY = player.y + PH / 2;
    const dir = player.facing;
    thrownBones.push({
      x: startX, y: startY,
      vx: dir * BONE_VX_PER_FRAME * 0.85,
      vy: BONE_INITIAL_VY,
      dir: dir,
      spin: 0
    });
    if (audioCtx) tone(350, 0.06, 'triangle', 0.08);
  }
  boneThrowKeyWasDown = spaceDown;

  const arenaLandY = SUB_GROUND_Y;
  for (let i = thrownBones.length - 1; i >= 0; i--) {
    const b = thrownBones[i];
    b.spin += 0.028;
    b.vy += GRAVITY;
    b.x += b.vx;
    b.y += b.vy;
    if (bowserBoss && bowserBoss.hp > 0) {
      const bx = b.x, by = b.y;
      if (bx > bowserBoss.x + 8 && bx < bowserBoss.x + bowserBoss.w - 8 &&
          by > bowserBoss.y - 4 && by < bowserBoss.y + bowserBoss.h) {
        bowserBoss.hp--;
        bowserBoss.hitFlash = 14;
        thrownBones.splice(i, 1);
        if (audioCtx) tone(220, 0.08, 'square', 0.09);
        if (bowserBoss.hp <= 0) exitBossVictory();
        continue;
      }
    }
    if (b.y >= arenaLandY - 6) {
      thrownBones.splice(i, 1);
      landedBones.push({ x: b.x, y: arenaLandY - 6 });
    }
  }
}

function updateBossSublevel() {
  if (subHurtTimer > 0) subHurtTimer--;

  if (subStartCountdownFrames > 0) {
    subStartCountdownFrames--;
    return;
  }

  if (subWellDoneTimerFrames > 0) {
    subWellDoneTimerFrames--;
    if (subWellDoneTimerFrames <= 0 && subWellDonePending === 'boss_success') {
      subWellDonePending = null;
      beginFadeTransition(() => doCompleteBossWin(), 10, 14);
    }
    return;
  }

  if (!bowserBoss) return;

  updateBonesForBossFight();

  // Player move (arena)
  player.vx = 0;
  if (keys.ArrowLeft || keys.KeyA) { player.vx = -MOVE_SPEED * 1.05; player.facing = -1; }
  if (keys.ArrowRight || keys.KeyD) { player.vx = MOVE_SPEED * 1.05; player.facing = 1; }
  const jumpKey = keys.ArrowUp || keys.KeyW;
  const jumpJustPressed = jumpKey && !jumpKeyWasDown;
  jumpKeyWasDown = jumpKey;
  if (jumpJustPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    if (audioCtx) tone(330, 0.08, 'square', 0.06);
  }
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.x += player.vx;
  player.y += player.vy;
  if (player.x < 0) player.x = 0;
  if (player.x + PW > SUB_ARENA_W) player.x = SUB_ARENA_W - PW;
  player.onGround = false;
  if (player.y + PH >= SUB_GROUND_Y && player.vy >= 0) {
    player.y = SUB_GROUND_Y - PH;
    player.vy = 0;
    player.onGround = true;
  }
  player.wf = (player.wf + (player.vx !== 0 ? 0.22 : 0)) % 4;

  const B = bowserBoss;
  if (B.hitFlash > 0) B.hitFlash--;

  // Periodic scary roar / growl
  B.scaryCd--;
  if (B.scaryCd <= 0) {
    bossScarySound();
    B.scaryCd = 140 + Math.floor(Math.random() * 200);
  }

  // Movement: random direction, variable speed, stops and pauses
  if (B.pauseTimer > 0) {
    B.pauseTimer--;
    B.moveDir = 0;
  } else {
    if (B.aiTimer > 0) {
      B.aiTimer--;
      B.x += B.moveDir * B.moveSpeed;
    } else {
      const r = Math.random();
      if (r < 0.3) {
        B.moveDir = 0;
        B.pauseTimer = 20 + Math.floor(Math.random() * 95);
        B.aiTimer = 1;
      } else if (r < 0.72) {
        B.moveDir = Math.random() < 0.5 ? -1 : 1;
        B.moveSpeed = 0.45 + Math.random() * 1.85;
        B.aiTimer = 16 + Math.floor(Math.random() * 85);
      } else {
        B.moveDir = Math.random() < 0.5 ? -1 : 1;
        B.moveSpeed = 0.3 + Math.random() * 0.75;
        B.aiTimer = 6 + Math.floor(Math.random() * 28);
      }
    }
  }
  B.x = Math.max(380, Math.min(SUB_ARENA_W - 24 - B.w, B.x));
  const moving = B.moveDir !== 0 && B.pauseTimer <= 0;
  B.walkT += (moving ? 0.055 + B.moveSpeed * 0.028 : 0.018);

  // Stomp from above (hurts boss, bounce player)
  const feetY = player.y + PH;
  const bossTop = B.y;
  const stompHoriz = player.x + PW > B.x + 10 && player.x < B.x + B.w - 10;
  if (B.hp > 0 && player.vy > 0.25 && stompHoriz &&
      feetY >= bossTop - 5 && feetY <= bossTop + 20) {
    B.hp--;
    B.hitFlash = 16;
    player.vy = JUMP_VEL * 0.5;
    player.y = bossTop - PH - 1;
    player.onGround = false;
    subHurtTimer = 14;
    if (audioCtx) tone(280, 0.07, 'square', 0.11);
    if (B.hp <= 0) exitBossVictory();
  }

  // Fireballs: rests where he doesn't shoot, bursts with variable cadence
  if (B.shootRestTimer > 0) {
    B.shootRestTimer--;
  } else if (subHurtTimer <= 0) {
    B.fireCd--;
    if (B.fireCd <= 0) {
      const ox = B.x + B.w * 0.35;
      const oy = B.y + 16;
      const tx = player.x + PW / 2;
      const ty = player.y + PH / 2;
      let dx = tx - ox, dy = ty - oy;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const spd = 3.8 + Math.random() * 1.2;
      bossFireballs.push({ x: ox, y: oy, vx: (dx / d) * spd, vy: (dy / d) * spd, r: 10 });
      if (audioCtx) tone(110 + Math.random() * 40, 0.09, 'sawtooth', 0.075);
      if (B.burstLeft > 0) {
        B.burstLeft--;
        B.fireCd = 10 + Math.floor(Math.random() * 14);
      } else {
        B.fireCd = 65 + Math.floor(Math.random() * 75);
        if (Math.random() < 0.42) B.burstLeft = 1 + Math.floor(Math.random() * 3);
        if (Math.random() < 0.32) B.shootRestTimer = 55 + Math.floor(Math.random() * 130);
      }
    }
  }

  for (let i = bossFireballs.length - 1; i >= 0; i--) {
    const f = bossFireballs[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.06;
    if (f.x < -40 || f.x > SUB_ARENA_W + 40 || f.y > SUB_GROUND_Y + 40) bossFireballs.splice(i, 1);
  }

  if (subHurtTimer <= 0) {
    const pcx = player.x + PW / 2;
    const pcy = player.y + PH / 2;
    for (let i = bossFireballs.length - 1; i >= 0; i--) {
      const f = bossFireballs[i];
      if (Math.abs(pcx - f.x) < PW / 2 + f.r && Math.abs(pcy - f.y) < PH / 2 + f.r) {
        bossFireballs.splice(i, 1);
        subLives--;
        subHurtTimer = 55;
        if (subLives <= 0) { exitBossFailed(); return; }
        player.x = 100;
        player.y = SUB_GROUND_Y - PH - 6;
        player.vx = 0;
        player.vy = 0;
        if (audioCtx) tone(200, 0.15, 'square', 0.1);
      }
    }
    // Body hit (not the top "stomp" band while falling — stomp handled above)
    const bodyOverlapX = player.x + PW > B.x + 6 && player.x < B.x + B.w - 6;
    const bodyOverlapY = player.y + PH > B.y + 22 && player.y < B.y + B.h - 2;
    if (bodyOverlapX && bodyOverlapY) {
      subLives--;
      subHurtTimer = 55;
      if (subLives <= 0) { exitBossFailed(); return; }
      player.x = 100;
      player.y = SUB_GROUND_Y - PH - 6;
      player.vx = 0;
      player.vy = 0;
      if (audioCtx) tone(200, 0.15, 'square', 0.1);
    }
  }
}

function drawBowserBoss() {
  if (!bowserBoss) return;
  const B = bowserBoss;
  const flash = B.hitFlash > 0 && Math.floor(B.hitFlash / 3) % 2 === 0;
  ctx.save();
  ctx.translate(B.x + B.w / 2, B.y + B.h);
  const bob = Math.sin(B.walkT * 2) * 3;
  ctx.translate(0, bob);
  // Shell & body (scary turtle)
  ctx.fillStyle = flash ? '#ff6b6b' : '#1a5c1a';
  ctx.beginPath();
  ctx.ellipse(0, -28, 38, 30, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#0d3d0d';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Spikes on shell
  ctx.fillStyle = flash ? '#ffcc00' : '#f0e68c';
  for (let s = -1; s <= 1; s++) {
    ctx.beginPath();
    ctx.moveTo(s * 22, -48);
    ctx.lineTo(s * 22 - 8, -62);
    ctx.lineTo(s * 22 + 8, -62);
    ctx.closePath();
    ctx.fill();
  }
  // Belly / chest
  ctx.fillStyle = flash ? '#ffe0e0' : '#f4d03f';
  ctx.beginPath();
  ctx.ellipse(0, -22, 22, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.fillStyle = flash ? '#ff8888' : '#c0392b';
  ctx.beginPath();
  ctx.ellipse(32, -42, 22, 20, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Angry eyes
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath();
  ctx.ellipse(38, -48, 7, 9, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(40, -48, 3, 0, Math.PI * 2);
  ctx.fill();
  // Eyebrow scowl
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(30, -56);
  ctx.lineTo(48, -52);
  ctx.stroke();
  // Muzzle / teeth
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.ellipse(48, -36, 14, 10, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  for (let t = 0; t < 4; t++) {
    ctx.fillRect(42 + t * 5, -32, 3, 5);
  }
  // Arms
  ctx.strokeStyle = flash ? '#992222' : '#7b241c';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-18, -30);
  ctx.lineTo(-36, -8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(8, -28);
  ctx.lineTo(22, -12);
  ctx.stroke();
  ctx.restore();
  // HP bar
  const barW = 200;
  const bx = SUB_ARENA_W / 2 - barW / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(bx, 48, barW, 14);
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(bx + 2, 50, (barW - 4) * (B.hp / B.maxHp), 10);
  ctx.fillStyle = '#fff';
  ctx.font = '12px system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Defeat the scary turtle!  Space = bones (∞) · Jump on head to stomp', SUB_ARENA_W / 2, 40);
  ctx.textAlign = 'start';
}

function drawBossSublevel() {
  const grad = ctx.createLinearGradient(0, 0, 0, SUB_GROUND_Y);
  grad.addColorStop(0, '#2d0a0a');
  grad.addColorStop(0.5, '#4a1520');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
  ctx.fillStyle = '#2c1810';
  ctx.fillRect(0, SUB_GROUND_Y, SUB_ARENA_W, SUB_ARENA_H - SUB_GROUND_Y);
  ctx.fillStyle = '#3d2818';
  for (let gx = 0; gx < SUB_ARENA_W; gx += 16) {
    ctx.fillRect(gx, SUB_GROUND_Y, 2, 8);
  }
  drawBowserBoss();
  for (const f of bossFireballs) {
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
    g.addColorStop(0, '#fff7a0');
    g.addColorStop(0.45, '#ff6600');
    g.addColorStop(1, '#cc2200');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
  }
  // Bones (screen-space)
  for (const b of thrownBones) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate((b.spin || 0) * b.dir * 8);
    ctx.fillStyle = '#f5f5dc';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (const lb of landedBones) {
    ctx.fillStyle = '#f5f5dc';
    ctx.beginPath();
    ctx.ellipse(lb.x, lb.y, 9, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  if (subHurtTimer <= 0 || Math.floor(subHurtTimer / 4) % 2 === 0) {
    drawCharSprite(player.x, player.y, player.facing, player.wf, selectedChar, 1, !player.onGround);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, SUB_ARENA_W, 44);
  ctx.fillStyle = '#ff6b8a';
  ctx.font = '16px system-ui,sans-serif';
  ctx.textAlign = 'left';
  let hStr = '';
  for (let i = 0; i < subLives; i++) hStr += '❤️';
  ctx.fillText(hStr || '0', 12, 28);
  ctx.fillStyle = '#7efaff';
  ctx.textAlign = 'right';
  ctx.fillText('Bones: ∞', SUB_ARENA_W - 12, 28);
  ctx.textAlign = 'start';
  if (subStartCountdownFrames > 0) {
    const sec = Math.ceil(subStartCountdownFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#ff4757';
    ctx.font = 'bold 72px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(sec), SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 22);
  } else if (subWellDoneTimerFrames > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 56px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('You win!', SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 10);
  }
}

// ----- Tower climb sublevel (platforms + crocodiles, reach the top) -----
function startTowerSublevel(flowerIndex) {
  beginFadeTransition(() => doStartTowerSublevel(flowerIndex), 10, 10);
}

function doStartTowerSublevel(flowerIndex) {
  towerFlowerIndex = flowerIndex;
  towerSavedX = player.x;
  towerSavedY = player.y;
  subStartCountdownFrames = SUB_START_COUNTDOWN_FRAMES;
  subWellDoneTimerFrames = 0;
  subWellDonePending = null;
  subLives = 5;
  subHurtTimer = 0;
  subAirJumpsLeft = 1;
  jumpKeyWasDown = false;
  towerPlatforms = [];
  towerCrocs = [];
  // ~30% shorter than previous tower; ring still off-screen from start
  const rowGap = 46 + Math.floor(Math.random() * 5);
  const numRows = Math.max(48, Math.round((82 + Math.floor(Math.random() * 16)) * 0.7));
  const topPlatY = SUB_GROUND_Y - 50 - numRows * rowGap;
  towerGoalWorldY = topPlatY - 40;
  towerWorldTopY = towerGoalWorldY - 300;
  // Camera cannot scroll below this (ground stays in view at bottom); start here = bottom-anchored view
  towerCamMaxY = SUB_GROUND_Y - H + 32;

  towerPlatforms.push({ x: -60, y: SUB_GROUND_Y, w: SUB_ARENA_W + 120 });
  for (let row = 1; row < numRows; row++) {
    const wy = SUB_GROUND_Y - 50 - row * rowGap + (Math.random() * 12 - 6);
    const ww = 62 + Math.floor(Math.random() * 56);
    const bias = Math.sin(row * 0.45) * 0.35 + (Math.random() - 0.5) * 0.5;
    const wxMin = 22;
    const wxMax = SUB_ARENA_W - ww - 22;
    const mid = (wxMin + wxMax) / 2;
    const spread = (wxMax - wxMin) / 2;
    let wx = mid + bias * spread * 0.92;
    wx = Math.max(wxMin, Math.min(wxMax, wx));
    towerPlatforms.push({ x: wx, y: wy, w: ww });
  }
  // Wide final step under the golden ring
  towerPlatforms.push({
    x: SUB_ARENA_W / 2 - 130,
    y: topPlatY,
    w: 260
  });

  const CROC_H = 24;
  const sidePass = 16;
  for (let pi = 1; pi < towerPlatforms.length - 1; pi++) {
    const pl = towerPlatforms[pi];
    if (pl.w >= 248) continue;
    if (pl.w < 88) continue;
    if (Math.random() > 0.55) continue;
    const inner = pl.w - 2 * sidePass;
    if (inner < 52) continue;
    const cw = Math.max(28, Math.min(44, Math.floor(pl.w * 0.34)));
    const pLeft = pl.x + sidePass;
    const pRight = pl.x + pl.w - sidePass - cw;
    if (pRight - pLeft < 22) continue;
    const startX = pLeft + Math.random() * (pRight - pLeft);
    towerCrocs.push({
      x: startX,
      y: pl.y - CROC_H,
      w: cw,
      h: CROC_H,
      vx: (0.5 + Math.random() * 0.65) * (Math.random() < 0.5 ? -1 : 1),
      patrolLeft: pLeft,
      patrolRight: pRight
    });
  }

  player.x = SUB_ARENA_W / 2 - PW / 2;
  player.y = SUB_GROUND_Y - PH - 8;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.facing = 1;
  // Start focused on the base; summit / golden ring is far above the first frame
  towerCamY = towerCamMaxY;
  gameState = 'tower_sublevel';
  if (audioCtx) tone(440, 0.1, 'sine', 0.1);
}

function doExitTowerSublevel() {
  if (towerFlowerIndex >= 0 && towerFlowerIndex < levelFlowers.length) {
    levelFlowers[towerFlowerIndex].collected = true;
  }
  boneAmmo += 3;
  presentMsgText = '🗼 +3 bones!';
  presentMsgTimer = 120;
  player.x = towerSavedX;
  player.y = towerSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  towerFlowerIndex = -1;
  towerPlatforms = [];
  towerCrocs = [];
  gameState = 'playing';
  if (audioCtx) tone(784, 0.2, 'sine', 0.1);
}

function exitTowerSublevel() {
  if (subWellDoneTimerFrames > 0) return;
  subWellDonePending = 'tower_success';
  subWellDoneTimerFrames = WELL_DONE_FRAMES;
}

function doExitTowerFailed() {
  player.x = towerSavedX;
  player.y = towerSavedY;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  towerFlowerIndex = -1;
  towerPlatforms = [];
  towerCrocs = [];
  playerLives--;
  gameState = playerLives <= 0 ? 'game_over' : 'playing';
  if (audioCtx) tone(180, 0.2, 'square', 0.12);
}

function exitTowerFailed() {
  beginFadeTransition(() => doExitTowerFailed(), 10, 10);
}

function updateTowerSublevel() {
  if (subHurtTimer > 0) subHurtTimer--;

  if (subStartCountdownFrames > 0) {
    subStartCountdownFrames--;
    return;
  }

  if (subWellDoneTimerFrames > 0) {
    subWellDoneTimerFrames--;
    if (subWellDoneTimerFrames <= 0 && subWellDonePending === 'tower_success') {
      subWellDonePending = null;
      beginFadeTransition(() => doExitTowerSublevel(), 10, 10);
    }
    return;
  }

  for (const croc of towerCrocs) {
    croc.x += croc.vx;
    if (croc.x <= croc.patrolLeft) {
      croc.x = croc.patrolLeft;
      croc.vx = Math.abs(croc.vx);
    } else if (croc.x >= croc.patrolRight) {
      croc.x = croc.patrolRight;
      croc.vx = -Math.abs(croc.vx);
    }
  }

  player.vx = 0;
  if (keys.ArrowLeft || keys.KeyA) { player.vx = -MOVE_SPEED * 1.08; player.facing = -1; }
  if (keys.ArrowRight || keys.KeyD) { player.vx = MOVE_SPEED * 1.08; player.facing = 1; }
  const jumpKey = keys.ArrowUp || keys.KeyW;
  const jumpJustPressed = jumpKey && !jumpKeyWasDown;
  jumpKeyWasDown = jumpKey;
  if (jumpJustPressed) {
    if (player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      subAirJumpsLeft = 1;
      if (audioCtx) tone(330, 0.08, 'square', 0.06);
    } else if (subAirJumpsLeft > 0) {
      player.vy = JUMP_VEL * 0.95;
      subAirJumpsLeft--;
      if (audioCtx) tone(392, 0.07, 'square', 0.06);
    }
  }
  if (player.onGround) subAirJumpsLeft = 1;

  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  const oldBottom = player.y + PH;
  player.x += player.vx;
  player.y += player.vy;
  const newBottom = player.y + PH;

  if (player.x < 0) player.x = 0;
  if (player.x + PW > SUB_ARENA_W) player.x = SUB_ARENA_W - PW;

  player.onGround = false;

  for (const pl of towerPlatforms) {
    const gy = pl.y;
    if (player.x + PW > pl.x && player.x < pl.x + pl.w) {
      if (oldBottom <= gy + 3 && newBottom >= gy && player.vy >= 0) {
        player.y = gy - PH;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
  }

  if (subHurtTimer <= 0) {
    const pcx = player.x + PW / 2;
    const pcy = player.y + PH / 2;
    for (const croc of towerCrocs) {
      if (pcx > croc.x + 4 && pcx < croc.x + croc.w - 4 &&
          pcy > croc.y - 2 && pcy < croc.y + croc.h + 4) {
        subLives--;
        subHurtTimer = 50;
        if (subLives <= 0) { exitTowerFailed(); return; }
        player.x = SUB_ARENA_W / 2 - PW / 2;
        player.y = SUB_GROUND_Y - PH - 8;
        player.vx = 0;
        player.vy = 0;
        player.onGround = true;
        if (audioCtx) tone(160, 0.14, 'sawtooth', 0.1);
        break;
      }
    }
  }

  player.wf = (player.wf + (player.vx !== 0 ? 0.2 : 0)) % 4;

  const targetCamY = Math.max(
    towerWorldTopY,
    Math.min(towerCamMaxY, player.y - H * 0.46)
  );
  towerCamY += (targetCamY - towerCamY) * 0.11;

  // Goal: golden ring at summit only
  const pcx = player.x + PW / 2;
  if (player.y < towerGoalWorldY + 42 && pcx > SUB_ARENA_W * 0.28 && pcx < SUB_ARENA_W * 0.72) {
    exitTowerSublevel();
    return;
  }

  // Fell off bottom of view / world
  if (player.y > towerCamY + H + 120) {
    subLives--;
    subHurtTimer = 40;
    if (subLives <= 0) { exitTowerFailed(); return; }
    player.x = SUB_ARENA_W / 2 - PW / 2;
    player.y = SUB_GROUND_Y - PH - 8;
    player.vx = 0;
    player.vy = 0;
    player.onGround = true;
    if (audioCtx) tone(200, 0.12, 'square', 0.08);
  }
}

function drawTowerSublevel() {
  ctx.save();
  ctx.translate(0, -towerCamY);
  const skyTop = towerWorldTopY - 400;
  const skyBot = SUB_GROUND_Y + 220;
  const sky = ctx.createLinearGradient(0, skyTop, 0, skyBot);
  sky.addColorStop(0, '#050a18');
  sky.addColorStop(0.35, '#0f2840');
  sky.addColorStop(0.65, '#1a4a6e');
  sky.addColorStop(1, '#2d1f4a');
  ctx.fillStyle = sky;
  ctx.fillRect(-120, skyTop, SUB_ARENA_W + 240, skyBot - skyTop + 80);

  for (const pl of towerPlatforms) {
    ctx.fillStyle = '#34495e';
    ctx.fillRect(pl.x, pl.y, pl.w, 12);
    ctx.fillStyle = '#5dade2';
    ctx.fillRect(pl.x, pl.y, pl.w, 3);
  }
  for (const c of towerCrocs) {
    const cx = c.x + c.w / 2;
    const cy = c.y + c.h * 0.55;
    const facing = c.vx >= 0 ? 1 : -1;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(facing, 1);
    ctx.fillStyle = '#1e6b3a';
    ctx.beginPath();
    ctx.ellipse(0, 0, c.w * 0.42, c.h * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2d8f4e';
    ctx.beginPath();
    ctx.ellipse(-c.w * 0.12, -c.h * 0.15, c.w * 0.38, c.h * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a5c30';
    ctx.beginPath();
    ctx.moveTo(c.w * 0.28, -c.h * 0.05);
    ctx.lineTo(c.w * 0.52, -c.h * 0.12);
    ctx.lineTo(c.w * 0.45, c.h * 0.08);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-c.w * 0.22, -c.h * 0.22, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0d3318';
    ctx.beginPath();
    ctx.arc(-c.w * 0.2, -c.h * 0.22, 1.8, 0, Math.PI * 2);
    ctx.fill();
    for (let t = 0; t < 5; t++) {
      ctx.fillStyle = t % 2 === 0 ? '#f5f5dc' : '#c4a574';
      ctx.fillRect(c.w * 0.08 + t * 5, -2, 4, 5);
    }
    ctx.restore();
  }

  // Goal portal at summit (world coordinates)
  const gx = SUB_ARENA_W / 2;
  const gy = towerGoalWorldY;
  ctx.strokeStyle = '#f1c40f';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.arc(gx, gy, 36, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(241,196,15,0.25)';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('TOP', gx, gy + 4);

  if (subHurtTimer <= 0 || Math.floor(subHurtTimer / 4) % 2 === 0) {
    drawCharSprite(player.x, player.y, player.facing, player.wf, selectedChar, 1, !player.onGround);
  }
  ctx.restore();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, SUB_ARENA_W, 42);
  ctx.fillStyle = '#5dade2';
  ctx.font = '14px system-ui,sans-serif';
  ctx.textAlign = 'left';
  let th = '';
  for (let i = 0; i < subLives; i++) th += '❤️';
  ctx.fillText(th || '0', 10, 27);
  ctx.fillStyle = '#ecf0f1';
  ctx.textAlign = 'center';
  ctx.fillText('Climb up — dodge crocs on the sides of platforms! Ring at top (↑ icy tower)', SUB_ARENA_W / 2, 27);
  ctx.textAlign = 'start';

  if (subStartCountdownFrames > 0) {
    const sec = Math.ceil(subStartCountdownFrames / 60);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#5dade2';
    ctx.font = 'bold 72px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(sec), SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 22);
  } else if (subWellDoneTimerFrames > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, SUB_ARENA_W, SUB_ARENA_H);
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 56px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Well done!', SUB_ARENA_W / 2, SUB_ARENA_H / 2 + 10);
  }
}

function returnToMap() { gameState = 'worldmap'; currentLevel = -1; setMusicMood('worldmap'); }

function updateConfetti() {
  for (const c of confetti) {
    c.x += c.vx; c.y += c.vy; c.rot += 0.05; c.vy += 0.03;
    if (c.y > H+20) { c.y = -10; c.x = Math.random()*W; c.vy = Math.random()*3+1; }
  }
}

// ==================== DRAWING: CHARACTER SPRITES ====================
function drawCharSprite(x, y, facing, walkFrame, charIdx, scale, jumping) {
  scale = scale || 1;
  ctx.save();
  ctx.translate(x + PW*scale/2, y);
  if (facing === -1) ctx.scale(-1, 1);
  ctx.scale(scale, scale);
  const lo = walkFrame % 2 === 1 ? 3 : -3;

  if (charIdx === 0) {
    // Bunny
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-5,-12,4,14,-0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-14,4,13,0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffb6c1';
    ctx.beginPath(); ctx.ellipse(-5,-12,2,10,-0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-14,2,9,0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0,6,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-4,3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,3,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath(); ctx.arc(0,7,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0,22,10,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f0ddd0';
    if (jumping) { ctx.fillRect(-8,32,6,8); ctx.fillRect(2,30,6,8); }
    else { ctx.fillRect(-8,32+lo,6,10); ctx.fillRect(2,32-lo,6,10); }
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-10,26,4,0,Math.PI*2); ctx.fill();
  } else if (charIdx === 1) {
    // Lizzie
    ctx.fillStyle = '#4a90d9';
    ctx.beginPath(); ctx.moveTo(-10,16); ctx.lineTo(-13,34); ctx.lineTo(13,34); ctx.lineTo(10,16); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ffcc99'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-10,20); ctx.lineTo(-16,28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,20); ctx.lineTo(16,28); ctx.stroke();
    ctx.fillStyle = '#ffcc99';
    if (jumping) { ctx.fillRect(-7,34,5,8); ctx.fillRect(2,34,5,8); }
    else { ctx.fillRect(-7,34+lo,5,8); ctx.fillRect(2,34-lo,5,8); }
    if (faceLoaded) {
      ctx.save(); ctx.beginPath(); ctx.arc(0,5,12,0,Math.PI*2); ctx.clip();
      ctx.drawImage(faceImg,-12,-7,24,24); ctx.restore();
    } else {
      ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(0,5,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-4,3,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4,3,2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#ff6b8a';
    ctx.beginPath(); ctx.moveTo(8,-4); ctx.lineTo(14,-8); ctx.lineTo(10,-2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(8,-4); ctx.lineTo(14,0); ctx.lineTo(10,-6); ctx.fill();
  } else if (charIdx === 2) {
    // Fox
    ctx.fillStyle = '#ff7b25';
    ctx.beginPath(); ctx.moveTo(-10,28); ctx.quadraticCurveTo(-22,18,-18,10);
    ctx.quadraticCurveTo(-14,14,-10,22); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(-18,12); ctx.quadraticCurveTo(-16,10,-15,14); ctx.fill();
    ctx.fillStyle = '#ff7b25';
    ctx.beginPath(); ctx.ellipse(0,24,10,11,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe0b2';
    ctx.beginPath(); ctx.ellipse(0,27,7,7,0,0,Math.PI); ctx.fill();
    ctx.fillStyle = '#ff7b25';
    ctx.beginPath(); ctx.arc(0,8,11,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-12,-10); ctx.lineTo(-4,-2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(12,-10); ctx.lineTo(4,-2); ctx.fill();
    ctx.fillStyle = '#ffe0b2';
    ctx.beginPath(); ctx.ellipse(0,11,6,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-4,5,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,5,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,9,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e06000';
    if (jumping) { ctx.fillRect(-8,33,5,9); ctx.fillRect(3,33,5,9); }
    else { ctx.fillRect(-8,33+lo,5,9); ctx.fillRect(3,33-lo,5,9); }
  } else if (charIdx === 3) {
    // Robot
    ctx.strokeStyle = '#667'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(0,-14); ctx.stroke();
    ctx.fillStyle = '#00ccff';
    ctx.beginPath(); ctx.arc(0,-15,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8899aa'; ctx.fillRect(-10,-4,20,16);
    ctx.fillStyle = '#001828'; ctx.fillRect(-8,0,16,8);
    ctx.fillStyle = '#00ccff';
    ctx.beginPath(); ctx.arc(-4,4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,4,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8899aa'; ctx.fillRect(-9,14,18,18);
    ctx.fillStyle = '#00ccff';
    ctx.beginPath(); ctx.arc(0,23,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#667788'; ctx.fillRect(-14,16,5,14); ctx.fillRect(9,16,5,14);
    ctx.fillStyle = '#667788';
    if (jumping) { ctx.fillRect(-7,32,6,10); ctx.fillRect(1,32,6,10); }
    else { ctx.fillRect(-7,32+lo,6,10); ctx.fillRect(1,32-lo,6,10); }
  } else {
    // Gabby
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.moveTo(-10,-6); ctx.quadraticCurveTo(-14,-14,-8,-10); ctx.fill();
    ctx.beginPath(); ctx.moveTo(10,-6); ctx.quadraticCurveTo(14,-14,8,-10); ctx.fill();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.arc(0,4,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.moveTo(-12,6); ctx.quadraticCurveTo(-14,18,-8,22); ctx.lineTo(-6,8); ctx.fill();
    ctx.beginPath(); ctx.moveTo(12,6); ctx.quadraticCurveTo(14,18,8,22); ctx.lineTo(6,8); ctx.fill();
    if (gabbyLoaded) {
      ctx.save(); ctx.beginPath(); ctx.arc(0,5,11,0,Math.PI*2); ctx.clip();
      ctx.drawImage(gabbyImg,-11,-6,22,22); ctx.restore();
    } else {
      ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(0,5,11,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-4,3,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4,3,2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#9b59b6';
    ctx.beginPath(); ctx.moveTo(-10,16); ctx.lineTo(-12,34); ctx.lineTo(12,34); ctx.lineTo(10,16); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ffcc99'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-10,20); ctx.lineTo(-16,28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,20); ctx.lineTo(16,28); ctx.stroke();
    ctx.fillStyle = '#ffcc99';
    if (jumping) { ctx.fillRect(-7,34,5,8); ctx.fillRect(2,34,5,8); }
    else { ctx.fillRect(-7,34+lo,5,8); ctx.fillRect(2,34-lo,5,8); }
  }
  ctx.restore();
}

      ctx.beginPath(); ctx.arc(4,-2,2,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

// ==================== DRAWING: ENEMIES ====================
function drawDog(e) {
  const ex = e.x - cameraX;
  if (ex < -60 || ex > W+60) return;
  const ey = groundYAt(e.x) - 30;
  ctx.save();
  ctx.translate(ex+20, ey);
  if (e.dir === -1) ctx.scale(-1,1);
  const lo = e.wf%2 === 0 ? 3 : -3;

  ctx.fillStyle = '#8B6914';
  ctx.beginPath(); ctx.ellipse(0,8,18,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a07828';
  ctx.beginPath(); ctx.arc(16,0,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6B4914';
  ctx.beginPath(); ctx.ellipse(20,4,4,8,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(19,-2,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24,1,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3;

// ==================== DRAWING: SCENE ====================
function drawBackground(ti) {
  const t = THEMES[ti];
  const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0,t.sky1); grad.addColorStop(1,t.sky2);
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = t.hillFar; ctx.beginPath(); ctx.moveTo(0,GROUND_Y);
  for (let x = 0; x <= W; x += 2) {
    const wx = x + cameraX*0.2;
    ctx.lineTo(x, GROUND_Y - 80 - Math.sin(wx*0.005)*40 - Math.sin(wx*0.012)*25 - Math.cos(wx*0.008)*20);
  }
  ctx.lineTo(W,GROUND_Y); ctx.fill();

  ctx.fillStyle = t.hillNear; ctx.beginPath(); ctx.moveTo(0,GROUND_Y);
  for (let x = 0; x <= W; x += 2) {
    const wx = x + cameraX*0.5;
    ctx.lineTo(x, GROUND_Y - 40 - Math.sin(wx*0.008)*30 - Math.sin(wx*0.015)*20 - Math.cos(wx*0.003)*15);
  }
  ctx.lineTo(W,GROUND_Y); ctx.fill();

  if (ti === 5) {
    ctx.fillStyle = 'rgba(255,80,0,0.15)';
    for (let x = 0; x < W; x += 120) {
      const wx = x + cameraX*0.3;
      const flicker = Math.sin(frameCount*0.1+wx*0.01)*8;
      ctx.fillRect(x, GROUND_Y+40+flicker, 80, H-GROUND_Y-40);
    }
  }
}

function drawGround(ti) {
  const t = THEMES[ti];
  const lvl = LEVELS[currentLevel];
  const segs = lvl.ground;
  for (let idx = 0; idx < segs.length; idx++) {
    const seg = segs[idx];
    const sy = seg.y !== undefined ? seg.y : GROUND_Y;
    const sx = seg.x - cameraX, sw = seg.w;
    if (sx + sw < 0 || sx > W) continue;
    ctx.fillStyle = t.ground;     ctx.fillRect(sx, sy, sw, H - sy);
    ctx.fillStyle = t.groundDark; ctx.fillRect(sx, sy + 30, sw, H - sy - 30);

    // Connector to next adjacent segment at different height
    const nextSeg = idx + 1 < segs.length ? segs[idx + 1] : null;
    const nextY = nextSeg ? (nextSeg.y !== undefined ? nextSeg.y : GROUND_Y) : null;
    if (nextSeg && nextY !== sy) {
      const gapPx = nextSeg.x - (seg.x + seg.w);
      if (gapPx === 0) {
        // 0-gap step face: solid vertical cliff between adjacent segments at different heights
        const fx  = seg.x + seg.w - cameraX;
        const top = Math.min(sy, nextY);
        const bot = Math.max(sy, nextY);
        ctx.fillStyle = t.groundDark;
        ctx.fillRect(fx - 3, top, 6, bot - top);
        ctx.fillStyle = t.grass;
        // Tiny cap at the transition to highlight the step edge
        ctx.fillRect(fx - 3, top - 2, 6, 4);
      } else if (gapPx > 0 && gapPx <= 4) {
        const slx = seg.x + seg.w - cameraX;
        const srx = nextSeg.x - cameraX;
        ctx.fillStyle = t.ground;
        ctx.beginPath();
        ctx.moveTo(slx, sy); ctx.lineTo(srx + 1, nextY);
        ctx.lineTo(srx + 1, H); ctx.lineTo(slx, H);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = t.groundDark;
        ctx.beginPath();
        ctx.moveTo(slx, sy + 30); ctx.lineTo(srx + 1, nextY + 30);
        ctx.lineTo(srx + 1, H); ctx.lineTo(slx, H);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = t.grass;
        ctx.beginPath();
        ctx.moveTo(slx, sy); ctx.lineTo(srx + 1, nextY);
        ctx.lineTo(srx + 1, nextY + 5); ctx.lineTo(slx, sy + 5);
        ctx.closePath(); ctx.fill();
      }
    }

    // Cliff faces only where no slope/step connector was drawn
    if (sy < GROUND_Y) {
      const prevSeg = idx > 0 ? segs[idx - 1] : null;
      const prevGap = prevSeg ? seg.x - (prevSeg.x + prevSeg.w) : Infinity;
      const nextGap = nextSeg ? nextSeg.x - (seg.x + seg.w) : Infinity;
      ctx.fillStyle = t.groundDark;
      if (prevGap > 4) ctx.fillRect(sx - 4, sy, 5, GROUND_Y - sy);
      if (nextGap > 4) ctx.fillRect(sx + sw - 1, sy, 5, GROUND_Y - sy);
    }

    // Grass tufts
    ctx.fillStyle = t.grass;
    for (let gx = seg.x; gx < seg.x + seg.w; gx += 12) {
      const ggx = gx - cameraX;
      if (ggx < -12 || ggx > W + 12) continue;
      ctx.beginPath(); ctx.moveTo(ggx, sy); ctx.lineTo(ggx+4, sy-6); ctx.lineTo(ggx+8, sy); ctx.fill();
    }
  }
}

function drawPlatforms(ti) {
  const t = THEMES[ti];
  const lvl = LEVELS[currentLevel];
  for (const pl of lvl.platforms) {
    const px = pl.x - cameraX, pw = pl.w;
    if (px+pw < 0 || px > W) continue;
    ctx.fillStyle = t.plat; ctx.fillRect(px,pl.y,pw,16);
    ctx.fillStyle = t.platTop; ctx.fillRect(px,pl.y,pw,5);
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fillRect(px+2,pl.y+1,pw-4,3);
  }
}

function drawFlagPoles() {
  for (let i = 0; i < levelFlags.length; i++) {
    const f = levelFlags[i];
    const fx = f.x - cameraX;
    if (fx < -40 || fx > W+40) continue;
    const fgy = groundYAt(f.x);
    const poleH = 120, poleTop = fgy - poleH;

    ctx.fillStyle = '#8B7355'; ctx.fillRect(fx-2,poleTop,5,poleH);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(fx,poleTop,5,0,Math.PI*2); ctx.fill();

    if (f.hung) {
      ctx.fillStyle = '#e03030';
      ctx.beginPath(); ctx.moveTo(fx+3,poleTop+5); ctx.lineTo(fx+38,poleTop+16); ctx.lineTo(fx+3,poleTop+30); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#c02020';
      ctx.beginPath(); ctx.moveTo(fx+3,poleTop+5); ctx.lineTo(fx+38,poleTop+16); ctx.lineTo(fx+3,poleTop+12); ctx.closePath(); ctx.fill();
      drawCharFace(fx+18, poleTop+17, 16, selectedChar);
    }

    if (gameState === 'flag_climb' && flagClimbIdx === i) {
      const climbFrac = Math.min(flagClimbProg*1.6, 1);
      const climbY = fgy - PH - (poleH - PH)*climbFrac;
      drawCharSprite(fx - PW/2, climbY, 1, 0, selectedChar, 1, true);
      if (flagClimbProg > 0.55) {
        const fProg = Math.min((flagClimbProg-0.55)/0.45, 1);
        ctx.globalAlpha = fProg;
        const fw = 35*fProg;
        ctx.fillStyle = '#e03030';
        ctx.beginPath(); ctx.moveTo(fx+3,poleTop+5); ctx.lineTo(fx+3+fw,poleTop+16); ctx.lineTo(fx+3,poleTop+30); ctx.closePath(); ctx.fill();
        if (fProg > 0.4) drawCharFace(fx+3+fw*0.5, poleTop+17, 16*fProg, selectedChar);
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawLava() {
  for (const lz of levelLava) {
    const lx = lz.x - cameraX, lw = lz.w;
    if (lx + lw < 0 || lx > W) continue;
    const grad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grad.addColorStop(0, '#ff4500');
    grad.addColorStop(0.4, '#ff2200');
    grad.addColorStop(1, '#880000');
    ctx.fillStyle = grad;
    ctx.fillRect(lx, GROUND_Y, lw, H - GROUND_Y);
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(lx, GROUND_Y + 2);
    for (let x = 0; x <= lw; x += 4) {
      const wave = Math.sin((lz.x + x) * 0.05 + frameCount * 0.08) * 3;
      ctx.lineTo(lx + x, GROUND_Y + wave);
    }
    ctx.lineTo(lx + lw, GROUND_Y + 5);
    ctx.lineTo(lx, GROUND_Y + 5);
    ctx.closePath();
    ctx.fill();
    for (let i = 0; i < 4; i++) {
      const bx = lz.x + (lz.w * (i + 0.5)) / 4;
      const phase = frameCount * 0.06 + i * 1.7;
      const by = GROUND_Y + 12 + Math.sin(phase) * 10;
      const br = 2.5 + Math.sin(frameCount * 0.1 + i) * 1;
      const sx = bx - cameraX;
      ctx.fillStyle = `rgba(255,200,0,${0.4 + Math.sin(phase)*0.2})`;
      ctx.beginPath(); ctx.arc(sx, by, br, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = `rgba(255,100,0,${0.1 + Math.sin(frameCount*0.04)*0.05})`;
    ctx.fillRect(lx, GROUND_Y - 25, lw, 25);
  }
}

function drawElevators() {
  for (const el of levelElevators) {
    const ex = el.x - cameraX;
    if (ex + el.w < -20 || ex > W + 20) continue;
    if (el.type === 'vertical') {
      ctx.fillStyle = 'rgba(100,100,120,0.35)';
      ctx.fillRect(ex + 4, el.minY, 3, el.maxY - el.minY + 14);
      ctx.fillRect(ex + el.w - 7, el.minY, 3, el.maxY - el.minY + 14);
      ctx.fillStyle = '#556';
      ctx.fillRect(ex, el.y, el.w, 14);
      ctx.fillStyle = '#778';
      ctx.fillRect(ex, el.y, el.w, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(ex + 2, el.y + 1, el.w - 4, 3);
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(ex + el.w/2, el.y + 4);
      ctx.lineTo(ex + el.w/2 - 5, el.y + 9);
      ctx.lineTo(ex + el.w/2 + 5, el.y + 9);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + el.w/2, el.y + 12);
      ctx.lineTo(ex + el.w/2 - 5, el.y + 7);
      ctx.lineTo(ex + el.w/2 + 5, el.y + 7);
      ctx.fill();
    } else {
      const trackX1 = el.minX - cameraX;
      const trackX2 = (el.maxX + el.w) - cameraX;
      ctx.strokeStyle = 'rgba(120,80,40,0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(trackX1, el.y + 7);
      ctx.lineTo(trackX2, el.y + 7);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#884400';
      ctx.fillRect(ex, el.y, el.w, 14);
      ctx.fillStyle = '#aa6622';
      ctx.fillRect(ex, el.y, el.w, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(ex + 2, el.y + 1, el.w - 4, 3);
      ctx.fillStyle = '#ffcc00';
      const arrDir = el.dir;
      ctx.beginPath();
      ctx.moveTo(ex + el.w/2 + arrDir*6, el.y + 7);
      ctx.lineTo(ex + el.w/2 - arrDir*2, el.y + 3);
      ctx.lineTo(ex + el.w/2 - arrDir*2, el.y + 11);
      ctx.fill();
    }
  }
}

function drawTurrets() {
  for (const t of levelTurrets) {
    const tx = t.x - cameraX;
    if (tx < -40 || tx > W + 40) continue;
    const by = groundYAt(t.x);
    ctx.save();
    ctx.translate(tx, by);
    if (t.dir === -1) ctx.scale(-1, 1);
    if (t.type === 'fire') {
      ctx.fillStyle = '#553322';
      ctx.fillRect(-10, -34, 20, 34);
      ctx.fillStyle = '#442211';
      ctx.fillRect(-12, -10, 24, 10);
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(4, -32, 12, 10);
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(10, -32, 5, 0, Math.PI * 2); ctx.fill();
      const flicker = Math.sin(frameCount * 0.15) * 2;
      ctx.fillStyle = `rgba(255,200,0,${0.4+Math.sin(frameCount*0.2)*0.2})`;
      ctx.beginPath(); ctx.arc(12, -34 + flicker, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(0, -26, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -26, 1.5, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#667';
      ctx.fillRect(-8, -22, 16, 22);
      ctx.fillStyle = '#556';
      ctx.beginPath();
      ctx.moveTo(4, -28); ctx.lineTo(22, -26);
      ctx.lineTo(22, -20); ctx.lineTo(4, -18);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#445';
      ctx.beginPath(); ctx.arc(22, -23, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#778';
      ctx.fillRect(-10, -6, 20, 6);
      ctx.fillStyle = '#889';
      ctx.beginPath(); ctx.arc(0, -18, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#556';
      ctx.beginPath(); ctx.arc(0, -18, 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawProjectiles() {
  for (const p of levelProjectiles) {
    const px = p.x - cameraX;
    if (px < -20 || px > W + 20) continue;
    if (p.type === 'fire') {
      const glow = 6 + Math.sin(p.age * 0.3) * 2;
      ctx.fillStyle = `rgba(255,100,0,${0.25})`;
      ctx.beginPath(); ctx.arc(px, p.y, glow + 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(px, p.y, glow, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(px, p.y, glow * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffee88';
      ctx.beginPath(); ctx.arc(px, p.y, glow * 0.25, 0, Math.PI * 2); ctx.fill();
      for (let i = 0; i < 3; i++) {
        const tx = px - p.vx * (i + 1) * 2.5;
        const ty = p.y + Math.sin(p.age * 0.1 + i * 2) * 3;
        const tr = 2 - i * 0.5;
        ctx.fillStyle = `rgba(255,${150-i*40},0,${0.4-i*0.12})`;
        ctx.beginPath(); ctx.arc(tx, ty, tr, 0, Math.PI * 2); ctx.fill();
      }
    } else {
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(px, p.y, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.arc(px - 1, p.y - 1, 2, 0, Math.PI * 2); ctx.fill();
      for (let i = 0; i < 2; i++) {
        const tx = px - p.vx * (i + 1) * 2;
        ctx.fillStyle = `rgba(100,100,100,${0.3-i*0.12})`;
        ctx.beginPath(); ctx.arc(tx, p.y, 2 - i * 0.5, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
}

function drawFinishLine() {
  const lvl = LEVELS[currentLevel];
  const fx = lvl.finishX - cameraX;
  if (fx < -50 || fx > W+50) return;
  const pH = 110;
  ctx.fillStyle = '#888'; ctx.fillRect(fx-1,GROUND_Y-pH,4,pH);
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      ctx.fillStyle = (r+c)%2 === 0 ? '#fff' : '#111';
      ctx.fillRect(fx+3+c*8, GROUND_Y-pH+2+r*6, 9, 7);
    }
  }
}

function drawPresents() {
  for (const p of levelPresents) {
    if (p.collected) continue;
    const px = p.x - cameraX;
    if (px < -30 || px > W + 30) continue;
    const bob = Math.sin(p.bobPhase + frameCount * 0.06) * 4;
    const by = p.y - 26 + bob;
    const glow = 0.3 + Math.sin(frameCount * 0.08 + p.bobPhase) * 0.15;
    ctx.fillStyle = `rgba(255,215,0,${glow})`;
    ctx.beginPath(); ctx.arc(px, by + 6, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e03030';
    roundRect(px - 12, by - 6, 24, 20, 4, true, false);
    ctx.fillStyle = '#c02020';
    roundRect(px - 12, by - 6, 24, 10, 4, true, false);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(px - 2, by - 6, 4, 20);
    ctx.fillRect(px - 12, by + 2, 24, 4);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(px - 6, by - 6);
    ctx.quadraticCurveTo(px - 8, by - 16, px, by - 12);
    ctx.quadraticCurveTo(px + 8, by - 16, px + 6, by - 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(px - 8, by - 3, 5, 3);
    ctx.globalAlpha = 1;
  }
}

function drawFloatingCoins() {
  for (const c of levelFloatingCoins) {
    if (c.collected) continue;
    const cx = c.x - cameraX;
    if (cx < -24 || cx > W + 24) continue;
    const bob = Math.sin(c.bobPhase + frameCount * 0.08) * 3;
    const cy = c.y + bob;
    ctx.save();
    ctx.translate(cx, cy);
    const glow = 0.5 + Math.sin(frameCount * 0.1 + c.bobPhase) * 0.2;
    ctx.fillStyle = `rgba(255,200,50,${glow})`;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('¢', 0, 0);
    ctx.restore();
  }
}

function drawFallingSharks() {
  for (const s of fallingSharksList) {
    const sx = s.x - cameraX;
    if (sx < -60 || sx > W + 60) continue;
    ctx.save();
    ctx.translate(sx, s.y);
    ctx.rotate(s.rot);
    const sz = s.size;
    ctx.fillStyle = '#4a6a8a';
    ctx.beginPath();
    ctx.ellipse(0, 0, sz * 0.5, sz * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c0d0e0';
    ctx.beginPath();
    ctx.ellipse(0, sz * 0.04, sz * 0.42, sz * 0.12, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#3a5a7a';
    ctx.beginPath();
    ctx.moveTo(0, -sz * 0.22);
    ctx.lineTo(-sz * 0.06, -sz * 0.5);
    ctx.lineTo(sz * 0.06, -sz * 0.22);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sz * 0.4, 0);
    ctx.lineTo(sz * 0.62, -sz * 0.18);
    ctx.lineTo(sz * 0.62, sz * 0.12);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-sz * 0.2, -sz * 0.06, sz * 0.06, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-sz * 0.19, -sz * 0.05, sz * 0.03, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#2a4a6a'; ctx.lineWidth = 1;
    ctx.beginPath();
    const teethY = sz * 0.08;
    for (let t = -sz * 0.18; t < sz * 0.12; t += sz * 0.06) {
      ctx.moveTo(t, teethY - sz * 0.03);
      ctx.lineTo(t + sz * 0.03, teethY + sz * 0.03);
      ctx.lineTo(t + sz * 0.06, teethY - sz * 0.03);
    }
    ctx.stroke();
    ctx.restore();
  }
}

function drawCelebration() {}

function drawPresentMsg() {
  if (presentMsgTimer <= 0 || !presentMsgText) return;
  const alpha = Math.min(1, presentMsgTimer / 30);
  const yOff = Math.max(0, 1 - presentMsgTimer / 100) * 30;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px "Segoe UI", system-ui, sans-serif';
  const mx = W / 2, my = 72 - yOff;
  const tw = ctx.measureText(presentMsgText).width;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  roundRect(mx - tw / 2 - 18, my - 24, tw + 36, 36, 18, true, false);
  ctx.fillStyle = '#fff';
  ctx.fillText(presentMsgText, mx, my);
  ctx.textAlign = 'start';
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  roundRect(0,0,W,38,0,true,false);
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(THEMES[LEVELS[currentLevel].theme].name, 12, 25);
  const hung = levelFlags.filter(f=>f.hung).length;
  ctx.fillStyle = '#7efaff';
  ctx.fillText(`Flags: ${hung} / ${levelFlags.length}`, 190, 25);
  ctx.fillStyle = '#ff9500';
  ctx.fillText(`Level ${currentLevel+1}`, 360, 25);
  ctx.fillStyle = '#ffd700';
  ctx.fillText(`¢ ${totalCoins}`, 400, 25);
  ctx.fillStyle = '#ff4757';
  let livesStr = '';
  for (let i = 0; i < playerLives; i++) livesStr += '❤️';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(livesStr, 480, 25);
  if (boneAmmo > 0) {
    ctx.fillStyle = '#f5f5dc';
    ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('🦴 ' + boneAmmo, 560, 25);
  }
  drawCharFace(W-28, 19, 20, selectedChar);
  ctx.textAlign = 'start';
}

function drawMathOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#aab';
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Math Difficulty: ' + MATH_DIFFICULTIES[mathDifficultyIdx], W / 2, 60);

  // If we are mid-transition, don't keep showing the "Well done!" screen.
  if (fadeTransition.active) return;

  if (mathResult === 'correct') {
    ctx.fillStyle = '#2ed573';
    ctx.font = 'bold 52px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('Well done!', W/2-110, H/2);
  } else if (mathResult) {
    ctx.fillStyle = '#ff4757';
    ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(mathResult === 'timeout' ? "Time's up!" : 'Wrong!', W/2-80, H/2-20);
    ctx.font = '24px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Answer: '+mathProblem.answer, W/2-80, H/2+20);
  } else {
    const maxTime = 20;
    const cx = voiceMode ? W / 2 : 280;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(voiceMode ? 'Say the answer!' : 'Solve to pass!', cx, 100);
    const barW = 260, barX = cx-barW/2, barY = 120;
    ctx.fillStyle = '#333'; ctx.fillRect(barX,barY,barW,14);
    const pct = Math.max(0, mathTimeLeft / maxTime);
    ctx.fillStyle = pct > 0.5 ? '#2ed573' : pct > 0.25 ? '#ffa502' : '#ff4757';
    ctx.fillRect(barX,barY,barW*pct,14);
    ctx.fillStyle = '#fff'; ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(Math.ceil(mathTimeLeft)+'s', barX+barW+25, barY+12);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 50px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(mathProblem.text, cx, 210);

    if (voiceMode) {
      const micY = 300, micR = 32;
      const pulse = Math.sin(voicePulse) * 0.3 + 0.7;
      const ringR = micR + 8 + (voiceListening ? Math.sin(voicePulse * 2) * 6 : 0);

      ctx.beginPath(); ctx.arc(cx, micY, ringR, 0, Math.PI * 2);
      ctx.fillStyle = voiceListening
        ? `rgba(76,209,55,${0.15 * pulse})`
        : 'rgba(255,255,255,0.05)';
      ctx.fill();
      ctx.strokeStyle = voiceListening ? `rgba(76,209,55,${0.6 * pulse})` : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath(); ctx.arc(cx, micY, micR, 0, Math.PI * 2);
      ctx.fillStyle = voiceListening ? '#2a8c4a' : '#333';
      ctx.fill();
      ctx.strokeStyle = voiceListening ? '#4cd137' : '#666';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = '#fff';
      ctx.font = '28px "Segoe UI", system-ui, sans-serif';
      ctx.fillText('\uD83C\uDF99\uFE0F', cx, micY + 10);

      if (voiceListening) {
        for (let i = 0; i < 5; i++) {
          const bh = 6 + Math.sin(voicePulse * 3 + i * 1.2) * 8;
          ctx.fillStyle = `rgba(76,209,55,${0.6 + Math.sin(voicePulse * 2 + i) * 0.3})`;
          ctx.fillRect(cx - 24 + i * 12, micY + micR + 14 + (12 - bh) / 2, 6, bh);
        }
      }

      ctx.fillStyle = '#222'; ctx.fillRect(cx-120, 380, 240, 44);
      ctx.strokeStyle = voiceListening ? '#4cd137' : '#ffd700'; ctx.lineWidth = 2;
      ctx.strokeRect(cx-120, 380, 240, 44);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(mathTyped || voiceTranscript || (voiceListening ? 'Listening...' : '...'), cx, 408);

      ctx.font = '13px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#777';
      ctx.fillText('Speak the number clearly', cx, 445);
    } else {
      ctx.fillStyle = '#222'; ctx.fillRect(cx-90,240,180,50);
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
      ctx.strokeRect(cx-90,240,180,50);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 30px "Segoe UI", system-ui, sans-serif';
      ctx.fillText(mathTyped || '...', cx, 274);
      ctx.font = '13px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#999';
      ctx.fillText('Type answer + Enter', cx, 310);

      const padX = 560, padY = 100, bs = 52, gap = 6;
      const labels = ['1','2','3','4','5','6','7','8','9','0','⌫','✓'];
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
          const bx = padX+c*(bs+gap), by = padY+r*(bs+gap), idx = r*3+c;
          ctx.fillStyle = idx === 11 ? '#2a8c4a' : idx === 10 ? '#8c3040' : '#2a2a3a';
          roundRect(bx,by,bs,bs,8,true,false);
          ctx.strokeStyle = '#445'; ctx.lineWidth = 1;
          ctx.strokeRect(bx,by,bs,bs);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
          ctx.fillText(labels[idx], bx+bs/2, by+bs/2+8);
        }
      }
    }
  }
  ctx.textAlign = 'start';
}

function drawGameScene() {
  const ti = LEVELS[currentLevel].theme;
  drawBackground(ti);
  ctx.fillStyle = ti === 5 ? '#2a0800' : '#1a1420';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  drawLava();
  drawGround(ti);
  drawPlatforms(ti);
  drawElevators();
  drawFlagPoles();
  drawTurrets();
  for (const e of levelEnemies) {
    if (!e.alive) continue;
    if (e.type === 'dog') drawDog(e); else drawWolf(e);
  }
  drawPresents();
  drawFloatingCoins();
  drawFlowers();
  drawBones();
  drawFinishLine();
  drawProjectiles();
  if (gameState !== 'flag_climb') {
    if (player.ducking) {
      const dsy = DUCK_PH / PH;
      const sx = player.x - cameraX + PW / 2;
      const fy = player.y + PH;
      ctx.save();
      ctx.translate(sx, fy);
      ctx.scale(1.3, dsy);
      ctx.translate(-sx, -fy);
      drawCharSprite(player.x - cameraX, player.y, player.facing, 0, selectedChar, 1, false);
      ctx.restore();
    } else {
      drawCharSprite(player.x-cameraX, player.y, player.facing, player.wf, selectedChar, 1, !player.onGround);
    }
  }
  if (upgrades.sidekickUnlocked && gameState !== 'flag_climb') {
    const sx = sidekickFlyX - cameraX;
    if (sx > -50 && sx < W + 50) {
      const sidekickSpriteScale = 0.58;
      const s = sidekickSpriteScale / 0.72;
      const fy = sidekickFlyY + Math.cos(frameCount * 0.06) * 3;
      ctx.globalAlpha = 0.62;
      const facing = sidekickState ? sidekickState.facing : player.facing;
      drawCharSprite(sx, fy, facing, Math.floor(frameCount / 8) % 4, selectedChar, sidekickSpriteScale, true);

      // Cap + wings (same language as the flying sidekick)
      ctx.fillStyle = '#2a7a4a';
      ctx.beginPath();
      ctx.ellipse(sx + PW * sidekickSpriteScale / 2, fy - 4 * s, 10 * s, 3 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a9a5a';
      ctx.fillRect(sx + PW * sidekickSpriteScale / 2 - 6 * s, fy - 10 * s, 12 * s, 8 * s);
      ctx.fillStyle = '#1a5a3a';
      ctx.beginPath();
      ctx.moveTo(sx - 8 * s, fy + 12 * s);
      ctx.lineTo(sx - 18 * s, fy + 4 * s);
      ctx.lineTo(sx - 12 * s, fy + 14 * s);
      ctx.moveTo(sx + PW * sidekickSpriteScale + 8 * s, fy + 12 * s);
      ctx.lineTo(sx + PW * sidekickSpriteScale + 18 * s, fy + 4 * s);
      ctx.lineTo(sx + PW * sidekickSpriteScale + 12 * s, fy + 14 * s);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  if ((upgrades.flyingSidekickTier | 0) > 0 && gameState !== 'flag_climb') {
    const fx = flyingSidekickX - cameraX;
    const fy = flyingSidekickY;
    if (fx > -50 && fx < W + 50) {
      const ft = upgrades.flyingSidekickTier | 0;
      const flyingSidekickSpriteScale = 0.55 + Math.min(ft, 3) * 0.035;
      const s = flyingSidekickSpriteScale / 0.72;
      ctx.globalAlpha = 0.62;
      drawCharSprite(fx, fy, player.facing, Math.floor(frameCount / 8) % 4, selectedChar, flyingSidekickSpriteScale, true);
      ctx.fillStyle = '#2a7a4a';
      ctx.beginPath();
      ctx.ellipse(fx + PW * flyingSidekickSpriteScale / 2, fy - 4 * s, 10 * s, 3 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a9a5a';
      ctx.fillRect(fx + PW * flyingSidekickSpriteScale / 2 - 6 * s, fy - 10 * s, 12 * s, 8 * s);
      ctx.fillStyle = '#1a5a3a';
      ctx.beginPath();
      ctx.moveTo(fx - 8 * s, fy + 12 * s);
      ctx.lineTo(fx - 18 * s, fy + 4 * s);
      ctx.lineTo(fx - 12 * s, fy + 14 * s);
      ctx.moveTo(fx + PW * flyingSidekickSpriteScale + 8 * s, fy + 12 * s);
      ctx.lineTo(fx + PW * flyingSidekickSpriteScale + 18 * s, fy + 4 * s);
      ctx.lineTo(fx + PW * flyingSidekickSpriteScale + 12 * s, fy + 14 * s);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  for (const c of sidekickCarrots) {
    const cx = c.x - cameraX;
    if (cx < -20 || cx > W + 20) continue;
    ctx.save();
    ctx.translate(cx, c.y);
    ctx.rotate(Math.atan2(c.vy, c.vx));
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d35400';
    ctx.beginPath();
    ctx.ellipse(4, 0, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(10, -1.5, 6, 3);
    ctx.restore();
  }
  // Immunity aura — pulsing gold ring
  if (immunityTimer > 0 && gameState !== 'flag_climb') {
    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.18);
    const alpha = Math.min(1, immunityTimer / 30) * pulse;
    const px = player.x - cameraX + PW / 2;
    const py = player.y + PH / 2;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.ellipse(px, py, PW * 0.9, PH * 0.7, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,180,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, py, PW * 1.25, PH * 0.95, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  // Super jump glow — cyan sparkle
  if (superJumpTimer > 0 && gameState !== 'flag_climb') {
    const alpha = Math.min(1, superJumpTimer / 30) * (0.5 + 0.5 * Math.sin(frameCount * 0.25));
    const px = player.x - cameraX + PW / 2;
    const py = player.y + PH / 2;
    ctx.save();
    ctx.globalAlpha = alpha * 0.7;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(px, py, PW * 0.75, PH * 0.6, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  // Super run glow — green “run over pits”
  if (superRunTimer > 0 && gameState !== 'flag_climb') {
    const alpha = Math.min(1, superRunTimer / 30) * (0.5 + 0.5 * Math.sin(frameCount * 0.2));
    const px = player.x - cameraX + PW / 2;
    const py = player.y + PH / 2;
    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = '#2ed573';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#2ed573';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(px, py, PW * 0.8, PH * 0.65, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  drawFallingSharks();
  drawFlyingBirds();
  drawFlyingTurtles();
  drawWaterDrops();
  if (mathFlashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${mathFlashTimer/50})`;
    ctx.fillRect(0,0,W,H);
    mathFlashTimer--;
  }
  drawHUD();
  drawPresentMsg();
}

function drawLevelComplete() {
  drawGameScene();
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  for (const c of confetti) {
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.color; ctx.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);
    ctx.restore();
  }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
  ctx.fillText('Level Complete!', W/2, H/2-30);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '22px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(THEMES[LEVELS[currentLevel].theme].name+' cleared!', W/2, H/2+10);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Press Enter or click to continue', W/2, H/2+50);
  ctx.textAlign = 'start';
}

function drawGameOver() {
  drawGameScene();
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 52px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 10;
  ctx.fillText('GAME OVER', W/2, H/2-40);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '20px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('You ran out of lives!', W/2, H/2+5);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('Press Enter or click to return to map', W/2, H/2+50);
  ctx.textAlign = 'start';
}

// ==================== GAME LOOP ====================
function update() {
  frameCount++;
  if (fadeTransition.active) {
    updateFadeTransition();
    return;
  }
  switch (gameState) {
    case 'playing':
      updateElevators();
      updateTurrets();
      updatePlayer();
      // `updatePlayer()` can switch to a sublevel (flowers/driving/math). If that
      // happens, stop running the rest of the "playing" collision logic this frame.
      if (fadeTransition.active || gameState !== 'playing') return;
      updateEnemies();
      checkPresents();
      updateSidekick();
      updateBones();
      updateFallingSharks();
      updateFlyingBirds();
      updateFlyingTurtles();
      updatePresentMsg();
      if (superJumpTimer > 0) superJumpTimer--;
      if (immunityTimer > 0) immunityTimer--;
      if (superRunTimer > 0) superRunTimer--;
      break;
    case 'flag_climb':
      updateElevators();
      updateTurrets();
      updateFlagClimb();
      if (fadeTransition.active || gameState !== 'flag_climb') return;
      updateEnemies();
      updateSidekick();
      updateFallingSharks();
      updateFlyingBirds();
      updateFlyingTurtles();
      updatePresentMsg();
      if (superJumpTimer > 0) superJumpTimer--;
      if (immunityTimer > 0) immunityTimer--;
      if (superRunTimer > 0) superRunTimer--;
      break;
    case 'flower_sublevel': updateFlowerSublevel(); break;
    case 'driving_sublevel': updateDrivingSublevel(); break;
    case 'banana_sublevel': updateBananaSublevel(); break;
    case 'boss_sublevel': updateBossSublevel(); break;
    case 'tower_sublevel': updateTowerSublevel(); break;
    case 'math_challenge': updateMath(); break;
    case 'level_complete': updateConfetti(); levelCompleteTimer++; break;
    case 'game_over': break;
  }
}

function draw() {
  ctx.setTransform(renderDpr * renderScale, 0, 0, renderDpr * renderScale, 0, 0);
  ctx.clearRect(0,0,W,H);
  switch (gameState) {
    case 'menu': drawMenu(); break;
    case 'store': drawStore(); break;
    case 'worldmap': drawWorldMap(); break;
    case 'playing': case 'flag_climb': drawGameScene(); break;
    case 'flower_sublevel': drawFlowerSublevel(); break;
    case 'driving_sublevel': drawDrivingSublevel(); break;
    case 'banana_sublevel': drawBananaSublevel(); break;
    case 'boss_sublevel': drawBossSublevel(); break;
    case 'tower_sublevel': drawTowerSublevel(); break;
    case 'math_challenge': drawGameScene(); drawMathOverlay(); break;
    case 'level_complete': drawLevelComplete(); break;
    case 'game_over': drawGameOver(); break;
  }
  if (fadeTransition.active) {
    const a = getFadeAlpha();
    if (a > 0) {
      ctx.fillStyle = 'rgba(0,0,0,' + a + ')';
      ctx.fillRect(0,0,W,H);
    }
  }
}

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime;
  lastTime = ts;
  accumulator += dt;
  while (accumulator >= STEP) { update(); accumulator -= STEP; }
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
